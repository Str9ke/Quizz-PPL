  <style>
/* ===== Fiches page styles ===== */
.fiches-wrap{max-width:900px;margin:0 auto;padding:0 8px}
/* Category grid */
.fcat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin:10px 0 18px}
.fcat-btn{padding:10px 8px;font-size:.82em;font-weight:700;border-radius:12px;cursor:pointer;border:1.5px solid var(--border-color);background:var(--bg-container);color:var(--text-secondary);transition:all .2s;text-align:center;line-height:1.3}
.fcat-btn:hover{border-color:#667eea;color:#667eea;background:rgba(102,126,234,.06)}
.fcat-btn.active{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-color:transparent}
.fcat-count{display:block;font-size:.72em;font-weight:400;opacity:.7;margin-top:2px}
/* Sub-category pills */
.fsub-row{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 14px;padding:0 2px}
.fsub-pill{padding:5px 14px;font-size:.76em;font-weight:600;border-radius:20px;cursor:pointer;border:1px solid var(--border-color);background:transparent;color:var(--text-secondary);transition:all .2s;white-space:nowrap}
.fsub-pill:hover{border-color:#667eea;color:#667eea}
.fsub-pill.active{background:#667eea;color:#fff;border-color:transparent}
/* Content card */
.fiche-card{background:var(--bg-container);border:1px solid var(--border-color);border-radius:14px;padding:16px 18px;margin-bottom:14px;line-height:1.55;font-size:.88em}
.fiche-card h3{margin:0 0 10px;color:#667eea;font-size:1.05em;border-bottom:2px solid rgba(102,126,234,.25);padding-bottom:6px}
.fiche-card ul{margin:4px 0 10px 16px;padding:0}
.fiche-card li{margin-bottom:4px;color:var(--text-primary)}
.fiche-card li strong,.fiche-card li b{color:#ffd54f}
.fiche-card table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.92em}
.fiche-card th{text-align:left;padding:5px 8px;background:rgba(102,126,234,.12);color:#667eea;font-weight:700;border-bottom:2px solid rgba(102,126,234,.3);font-size:.88em}
.fiche-card td{padding:4px 8px;border-bottom:1px solid var(--border-color)}
.fiche-card td:first-child{font-weight:600;color:var(--text-heading);white-space:nowrap}
.fiche-card code{background:rgba(102,126,234,.12);padding:1px 5px;border-radius:4px;font-size:.9em;color:#bb86fc}
.fiche-card .formula{display:block;background:rgba(102,126,234,.08);border-left:3px solid #667eea;padding:6px 12px;margin:6px 0;border-radius:0 8px 8px 0;font-family:monospace;font-size:.92em;color:#e0e0e8}
.fiche-card .warn{color:#ff9800;font-weight:600}
.fiche-card .danger{color:#f44336;font-weight:600}
.fiche-card .ok{color:#4caf50;font-weight:600}
/* Expand/collapse */
.fiche-section{margin-bottom:4px}
.fiche-section-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-question);border:1px solid var(--border-color);border-radius:10px;cursor:pointer;font-weight:700;font-size:.92em;color:var(--text-heading);transition:all .2s;user-select:none}
.fiche-section-hdr:hover{border-color:#667eea;color:#667eea}
.fiche-section-hdr .chevron{transition:transform .25s;font-size:.7em;opacity:.6}
.fiche-section-hdr.open .chevron{transform:rotate(90deg)}
.fiche-section-body{display:none;padding:4px 0 8px}
.fiche-section-body.show{display:block}
/* Search */
.fiche-search{display:flex;gap:8px;margin:10px 0 14px}
.fiche-search input{flex:1;padding:9px 14px;border-radius:20px;border:1px solid var(--border-color);background:var(--input-bg);color:var(--input-text);font-size:.88em;outline:none}
.fiche-search input:focus{border-color:#667eea}
.fiche-search button{padding:8px 18px;border-radius:20px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:700;cursor:pointer;font-size:.85em}
/* Print */
@media print{
  .top-nav-bar,.fcat-grid,.fsub-row,.fiche-search,#themeToggleBtn,footer{display:none!important}
  .fiche-section-body{display:block!important}
  .fiche-card{break-inside:avoid;border:1px solid #ccc}
  body{background:#fff;color:#000}
  .fiche-card li strong,.fiche-card li b{color:#b8860b}
  .fiche-card h3{color:#333}
}
/* progress bar for category */
.fcat-progress{height:3px;background:var(--progressbar-bg);border-radius:2px;margin-top:6px;overflow:hidden}
.fcat-progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:2px;transition:width .3s}
/* Reading time */
.fcat-time{display:block;font-size:.68em;font-weight:400;opacity:.55;margin-top:2px}
.fiches-total-time{text-align:center;font-size:.82em;color:var(--text-secondary);margin:-4px 0 12px;opacity:.7}
.fiches-total-time span{font-weight:700;color:#667eea}
/* TTS Player */
.tts-player{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-container);border:1px solid var(--border-color);border-radius:12px;margin-bottom:14px;flex-wrap:wrap}
.tts-playbtn{width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1.1em;cursor:pointer;flex-shrink:0;transition:background .2s;display:flex;align-items:center;justify-content:center}
.tts-stopbtn{width:30px;height:30px;border-radius:8px;border:1px solid rgba(244,67,54,.35);background:rgba(244,67,54,.1);color:#f44336;font-size:.85em;cursor:pointer;flex-shrink:0}
.tts-progress-wrap{flex:1;min-width:100px;position:relative;height:22px;cursor:pointer}
.tts-track{position:absolute;top:50%;left:0;right:0;height:4px;background:rgba(255,255,255,.12);border-radius:2px;transform:translateY(-50%);pointer-events:none;overflow:hidden}
.tts-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:2px;width:0%;transition:width .2s linear}
.tts-seek{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;margin:0}
.tts-time{font-size:.74em;color:var(--text-secondary);white-space:nowrap;font-variant-numeric:tabular-nums;min-width:80px;text-align:center}
.tts-rate-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.tts-rate-lbl{font-size:.75em;color:#667eea;font-weight:700;min-width:28px;text-align:right}
.tts-rate-slider{width:70px;cursor:pointer}
  </style>
</head>

      <input type="text" id="ficheSearchInput" placeholder="Rechercher dans les fiches… (ex: décrochage, VOR, METAR…)" autocomplete="off">
      <span id="ficheSearchClear" style="display:none;cursor:pointer;font-size:1.2em;color:var(--text-secondary);padding:0 6px;align-self:center" title="Effacer">✕</span>

      <button class="tts-stopbtn" onclick="_ttsStop('tts-fiches')" title="Arr&#xea;ter">&#x23F9;</button>
      <div class="tts-progress-wrap">
        <div class="tts-track"><div class="tts-fill"></div></div>
        <input type="range" class="tts-seek" min="0" max="100" step="0.1" value="0"
          onmousedown="_ttsSeekStart()" ontouchstart="_ttsSeekStart()"

          onchange="_ttsSeekEnd('tts-fiches',parseFloat(this.value))">

          oninput="this.previousElementSibling.textContent='\u00d7'+(this.value/10).toFixed(1);_ttsSetRate('tts-fiches',this.value/10)">
      </div>

  <script>
(function(){
'use strict';

/* ============================================================
   FICHES DATA — 8 major categories, each with sub-categories
   ============================================================ */
const FICHES = [
/* ────────────────── 1. AÉRODYNAMIQUE ────────────────── */
{
  id:'aero', icon:'✈️', title:'Aérodynamique & Principes du vol',
  subs:[
{t:'Forces aérodynamiques & formules', html:`
<ul>
<li>Résultante aérodynamique = somme de toutes les forces aéro, appliquée au <b>centre de poussée</b></li>
<li><b>Portance Rz</b> = ½ρSV²Cz → perpendiculaire au vent relatif</li>
<li><b>Traînée Rx</b> = ½ρSV²Cx → parallèle au vent relatif (opposée au déplacement)</li>
<li>Portance et traînée proportionnelles au <b>carré de la vitesse</b> (V×2 → Rz×4)</li>
<li>Portance ≈ 75 % dépression extrados + 25 % surpression intrados</li>
<li>Vol rectiligne horizontal stabilisé : Portance = Poids ; Traction = Traînée</li>
<li>Traînée totale = traînée parasite + traînée induite</li>
<li>Traînée parasite = forme + frottement + interférence</li>
<li>Traînée induite : tourbillons marginaux (compensation pression aux bouts d'aile)</li>
<li>Traînée induite ↓ quand vitesse ↑ ; traînée parasite ↑ quand vitesse ↑</li>
<li>Traînée totale minimale quand traînée parasite = traînée induite</li>
<li>Forme d'aile à traînée induite minimale : <b>elliptique</b></li>
</ul>`},
{t:'Profil d\'aile & écoulement', html:`
<ul>
<li><b>Extrados</b> : air accéléré → dépression (Venturi)</li>
<li><b>Intrados</b> : air ralenti → surpression</li>
<li><b>Bernoulli</b> : Ptotale = Pstatique + Pdynamique = constante</li>
<li>Quand vitesse ↑ → pression statique ↓</li>
<li><b>Point de stagnation</b> : séparation filets d'air → se déplace vers le bas si incidence ↑</li>
<li><b>Point de transition</b> : laminaire → turbulente → se déplace vers l'avant si vitesse ↑</li>
<li><b>Générateurs de vortex</b> : ré-énergisent la couche limite</li>
<li>Corde = bord d'attaque → bord de fuite</li>
<li>Allongement = envergure / corde moyenne</li>
</ul>`},
{t:'Incidence, assiette, pente', html:`
<ul>
<li><b>Incidence</b> = corde / vent relatif</li>
<li><b>Assiette</b> = axe longitudinal / horizontale</li>
<li><b>Pente</b> = trajectoire / horizontale</li>
<li class="formula">Assiette = Pente + Incidence</li>
<li>Basse vitesse → grande incidence ; haute vitesse → petite incidence</li>
<li>Manche avant/arrière → variation d'incidence</li>
</ul>`},
{t:'Finesse & polaire', html:`
<ul>
<li class="formula">Finesse = Cz/Cx = Portance/Traînée = Distance / Hauteur perdue = Vh / Vz</li>
<li>Finesse max avion léger ≈ <b>10</b></li>
<li>Finesse max <b>invariable</b> avec poids et altitude (seule la vitesse change)</li>
<li>Volets sortis → finesse ↓</li>
<li>Panne moteur → vitesse de finesse max (IAS)</li>
<li>Vent de face en panne → vitesse > Vfinesse max</li>
<li>Polaire : Cz en fonction de Cx ; α₂ = finesse max ; α₃ = puissance nécessaire min</li>
</ul>`},
{t:'Décrochage', html:`
<ul>
<li>= dépassement de l'<b>incidence critique</b> → perte brutale de portance</li>
<li>Incidence de décrochage = <b>constante</b> pour un profil donné</li>
<li>Vs varie avec : <b>masse, facteur de charge, volets, puissance</b></li>
<li>Vs IAS <b>constante</b> quelle que soit l'altitude</li>
<li>Vs ↑ si masse ↑ ; Vs ↓ si volets sortis</li>
<li>Vs en virage = Vs × √n</li>
<li>Signes : <b>buffeting</b>, mollesse commandes, avertisseur de décrochage</li>
<li>Aile décroche d'abord à l'<b>emplanture</b> (vrillage préserve ailerons)</li>
<li>Sous la pluie : Vs ↑ → majorer vitesse d'approche</li>
<li>Sortie : diminuer incidence (pousser manche) + augmenter puissance</li>
</ul>`},
{t:'Volets & dispositifs hypersustentateurs', html:`
<ul>
<li>But : ↑ portance → ↓ vitesse décollage/atterrissage</li>
<li><b>Volets bord de fuite</b> : ↑ courbure/surface → ↑ Cz ET ↑ Cx → ↓ Vs mais ↓ finesse</li>
<li><b>Volet Fowler</b> : le plus efficace (Cz × 2)</li>
<li><b>Becs / fentes</b> : ↑ incidence de décrochage, moins de traînée que volets</li>
<li>Volets au décollage : ↓ distance roulage MAIS ↓ taux de montée</li>
<li>Remise de gaz full flaps : remettre moteur, rester pleins volets, puis rétracter</li>
</ul>`},
{t:'Virage & facteur de charge', html:`
<table>
<tr><th>Inclinaison</th><th>n = 1/cos φ</th><th>↑ Vs</th></tr>
<tr><td>30°</td><td>1,15</td><td>+7%</td></tr>
<tr><td>45°</td><td>1,41</td><td>+19%</td></tr>
<tr><td>60°</td><td><b>2,0</b></td><td>+41%</td></tr>
</table>
<ul>
<li>Facteur charge virage dépend <b>uniquement de l'inclinaison</b></li>
<li>Virage rate one = 3°/s = 360° en 2 min</li>
<li>Passage palier → virage à V constante : ↑ incidence + ↑ puissance</li>
<li>Facteur charge catégorie normale : <b>+3,8 / −1,5</b> en lisse, <b>+2 / 0</b> volets sortis</li>
</ul>`},
{t:'Stabilité & gouvernes', html:`
<ul>
<li><b>Roulis</b> (axe longitudinal) → ailerons</li>
<li><b>Tangage</b> (axe latéral) → gouverne de profondeur</li>
<li><b>Lacet</b> (axe vertical) → gouverne de direction</li>
<li>Stabilité longitudinale : empennage horizontal + CG en avant du centre de poussée</li>
<li>Stabilité latérale : dièdre, flèche, CG bas</li>
<li>Stabilité directionnelle : dérive verticale</li>
<li><b>Lacet inverse</b> : traînée différentielle ailerons → ailerons différentiels le corrigent</li>
<li><b>Roulis induit</b> : action pied → roulis même côté</li>
<li>Compensateur (trim) : annule l'effort aux commandes</li>
</ul>`},
{t:'Centrage & effet de sol', html:`
<ul>
<li><b>Centrage avant</b> : + stable, − maniable, Vs ↑</li>
<li><b>Centrage arrière</b> : − stable, + maniable, risque incontrôlabilité</li>
<li><b>Effet de sol</b> : près du sol → traînée induite ↓ → finesse ↑</li>
<li>Atterrissage : distance ↑ (avion plane plus longtemps)</li>
<li>Décollage : distance ↓</li>
</ul>`},
{t:'Hélice & effets moteur', html:`
<ul>
<li>Hélice en moulinet (panne) : génère de la <b>traînée</b></li>
<li>Pas variable le long de la pale : calage ↓ du moyeu à l'extrémité</li>
<li>Hélice vitesse constante : CSU adapte le pas automatiquement</li>
<li>Effets moteur : couple réaction (roulis), souffle hélicoïdal (lacet), effet gyro (tangage)</li>
<li>Cessna en montée → tendance virer → corriger avec <b>pied droit</b></li>
</ul>`},
{t:'Vrille', html:`
<ul>
<li>= décrochage <b>dissymétrique</b> → autorotation + forte perte altitude</li>
<li>Causes : forte incidence + dérapage important</li>
<li>≠ virage engagé : vrille = V faible ; virage engagé = V ↑ rapidement</li>
<li>Sortie vrille à droite : pied <b>gauche</b> à fond, ailerons au <b>neutre</b></li>
</ul>`},
{t:'Atmosphère & vitesses', html:`
<ul>
<li>Azote 78 %, Oxygène 21 %, ρ MSL = <b>1,225 kg/m³</b></li>
<li>Altitude ↑ ou Température ↑ → ρ ↓ → portance et traînée ↓</li>
</ul>
<table>
<tr><th>Vitesse</th><th>Signification</th></tr>
<tr><td>Vs / VSO / VS1</td><td>Décrochage (config atterrissage / lisse)</td></tr>
<tr><td>VFE</td><td>Max volets sortis (fin arc blanc)</td></tr>
<tr><td>VNO</td><td>Max utilisation normale (fin arc vert)</td></tr>
<tr><td>VNE</td><td>Ne jamais dépasser (trait rouge)</td></tr>
<tr><td>Va</td><td>Manœuvre (débattement complet autorisé)</td></tr>
<tr><td>Vx</td><td>Meilleur angle de montée (pente max)</td></tr>
<tr><td>Vy</td><td>Meilleur taux de montée (Vz max)</td></tr>
</table>
<ul>
<li>Approche = <b>1,3 × Vs</b> ; toucher ≈ 1,1 × Vs</li>
</ul>`},
{t:'Spoilers, aérofreins & taxi', html:`
<ul>
<li><b>Aérofreins / Spoilers</b> : ↓ portance, ↑ traînée → ↑ taux descente, freinage au sol</li>
<li>N'influencent pas le cap ; servent en descente et roulage</li>
<li><b>Centre de pression</b> : point d'application de la résultante aéro ≈ <b>25% corde</b></li>
<li>Centre de pression recule si incidence ↓ ; avance si incidence ↑</li>
<li><b>Profil symétrique</b> à incidence nulle → portance <b>nulle</b></li>
<li><b>Facteur de charge en montée</b> &lt; 1 (composante poids sur trajectoire)</li>
<li><b>Elevons</b> : commandes mixtes ailerons + profondeur sur ailes delta</li>
</ul>
<table>
<tr><th>Taxi vent de travers</th><th>Ailerons</th><th>Profondeur</th></tr>
<tr><td>Vent face + gauche</td><td>↑ gauche (manche au vent)</td><td>Neutre ou avant</td></tr>
<tr><td>Vent face + droite</td><td>↑ droite (manche au vent)</td><td>Neutre ou avant</td></tr>
<tr><td>Vent arrière + gauche</td><td>↓ gauche (manche opposé)</td><td>Manche en avant</td></tr>
<tr><td>Vent arrière + droite</td><td>↓ droite (manche opposé)</td><td>Manche en avant</td></tr>
</table>
<ul>
<li>Principe taxi vent de face : manche <b>dans le vent</b> ; vent arrière : manche <b>opposé au vent + en avant</b></li>
</ul>`}
]},
/* ────────────────── 2. CONNAISSANCE AÉRONEF ────────────────── */
{
  id:'avion', icon:'🔧', title:'Connaissance générale aéronef',
  subs:[
{t:'Cellule & structure', html:`
<ul>
<li><b>Semi-monocoque</b> : couples + longerons + revêtement</li>
<li>Cloison <b>pare-feu</b> entre moteur et habitacle</li>
<li><b>Flutter</b> : oscillations gouvernes → contrepoids + ne pas dépasser VNE</li>
<li>Facteur de charge n = Portance / Poids (= 1 en palier)</li>
<li>Structure sandwich : 2 peaux + matériau léger → grande rigidité</li>
</ul>`},
{t:'Aile — Géométrie & efforts', html:`
<table>
<tr><th>Terme</th><th>Définition</th></tr>
<tr><td>Extrados / Intrados</td><td>Dessus / dessous aile</td></tr>
<tr><td>Emplanture</td><td>Jonction aile-fuselage (+ grands efforts en vol)</td></tr>
<tr><td>Allongement</td><td>Envergure / corde = B²/S</td></tr>
<tr><td>Dièdre</td><td>Angle aile / horizontal (stabilité roulis)</td></tr>
<tr><td>Vrillage</td><td>Calage + grand emplanture qu'extrémité</td></tr>
</table>
<ul>
<li>En vol : extrados en <b>compression</b>, intrados en <b>traction</b></li>
<li><b>Longeron principal</b> : absorbe efforts de flexion</li>
<li>Winglets : réduisent la traînée induite</li>
</ul>`},
{t:'Moteur 4 temps', html:`
<table>
<tr><th>Temps</th><th>Piston</th><th>Soupapes</th><th>Action</th></tr>
<tr><td>Admission</td><td>↓</td><td>Adm. ouverte</td><td>Aspire mélange</td></tr>
<tr><td>Compression</td><td>↑</td><td>Fermées</td><td>Comprime mélange</td></tr>
<tr><td>Explosion</td><td>↓</td><td>Fermées</td><td>Bougies → seul temps moteur</td></tr>
<tr><td>Échappement</td><td>↑</td><td>Éch. ouverte</td><td>Évacue gaz brûlés</td></tr>
</table>
<ul>
<li>1 explosion tous les <b>2 tours</b> moteur</li>
<li><b>Détonation</b> : octane trop faible, mélange pauvre + forte puissance</li>
<li><b>Auto-allumage</b> : dépôts carbone, points chauds → peut persister après coupure</li>
<li>Arrêt moteur → <b>mixture plein pauvre</b></li>
</ul>`},
{t:'Carburation & givrage carbu', html:`
<ul>
<li>Carburateur : venturi crée la dépression, gicleur pulvérise l'essence</li>
<li>Dosage optimal : 1g essence / 15g air</li>
<li><b>Riche</b> = trop d'essence → bon refroidissement, surconsommation</li>
<li><b>Pauvre</b> = surchauffe, risque détonation</li>
<li>Altitude ↑ (sans toucher mixture) → mélange <b>s'enrichit</b></li>
<li>EGT pic = mélange optimal → enrichir légèrement après</li>
</ul>
<ul>
<li><span class="danger">Givrage carbu</span> : T° <b>−5°C à +20°C</b> + forte humidité, puissance réduite</li>
<li>Réchauffage carbu : air chauffé via échangeur échappement</li>
<li>Effet sans givrage : RPM ↓ (normal) ; avec givrage : RPM ↑ (glace fond)</li>
<li>Au décollage : réchauffage <b>coupé</b></li>
<li>Avant descente moteur réduit : <b>toujours</b> activer réchauffage</li>
</ul>`},
{t:'Carburant', html:`
<table>
<tr><th>Propriété</th><th>Valeur</th></tr>
<tr><td>AVGAS 100LL</td><td>Couleur <b>bleue</b>, indice octane 100</td></tr>
<tr><td>Densité</td><td><b>0,72 kg/l</b></td></tr>
<tr><td>20 litres</td><td>≈ <b>14 kg</b></td></tr>
</table>
<ul>
<li><b>Mise à l'air libre</b> : obstruction → arrêt moteur</li>
<li>Aile haute → alimentation par gravité ; aile basse → pompe électrique</li>
<li>Purge au point le plus bas ; eau = liquide incolore au fond</li>
<li>Réservoirs presque vides → absorption humidité max</li>
</ul>`},
{t:'Allumage — Double magnéto', html:`
<ul>
<li><b>2 magnétos</b> indépendantes, <b>2 bougies/cylindre</b></li>
<li>Fonctionnent quand le moteur tourne → <b>indépendantes du circuit électrique</b></li>
<li>Panne alternateur/batterie → <b>aucune incidence</b> sur le moteur</li>
<li>Test magnétos : chute RPM normale → vérifier écart dans limites</li>
<li>Magnétos sur OFF et moteur tourne → fil de masse cassé → <b>DANGER</b></li>
</ul>`},
{t:'Hélice — Pas fixe & vitesse constante', html:`
<ul>
<li><b>Pas fixe</b> : RPM commandé par gaz ; rendement variable selon phase de vol</li>
<li>Petit pas → bon décollage ; Grand pas → bonne croisière</li>
<li>Calage <b>diminue</b> du moyeu à l'extrémité</li>
</ul>
<ul>
<li><b>CSU</b> (vitesse constante) : 3 manettes = puissance (MAP) + pas (RPM) + mélange</li>
<li>↑ puissance : 1° ↑ RPM → 2° ↑ MAP</li>
<li>↓ puissance : 1° ↓ MAP → 2° ↓ RPM</li>
<li>Commande plein avant = plein petit pas = RPM max</li>
</ul>`},
{t:'Circuit électrique', html:`
<ul>
<li><b>Batterie</b> : DC, démarrage, panne alternateur</li>
<li><b>Alternateur</b> : entraîné par moteur, alimente servitudes en vol</li>
<li><b>Disjoncteur</b> : réenclenchable, protège contre surcharge</li>
<li><b>Fusible</b> : fond → non réutilisable</li>
<li>Panne alternateur → moteur <b>non affecté</b> → couper non-essentiels → écourter vol</li>
<li>Surintensité : réenclencher 1× max ; si ressaute → ne PAS retenter</li>
</ul>`},
{t:'Pitot-statique & instruments', html:`
<table>
<tr><th>Instrument</th><th>Pressions</th><th>Mesure</th></tr>
<tr><td>Anémomètre</td><td>Totale + Statique</td><td>Vitesse (IAS)</td></tr>
<tr><td>Altimètre</td><td>Statique seule</td><td>Altitude</td></tr>
<tr><td>Variomètre</td><td>Statique seule</td><td>Vz (ft/min)</td></tr>
</table>
<table>
<tr><th>Panne</th><th>Anémo</th><th>Alti</th><th>Vario</th></tr>
<tr><td>Pitot bouché</td><td>→ zéro</td><td>OK</td><td>OK</td></tr>
<tr><td>Statique bouchée</td><td>Figé</td><td>Figé</td><td>→ zéro</td></tr>
</table>
<ul>
<li>Codes couleur badin : <b>blanc</b> (VS0→VFE), <b>vert</b> (VS1→VNO), <b>jaune</b> (VNO→VNE), <b>rouge</b> (VNE)</li>
<li>TAS ≈ IAS + <b>2% par 1000 ft</b></li>
</ul>`},
{t:'Altimétrie', html:`
<table>
<tr><th>Calage</th><th>Référence</th><th>Indication</th></tr>
<tr><td><b>QNH</b></td><td>Niveau mer</td><td>Altitude</td></tr>
<tr><td><b>QFE</b></td><td>Aérodrome</td><td>Hauteur</td></tr>
<tr><td><b>1013</b></td><td>Standard</td><td>Niveau de vol (FL)</td></tr>
</table>
<ul>
<li>Gradient : <b>1 hPa ≈ 28 ft</b></li>
<li>QNH affiché &gt; QNH réel → altimètre indique <b>trop haut</b> (danger)</li>
<li>T° &lt; ISA → altitude vraie &lt; altitude indiquée (« du chaud vers le froid : on descend »)</li>
</ul>`},
{t:'Instruments gyroscopiques', html:`
<ul>
<li><b>Horizon artificiel</b> : assiette + inclinaison (pompe à vide)</li>
<li><b>Conservateur de cap</b> : cap, recaler sur compas toutes les ≈15 min en palier</li>
<li><b>Indicateur de virage</b> : taux + bille (souvent électrique)</li>
<li>Taux standard = <b>3°/s</b> ; inclinaison ≈ 15% de Vp</li>
<li><b>Bille centrée</b> = vol symétrique ; « le pied chasse la bille »</li>
</ul>`},
{t:'Compas magnétique', html:`
<ul>
<li>Indique le cap <b>compas</b> (ref. Nord magnétique ± déviation)</li>
<li><b>Déviation</b> : masses magnétiques, varie selon l'orientation → table sous le compas</li>
<li>Erreurs en : virages, accélérations, turbulences</li>
<li>Lecture optimale : palier rectiligne stabilisé, sans accélération</li>
</ul>`},
{t:'Structures, volets & commandes', html:`
<ul>
<li><b>Monocoque</b> : seul le revêtement supporte les efforts (sans longerons)</li>
<li><b>Semi-monocoque</b> : revêtement + longerons + couples + lisses</li>
<li><b>Cantilever</b> : aile sans haubanage (appui uniquement à l'emplanture)</li>
<li><b>Haubans</b> : câbles/tiges renforçant l'aile (aile haubanée)</li>
<li><b>Empennage en T</b> : stabilisateur au sommet de la dérive → risque deep stall</li>
<li><b>Volets de capot (cowl flaps)</b> : modifient flux air moteur → ↑ refroidissement en montée</li>
</ul>
<table>
<tr><th>Dispositif BdA</th><th>Effet principal</th></tr>
<tr><td>Bec (slat)</td><td>↑ incidence décrochage, surface fixe ou mobile</td></tr>
<tr><td>Fente (slot)</td><td>Passage fixe BdA → ré-énergie couche limite</td></tr>
<tr><td>Volet Krueger</td><td>Volet BdA articulé sous l'intrados</td></tr>
</table>
<ul>
<li><b>Anti-balance tab</b> : augmente l'effort aux commandes (contraire du trim)</li>
<li><b>Déport en corne</b> : surface gouverne devant l'axe charnière → réduit effort</li>
</ul>
<table>
<tr><th>Commande moteur</th><th>Couleur standard</th></tr>
<tr><td>Manette des gaz</td><td><b>Noire</b></td></tr>
<tr><td>Commande de pas (hélice)</td><td><b>Bleue</b></td></tr>
<tr><td>Mixture</td><td><b>Rouge</b></td></tr>
<tr><td>Réchauffage carbu</td><td><b>Jaune / Grise</b></td></tr>
</table>`},
{t:'Pannes instruments & lubrification', html:`
<table>
<tr><th>Panne</th><th>Comportement badin</th></tr>
<tr><td>Pitot seul bouché</td><td>→ zéro (plus de Pt)</td></tr>
<tr><td>Pitot + drain bouchés</td><td>IAS <b>figée</b> puis varie comme un altimètre</td></tr>
<tr><td>Statique bouchée</td><td>IAS figée à ancienne valeur</td></tr>
<tr><td>Source statique secours</td><td>P statique cockpit légèrement basse → alti <b>sur-indique</b></td></tr>
</table>
<ul>
<li><b>Manomètre dépression (suction gauge)</b> : vérifie fonctionnement pompe à vide → instruments gyro</li>
<li><b>Ampèremètre</b> charge forte prolongée → risque surchauffe batterie</li>
</ul>
<ul>
<li><b>Huile moteur</b> : triple rôle → <b>lubrification + refroidissement + nettoyage</b></li>
<li>Huile synthétique : meilleure tenue en température</li>
<li>Pression huile basse → <b>atterrir immédiatement</b></li>
<li>T° huile excessive → réduire puissance, enrichir mélange</li>
<li>Humidité ↑ → mélange <b>s'appauvrit</b> (air humide = moins dense)</li>
<li>T° ambiante ↑ → mélange <b>s'enrichit</b> (carburant s'évapore davantage)</li>
</ul>`}
]},
/* ────────────────── 3. MÉTÉOROLOGIE ────────────────── */
{
  id:'meteo', icon:'🌦️', title:'Météorologie',
  subs:[
{t:'Atmosphère & ISA', html:`
<ul>
<li>Troposphère : du sol à la tropopause (<b>11 km / 36 000 ft en Europe</b>)</li>
<li>ISA MSL : <b>15°C, 1013,25 hPa</b></li>
<li>Décroissance ISA : <b>2°C / 1000 ft = 6,5°C / 1000 m</b></li>
<li>Adiabatique sec : <b>1°C / 100 m</b> (3°C/1000 ft)</li>
<li>Adiabatique saturé : ≈ <b>0,5°C / 100 m</b></li>
<li>En montant : P ↓, T ↓, ρ ↓</li>
</ul>`},
{t:'Pression atmosphérique', html:`
<ul>
<li>Gradient basses couches : <b>1 hPa / 28 ft</b></li>
<li>Isobares serrées → vent fort</li>
<li><b>Anticyclone</b> : subsidence → beau temps, peu de nuages</li>
<li><b>Dépression</b> : convergence → ascendance → nuages</li>
<li><b>Dorsale</b> : axe hautes pressions ; <b>Thalweg</b> : axe basses pressions</li>
<li><b>Marais barométrique</b> : P ≈ constante, vents faibles et variables</li>
</ul>`},
{t:'Température & humidité', html:`
<ul>
<li>T max journalière : ≈ <b>14h locale</b> (2h après zénith)</li>
<li>T min journalière : ≈ <b>lever du soleil</b></li>
<li><b>Inversion</b> : T augmente avec altitude → couche stable, emprisonne → brouillard</li>
<li><b>Point de rosée</b> : T à laquelle air sature → condensation</li>
<li>Faible écart T / point de rosée → risque brume/brouillard</li>
<li>T ↓ → humidité relative ↑ (écart diminue)</li>
</ul>`},
{t:'Stabilité & convection', html:`
<ul>
<li><b>Stable</b> : particule se refroidit + vite que l'ambiant → redescend → nuages stratiformes (pluie continue)</li>
<li><b>Instable</b> : particule se refroidit − vite → monte → nuages cumuliformes (averses)</li>
<li>Convection max en <b>fin d'après-midi</b> ; stoppée à la tropopause</li>
</ul>`},
{t:'Vent', html:`
<ul>
<li>Direction = d'où il vient ; vitesse en <b>kt</b></li>
<li><b>Buys-Ballot NH</b> : vent horaire autour anticyclones, antihoraire autour dépressions</li>
<li>En altitude : // aux isobares ; près du sol : dévié ~<b>30°</b> vers basses pressions</li>
<li>En altitude vs sol : + fort et tourne vers la droite (NH)</li>
<li>Vent de face → basses pressions <b>à droite</b> (NH)</li>
</ul>`},
{t:'Vents locaux & effet de Foehn', html:`
<table>
<tr><th>Vent</th><th>Quand</th><th>Direction</th></tr>
<tr><td>Brise de mer</td><td>Jour, ciel clair</td><td>Mer → terre</td></tr>
<tr><td>Brise de terre</td><td>Nuit, ciel clair</td><td>Terre → mer</td></tr>
<tr><td>Anabatique</td><td>Jour</td><td>Pente montante</td></tr>
<tr><td>Catabatique</td><td>Nuit</td><td>Descend vallée</td></tr>
</table>
<table>
<tr><th>Vent régional</th><th>Secteur</th><th>Zone</th></tr>
<tr><td>Mistral</td><td>Nord</td><td>Vallée du Rhône</td></tr>
<tr><td>Tramontane</td><td>Nord-Ouest</td><td>Bas-Languedoc</td></tr>
<tr><td>Autan</td><td>Sud-Est</td><td>Central-Pyrénées</td></tr>
</table>
<ul>
<li><b>Foehn</b> : air humide monte (condense + pluie) → sous le vent : air sec et chaud</li>
<li>Sous le vent : <b>altocumulus lenticulaires</b> + <b>rotors</b> (turbulences)</li>
</ul>`},
{t:'Nuages', html:`
<table>
<tr><th>Étage</th><th>Altitude</th><th>Nuages</th></tr>
<tr><td>Supérieur</td><td>&gt; 6000 m</td><td>Ci, Cs, Cc (cristaux de glace)</td></tr>
<tr><td>Moyen</td><td>2000–6000 m</td><td>As, Ac</td></tr>
<tr><td>Inférieur</td><td>&lt; 2000 m</td><td>St, Sc, Cu, Ns, Cb</td></tr>
</table>
<table>
<tr><th>Code</th><th>Octas</th></tr>
<tr><td>FEW</td><td>1–2</td></tr>
<tr><td>SCT</td><td>3–4</td></tr>
<tr><td>BKN</td><td>5–7 (= plafond)</td></tr>
<tr><td>OVC</td><td>8</td></tr>
</table>
<ul>
<li><b>Nimbostratus</b> : pluie forte et continue</li>
<li><b>Stratus</b> : très bas → dangereux VFR</li>
<li>Plafond défini à partir de <b>BKN</b> (≥ 5 octas)</li>
</ul>`},
{t:'Fronts & perturbations', html:`
<ul>
<li>Ordre : <b>front chaud → secteur chaud → front froid → traîne</b></li>
<li><b>Front chaud</b> : Ci → Cs → As → Ns, pluie durable, P ↓</li>
<li><b>Front froid</b> : Cu/Cb, averses/orages, P ↓ puis ↑</li>
<li><b>Traîne</b> : Cu, bonnes visibilités ; traîne active → Cb</li>
<li><b>Occlusion</b> : front froid rattrape front chaud</li>
<li>Perturbation : échelle pays-continent, durée <b>3–6 jours</b></li>
</ul>`},
{t:'CB, orages, givrage', html:`
<ul>
<li><b>Cb</b> : cisaillement, turbulence sévère, grêle, foudre, pluie violente</li>
<li>Courants verticaux jusqu'à <b>10 000 ft/min</b></li>
<li>Contourner à <b>≥ 10 NM</b></li>
<li>Cb convectif max <b>fin d'après-midi</b> en été</li>
<li>Front de rafales : vents irréguliers jusqu'à 180° de variation</li>
</ul>
<ul>
<li><span class="danger">Givrage</span> : <b>0°C à −12°C</b> + gouttelettes surfondues</li>
<li><b>Verglas</b> (glace claire) : le plus dangereux</li>
<li>Pluie verglaçante : avant front chaud en hiver</li>
</ul>`},
{t:'Brouillard & visibilité', html:`
<table>
<tr><th>Type</th><th>Condition</th></tr>
<tr><td>Rayonnement</td><td>Nuit, anticyclone, vent faible, ciel clair → disparaît au soleil</td></tr>
<tr><td>Advection</td><td>Air chaud humide sur sol froid (côtier hiver)</td></tr>
<tr><td>Évaporation</td><td>Air froid sur surface chaude humide</td></tr>
<tr><td>Orographique</td><td>Air humide forcé sur pentes</td></tr>
</table>
<ul>
<li>Brouillard (FG) : visi &lt; <b>1 km</b> ; Brume (BR) : 1–5 km</li>
<li>Lié à anticyclone et dorsale</li>
</ul>`},
{t:'Messages météo (METAR, TAF…)', html:`
<table>
<tr><th>Message</th><th>Type</th><th>Détail</th></tr>
<tr><td>METAR</td><td>Observation</td><td>Toutes les heures, contient QNH</td></tr>
<tr><td>TAF</td><td>Prévision</td><td>Court 9h / Long 24-30h</td></tr>
<tr><td>SIGMET</td><td>Alerte</td><td>Phénomènes dangereux, FIR</td></tr>
<tr><td>TEMSI</td><td>Prévision</td><td>Carte temps significatif</td></tr>
<tr><td>WINTEM</td><td>Prévision</td><td>Vent & T° en altitude (réf 1013)</td></tr>
<tr><td>VOLMET</td><td>En vol</td><td>METAR série d'aérodromes (VHF)</td></tr>
</table>
<ul>
<li><b>CAVOK</b> : visi ≥ 10 km, pas de nuage &lt; 1500 m, pas de Cb/précip</li>
<li><b>TEMPO</b> : fluctuation &lt; 1h ; <b>BECMG</b> : évolution régulière ; <b>NOSIG</b> : pas de changement 2h</li>
<li>Distinguer METAR du TAF : le <b>QNH</b> n'est que dans le METAR</li>
<li>WINTEM : petite barre = <b>5 kt</b>, grande = <b>10 kt</b>, triangle = <b>50 kt</b></li>
</ul>`},
{t:'Codes METAR AUTO, SPECI & divers', html:`
<table>
<tr><th>Code</th><th>Signification (METAR AUTO)</th></tr>
<tr><td><b>NCD</b></td><td>No Cloud Detected (capteur ne détecte aucun nuage)</td></tr>
<tr><td><b>NDV</b></td><td>No Directional Variation (vent indéterminé)</td></tr>
<tr><td><b>///</b></td><td>Donnée non observable (capteur absent/défaillant)</td></tr>
<tr><td><b>SKC</b></td><td>Sky Clear (ciel dégagé, observé par humain)</td></tr>
</table>
<ul>
<li><b>SPECI</b> = METAR spécial émis lors d'un changement significatif</li>
<li><b>SNOWTAM</b> = NOTAM neige/état piste en hiver</li>
<li>TAF court : valide <b>9h</b>, cycle rédaction <b>3h</b> ; TAF long : <b>24-30h</b></li>
<li>METAR émis toutes les <b>heures</b> (ou 30 min sur gros aérodromes)</li>
<li><b>ATIS</b> : message automatique, par <b>radio VHF + téléphone</b>, identifié par lettre</li>
<li><b>ISA au FL180</b> = <b>500 hPa</b>, T° = −21°C</li>
<li><b>Couche isotherme</b> : T° constante avec l'altitude</li>
<li><b>Conduction</b> : mécanisme principal de chauffage des basses couches par le sol</li>
<li><b>DZ</b> = bruine ; <b>RA</b> = pluie ; <b>SN</b> = neige ; <b>TS</b> = orage ; <b>FG</b> = brouillard</li>
<li><b>Dossier de vol</b> Météo France : METAR, TAF, TEMSI, WINTEM, cartes SWL</li>
</ul>`}
]},
/* ────────────────── 4. NAVIGATION ────────────────── */
{
  id:'nav', icon:'🧭', title:'Navigation',
  subs:[
{t:'Terre & coordonnées', html:`
<ul>
<li>1° sur méridien = <b>60 NM</b> ; 1' = <b>1 NM</b></li>
<li>1° sur parallèle = 60 × cos(latitude) NM</li>
<li>Méridiens = demi-grands cercles (indiquent Nord vrai)</li>
<li>Seul l'<b>équateur</b> est un grand cercle parmi les parallèles</li>
<li>Rotation Terre : <b>15°/h</b> → 1° = 4 min</li>
</ul>`},
{t:'Distances & conversions', html:`
<table>
<tr><th>Conversion</th><th>Valeur</th></tr>
<tr><td>1 NM</td><td>1,852 km</td></tr>
<tr><td>1 ft</td><td>0,3048 m</td></tr>
<tr><td>1 USG</td><td>3,785 litres</td></tr>
<tr><td>1 lb</td><td>0,453 kg</td></tr>
<tr><td>1 kt</td><td>1 NM/h ≈ 0,5 m/s</td></tr>
</table>`},
{t:'Cap, route, déclinaison, dérive', html:`
<ul>
<li><b>Cap</b> = Nord → axe longitudinal ; <b>Route</b> = Nord → trace sol</li>
<li><b>Dérive</b> = cap − route (même référence)</li>
<li><b>Déclinaison magnétique Dm</b> = Nv − Nm (Est = +)</li>
</ul>
<li class="formula">Rm = Rv − Dm &nbsp;&nbsp;|&nbsp;&nbsp; Cm = Rm ± dérive &nbsp;&nbsp;|&nbsp;&nbsp; Cc = Cm − d</li>
<ul>
<li>Dérive max si vent <b>perpendiculaire</b> ; nulle si vent parallèle</li>
<li>Vent de gauche → cap &lt; route</li>
</ul>`},
{t:'Triangle des vitesses & facteur de base', html:`
<table>
<tr><th>Symbole</th><th>Nom</th><th>Définition</th></tr>
<tr><td>Vi (IAS)</td><td>Vitesse indiquée</td><td>Lue sur anémomètre</td></tr>
<tr><td>Vp (TAS)</td><td>Vitesse propre</td><td>Par rapport à l'air</td></tr>
<tr><td>Vs (GS)</td><td>Vitesse sol</td><td>Par rapport au sol</td></tr>
</table>
<ul>
<li>Vp ≈ Vi + <b>2% par 1000 ft</b></li>
<li>Vs = Vp ± vent effectif (face − / arrière +)</li>
<li class="formula">Facteur de base Fb = 60 / Vp &nbsp;&nbsp;|&nbsp;&nbsp; Temps = Distance × Fb</li>
<li>Règle du soixantième : 1° = 1 NM après 60 NM</li>
</ul>`},
{t:'Altimétrie (QNH, QFE, FL)', html:`
<table>
<tr><th>Calage</th><th>Indication</th></tr>
<tr><td>QNH</td><td>Altitude (MSL)</td></tr>
<tr><td>QFE</td><td>Hauteur (aérodrome)</td></tr>
<tr><td>1013</td><td>FL (altitude pression)</td></tr>
</table>
<ul>
<li>Conversion FL ↔ altitude : correction = (QNH − 1013) × 28 ft</li>
<li><b>Règle semi-circulaire VFR</b> :</li>
</ul>
<table>
<tr><th>Rm</th><th>FL</th></tr>
<tr><td>000°–179°</td><td>Impair + 5 (35, 55, 75…)</td></tr>
<tr><td>180°–359°</td><td>Pair + 5 (45, 65, 85…)</td></tr>
</table>`},
{t:'Cartes aéronautiques', html:`
<table>
<tr><th>Carte</th><th>1 cm =</th><th>Usage</th></tr>
<tr><td>1/500 000</td><td>5 km</td><td>VFR principale &lt; FL115</td></tr>
<tr><td>1/1 000 000</td><td>10 km</td><td>Radionavigation</td></tr>
</table>
<ul>
<li><b>Lambert</b> (conique conforme) : conserve les angles, méridiens = droites</li>
<li><b>Mercator</b> : lignes droites = loxodromies</li>
<li>Mesurer distance sans règle : reporter sur un <b>méridien</b></li>
<li>Aérodrome barré X = désaffecté ; bleu = privé</li>
</ul>`},
{t:'Orthodromie & loxodromie', html:`
<ul>
<li><b>Orthodromie</b> = plus court chemin (grand cercle) → courbe sur Mercator, droite sur Lambert</li>
<li><b>Loxodromie</b> = cap constant → droite sur Mercator, courbe sur Lambert</li>
<li>Méridiens = orthodromies ; Parallèles (≠ équateur) = loxodromies</li>
</ul>`},
{t:'Heures & nuit aéronautique', html:`
<ul>
<li>France hiver : UTC + 1 ; été : UTC + 2</li>
<li><b>Nuit aéro</b> : 30 min après coucher → 30 min avant lever du soleil</li>
<li>Le soleil se couche plus tôt à l'Est</li>
</ul>`},
{t:'Navigation estime & cheminement', html:`
<ul>
<li><b>Estime</b> : cap + durée pour rejoindre un point</li>
<li><b>Cheminement</b> : suivre repères au sol</li>
<li>En pratique : estime contrôlée par cheminement (~15 min)</li>
<li>Bons repères : voies ferrées, autoroutes, rivières, grandes villes</li>
<li>Manche à air : chaque bande ≈ <b>5 kt</b> ; horizontale = &gt; <b>25 kt</b></li>
</ul>`},
{t:'Consommation & autonomie', html:`
<ul>
<li>Consommation étape = conso horaire × temps de vol</li>
<li>Réserve réglementaire : <b>30 min</b> (navigation) / <b>10 min</b> (local)</li>
<li>Distance franchissable = distance max avec le carburant</li>
<li>Rayon d'action = aller-retour max</li>
</ul>`},
{t:'Radionavigation VOR, ADF, DME, GPS', html:`
<table>
<tr><th>Système</th><th>Bande</th><th>Indique</th></tr>
<tr><td>VOR</td><td>VHF (111–118 MHz)</td><td>Radial (QDR) / QDM</td></tr>
<tr><td>NDB/ADF</td><td>MF/LF (180–1750 kHz)</td><td>Gisement (relatif au cap)</td></tr>
<tr><td>DME</td><td>UHF</td><td>Distance oblique</td></tr>
<tr><td>GPS</td><td>Satellite</td><td>Position, Vs, heure UTC</td></tr>
</table>
<ul>
<li class="formula">QDM = Cap + Gisement &nbsp;&nbsp;|&nbsp;&nbsp; QDR = QDM + 180°</li>
<li>VOR CDI déviation complète = <b>10°</b></li>
<li>Portée VOR : D = 1,23 × √H (H en ft, D en NM)</li>
<li>GPS : min <b>4 satellites</b> pour position 3D ; <b>RAIM</b> = contrôle intégrité</li>
</ul>`},
{t:'Transpondeur', html:`
<table>
<tr><th>Code</th><th>Signification</th></tr>
<tr><td><b>7000</b></td><td>VFR non contrôlé</td></tr>
<tr><td><b>7500</b></td><td>Intervention illicite</td></tr>
<tr><td><b>7600</b></td><td>Panne radio</td></tr>
<tr><td><b>7700</b></td><td>Détresse</td></tr>
</table>
<ul>
<li>Mode C : transmet altitude pression (réf. 1013)</li>
<li>Afficher 7000 + ALT dès déplacement au sol</li>
<li>Chiffres : <b>0 à 7</b> uniquement</li>
</ul>`},
{t:'RMI, VDF & radar', html:`
<ul>
<li><b>RMI (Radio Magnetic Indicator)</b> : combine cap magnétique + aiguille(s) pointant vers la station</li>
<li>Lecture : pointe aiguille = <b>QDM</b> (relèvement vers station) ; queue = <b>QDR</b></li>
<li>Gisement = QDM − Cap magnétique</li>
<li>Position : intersection de 2 QDM ou 2 QDR depuis stations différentes</li>
</ul>
<ul>
<li><b>VDF (Goniomètre)</b> : station sol détermine la direction de l'avion → fournit <b>QDM/QDR/QTE</b></li>
<li>Demander un QDM par radio → le contrôleur donne le cap pour rejoindre la station</li>
<li>Classes de précision : A (±2°) → D (±10°)</li>
</ul>
<ul>
<li><b>Radar primaire</b> : détecte écho réfléchi, donne position + distance, <b>PAS d'altitude</b></li>
<li><b>Radar secondaire (SSR)</b> : interroge transpondeur → code + altitude (mode C/S)</li>
<li>Mode S : transmission données + identification automatique</li>
</ul>`},
{t:'Terre, symboles cartes & NOTAM', html:`
<ul>
<li>Forme de la Terre = <b>ellipsoïde</b> (géoïde aplati aux pôles)</li>
<li>Circonférence Terre = <b>21 600 NM</b> = 40 000 km</li>
<li><b>Tropique du Cancer</b> = 23,5°N ; <b>Tropique du Capricorne</b> = 23,5°S</li>
<li><b>Cercle polaire</b> = 66,5°N/S</li>
<li><b>Crépuscule civil</b> : soleil entre 0° et 6° sous l'horizon</li>
</ul>
<table>
<tr><th>Symbole carte OACI</th><th>Signification</th></tr>
<tr><td>× barré</td><td>Aérodrome désaffecté</td></tr>
<tr><td>Bleu/violet</td><td>Aérodrome privé</td></tr>
<tr><td>Vert (piste VAC)</td><td>Piste en herbe / non revêtue</td></tr>
<tr><td>Triangle + ligne</td><td>Vélisurface (vol à voile)</td></tr>
<tr><td>Relief &gt; 11 500 ft</td><td>Teinte bleue sur carte OACI</td></tr>
</table>
<ul>
<li><b>VAC</b> (Visual Approach Chart) : carte d'approche à vue, procédures locales</li>
<li><b>NOTAM</b> (Notice to Airmen) : informations temporaires (travaux, activités, restrictions)</li>
<li>NOTAM consultables sur le <b>site du SIA</b> avant chaque vol</li>
<li><b>Composante traversière</b> = Vvent × sin(angle vent/piste)</li>
<li><b>Vent effectif</b> = Vvent × cos(angle vent/piste)</li>
</ul>`}
]},
/* ────────────────── 5. RÉGLEMENTATION ────────────────── */
{
  id:'regl', icon:'📋', title:'Réglementation',
  subs:[
{t:'OACI & Convention de Chicago', html:`
<ul>
<li>Convention signée <b>7 déc. 1944</b> à Chicago. Siège : <b>Montréal</b></li>
<li>Promulgue SARPS (Normes et Pratiques Recommandées) = Annexes</li>
<li>Annexes clés : 1 = licences, 4 = cartes, 8 = navigabilité, 13 = enquêtes, 14 = aéroports</li>
<li>En haute mer → règles <b>OACI</b></li>
</ul>`},
{t:'Espaces aériens (A→G)', html:`
<table>
<tr><th>Classe</th><th>VFR</th><th>Clairance</th><th>Radio</th><th>Sép. VFR/IFR</th></tr>
<tr><td><b>A</b></td><td class="danger">Interdit</td><td>—</td><td>—</td><td>—</td></tr>
<tr><td><b>B</b></td><td>Oui</td><td>Oui</td><td>Oui</td><td class="ok">Oui</td></tr>
<tr><td><b>C</b></td><td>Oui</td><td>Oui</td><td>Oui</td><td class="ok">Oui</td></tr>
<tr><td><b>D</b></td><td>Oui</td><td>Oui</td><td>Oui</td><td>Info trafic</td></tr>
<tr><td><b>E</b></td><td>Oui</td><td>Non</td><td>Non</td><td>Non</td></tr>
<tr><td><b>G</b></td><td>Oui</td><td>Non</td><td>Non</td><td>Non</td></tr>
</table>
<ul>
<li><b>P</b> = interdite ; <b>D</b> = dangereuse ; <b>R</b> = réglementée</li>
<li>Classe D hors horaires → rétrogradée en G</li>
<li>CTR = zone contrôle (sol → limite sup.)</li>
</ul>`},
{t:'Conditions VMC', html:`
<table>
<tr><th>Situation</th><th>Visi</th><th>Dist. nuages</th></tr>
<tr><td>Contrôlé &lt; FL100</td><td><b>5 km</b></td><td>H:1500m V:300m</td></tr>
<tr><td>Contrôlé ≥ FL100</td><td><b>8 km</b></td><td>H:1500m V:300m</td></tr>
<tr><td>Non contrôlé sous surface S</td><td><b>1500 m</b></td><td>Hors nuages, vue surface</td></tr>
</table>
<ul>
<li><b>Surface S</b> = max(3000 ft AMSL, 1000 ft ASFC)</li>
<li><b>VFR spécial</b> (CTR seulement) : visi ≥ 1500 m, hors nuages, vue surface</li>
</ul>`},
{t:'Hauteurs min. de survol', html:`
<table>
<tr><th>Situation</th><th>Hauteur min</th></tr>
<tr><td>Rase campagne</td><td><b>150 m (500 ft)</b></td></tr>
<tr><td>Usine isolée</td><td><b>300 m (1000 ft)</b></td></tr>
<tr><td>Agglo &lt; 1200 m</td><td><b>500 m</b></td></tr>
<tr><td>Ville 1200-3600 m</td><td><b>1000 m</b></td></tr>
<tr><td>Grande ville &gt; 3600 m</td><td><b>1500 m</b></td></tr>
</table>`},
{t:'Circuit d\'aérodrome', html:`
<ul>
<li>Ordre : montée → vent traversier → <b>vent arrière</b> (1000 ft AAL) → base → finale</li>
<li>Standard = virages à <b>gauche</b> ; flèche rouge = à droite</li>
<li>Intégration : par l'<b>extérieur</b> en début de vent arrière</li>
<li>AFIS hors horaires : passage <b>vertical</b> au-dessus, puis vent arrière</li>
<li>Point d'attente : 50 m piste revêtue, 30 m piste herbe</li>
</ul>`},
{t:'Priorités & évitement', html:`
<ul>
<li><b>Voir et éviter</b> incombe au CdB même en espace contrôlé</li>
<li>À droite = priorité ; mais : moteur cède aux <b>dirigeables → planeurs → ballons</b></li>
<li>Face à face : oblique vers la <b>droite</b></li>
<li>Dépassement : par la <b>droite</b></li>
<li>Atterrissage : plus bas = prioritaire (mais pas pour doubler)</li>
<li>En montagne : priorité à celui qui a la pente à sa <b>droite</b></li>
</ul>`},
{t:'Signaux lumineux', html:`
<table>
<tr><th>Signal</th><th>En vol</th><th>Au sol</th></tr>
<tr><td class="ok">Vert continu</td><td>Atterrir autorisé</td><td>Décoller autorisé</td></tr>
<tr><td class="ok">Vert éclats</td><td>Revenez pour atterrir</td><td>Rouler autorisé</td></tr>
<tr><td class="danger">Rouge continu</td><td>Restez dans circuit</td><td>Arrêtez</td></tr>
<tr><td class="danger">Rouge éclats</td><td>Aérodrome dangereux</td><td>Dégagez piste</td></tr>
<tr><td>Blanc éclats</td><td>Atterrissez, gagnez trafic</td><td>Retournez au départ</td></tr>
</table>`},
{t:'Pistes & balisage', html:`
<table>
<tr><th>Feu</th><th>Couleur</th></tr>
<tr><td>Bord de piste</td><td>Blancs</td></tr>
<tr><td>Seuil</td><td class="ok">Verts</td></tr>
<tr><td>Extrémité</td><td class="danger">Rouges</td></tr>
<tr><td>Taxiway</td><td style="color:#42a5f5">Bleus</td></tr>
</table>
<ul>
<li><b>PAPI</b> : 2R + 2B = sur le plan ; plus de R = trop bas ; plus de B = trop haut</li>
<li>QFU = orientation magnétique piste /10 arrondi</li>
<li>Seuil décalé : atterrir après, décoller avant autorisé</li>
</ul>`},
{t:'Plan de vol (FPL)', html:`
<ul>
<li><b>Obligatoire</b> : franchissement frontière, survol maritime, VFR nuit non local, vol IFR</li>
<li>Dépôt : <b>60 min</b> (frontière) / <b>30 min</b> (national)</li>
<li>Case 9 : L (≤7t), M (7-136t), H (≥136t)</li>
<li>Case 15 : TAS en N0090 ou K0180</li>
<li>Validité FPL non contrôlé : <b>30 min</b> après EOBT</li>
<li>Clôture : par pilote si terrain non contrôlé</li>
</ul>`},
{t:'Documents aéronef', html:`
<ul>
<li><b>CDI</b> (immatriculation) : pas de date validité, confère nationalité</li>
<li><b>CDN</b> (navigabilité) : validité illimitée</li>
<li><b>CEN/ARC</b> (examen navigabilité) : validité <b>1 an</b></li>
<li><b>LSA</b> : licence station aéronef, validité illimitée</li>
<li><b>Manuel de vol</b> : à bord pour tous les vols</li>
<li><b>Carnet de route</b> : rempli par CdB ; livrets cellule/moteur au <b>sol</b></li>
</ul>`},
{t:'Licence PPL & qualifications', html:`
<ul>
<li>PPL âge min : <b>17 ans</b> ; solo : <b>16 ans</b></li>
<li>Formation : <b>45 h</b> dont 25h DC, 10h solo (dont 5h campagne + 1 vol 150 NM + 2 atterrissages)</li>
<li>Médical classe 2 : &lt; 42 ans → <b>5 ans</b> ; 42-49 → <b>2 ans</b> ; ≥ 50 → <b>1 an</b></li>
<li>Expérience récente passagers : <b>3 décollages + 3 atterrissages / 90 jours</b></li>
<li>SEP validité : <b>24 mois</b> ; prorogation : 12h vol dont 6h CdB + 12 dec/att + 1h FI</li>
</ul>`},
{t:'Services ATS & divers', html:`
<ul>
<li><b>TWR</b> : contrôle + info vol + alerte ; <b>AFIS</b> : info vol + alerte uniquement</li>
<li>« Autorisé » = uniquement par contrôleur pour décollage/atterrissage</li>
<li><b>Accident</b> = blessure grave/mortelle ou dommage important ; enquête <b>BEA</b> pour prévention</li>
<li>Phases SAR : <b>INCERFA → ALERFA → DETRESFA</b></li>
<li>Oxygène : max FL100 sans O₂ ; pilote &gt; 30 min FL100-130 ; tout le monde &gt; FL130</li>
</ul>`},
{t:'VFR on top, MEP & réglementation avancée', html:`
<ul>
<li><b>VFR on top</b> : vol VFR au-dessus d'une couche nuageuse, sans vue du sol</li>
<li>Conditions : maintenir VMC au-dessus, pouvoir redescendre en VMC</li>
<li><b>Qualification MEP</b> (Multi-Engine Piston) : validité <b>12 mois</b></li>
<li><b>Temps de vol</b> : dès que l'avion se déplace par ses propres moyens jusqu'à l'arrêt complet</li>
<li><b>Âge min premier vol double commande</b> : aucun minimum réglementaire</li>
<li><b>Commission de discipline</b> : peut suspendre ou révoquer une licence</li>
<li><b>Approche semi-directe</b> : rejoindre directement la base (sans vent arrière)</li>
<li><b>FIR</b> (Flight Information Region) : espace info vol, couvre tout le territoire</li>
<li>Survol rassemblement &gt; <b>100 000 personnes</b> = hauteur min <b>5000 ft AAL</b></li>
<li><b>Accident</b> : enquête dans le <b>pays où il se produit</b></li>
<li>Marquage axial piste = bande <b>discontinue blanche</b></li>
<li>Reconnaissance mutuelle licences entre <b>États membres OACI</b></li>
</ul>`},
{t:'Aire à signaux & signaleur', html:`
<table>
<tr><th>Signal</th><th>Signification</th></tr>
<tr><td><b>T</b> blanc</td><td>Direction atterrissage/décollage (barre = seuil)</td></tr>
<tr><td><b>Croix blanche</b></td><td>Piste inutilisable / aérodrome fermé</td></tr>
<tr><td>Flèche rouge</td><td>Sens circuit (virages à droite si présente)</td></tr>
<tr><td>Haltère blanc</td><td>Mouvements au sol sur pistes/voies de circulation uniquement</td></tr>
<tr><td>Haltère + bandes noires</td><td>Prudence à l'atterrissage (travaux)</td></tr>
<tr><td><b>C</b> noir/fond jaune</td><td>Bureau de piste (reporting office)</td></tr>
</table>
<ul>
<li><b>Signaleur (marshaller)</b> : guide au sol par gestes des bras</li>
<li>Bras levés en V = <b>venez vers moi</b> ; bras croisés = <b>stop</b></li>
<li>Bras droit tourné = <b>virez à droite</b> (du point de vue pilote)</li>
</ul>`}
]},
/* ────────────────── 6. COMMUNICATIONS ────────────────── */
{
  id:'comm', icon:'📻', title:'Communications',
  subs:[
{t:'Alphabet OACI & fréquences', html:`
<table>
<tr><td>A Alfa</td><td>B Bravo</td><td>C Charlie</td><td>D Delta</td><td>E Echo</td><td>F Foxtrot</td><td>G Golf</td></tr>
<tr><td>H Hotel</td><td>I India</td><td>J Juliett</td><td>K Kilo</td><td>L Lima</td><td>M Mike</td><td>N November</td></tr>
<tr><td>O Oscar</td><td>P Papa</td><td>Q Quebec</td><td>R Romeo</td><td>S Sierra</td><td>T Tango</td><td>U Uniform</td></tr>
<tr><td>V Victor</td><td>W Whiskey</td><td>X X-ray</td><td>Y Yankee</td><td>Z Zulu</td><td></td><td></td></tr>
</table>
<ul>
<li>VHF communications : <b>118 – 136,975 MHz</b> ; espacement : <b>8,33 kHz</b></li>
<li><b>121,500 MHz</b> = fréquence détresse</li>
<li><b>123,500 MHz</b> = auto-info terrains sans fréquence</li>
</ul>`},
{t:'Indicatifs d\'appel', html:`
<ul>
<li>Au premier contact : indicatif <b>complet</b> (F-BOQS)</li>
<li>Abrégé = 1ère lettre + 2 dernières : F-BOQS → <b>F-QS</b></li>
<li>Après que le <b>contrôleur</b> l'a utilisé en premier</li>
<li>Tour = <b>Tower</b> ; Sol = <b>Ground</b> ; AFIS = <b>Radio</b> ; Info = <b>Info</b></li>
</ul>`},
{t:'Phraséologie standard', html:`
<table>
<tr><th>Terme</th><th>Signification</th></tr>
<tr><td>Affirm</td><td>Oui</td></tr>
<tr><td>Negative</td><td>Non</td></tr>
<tr><td>Roger</td><td>Reçu en entier</td></tr>
<tr><td>Wilco</td><td>Compris, sera exécuté</td></tr>
<tr><td>Say again</td><td>Répétez</td></tr>
<tr><td>Correction</td><td>Erreur, voici la version correcte</td></tr>
<tr><td>Break break</td><td>Séparation entre messages</td></tr>
</table>
<ul>
<li>Depuis 01/07/2023 : collationnement « <b>je décolle</b> » / « <b>j'atterris</b> »</li>
<li>Indicatif toujours en <b>dernier</b></li>
</ul>`},
{t:'Collationnement', html:`
<ul>
<li><b>Obligatoire</b> : calages alti, piste, clairances, codes transpondeur, cap, niveau</li>
<li><b>Ne PAS collationner</b> : vent, météo, informations de trafic</li>
<li>Échelle lisibilité : 1 (illisible) → 5 (parfait)</li>
</ul>`},
{t:'Détresse & urgence', html:`
<table>
<tr><th></th><th>Détresse</th><th>Urgence</th></tr>
<tr><td>Signal</td><td><b>MAYDAY ×3</b></td><td><b>PAN-PAN ×3</b></td></tr>
<tr><td>Danger</td><td>Grave et imminent</td><td>Pas immédiat</td></tr>
<tr><td>Priorité</td><td>N°1 absolue</td><td>N°2</td></tr>
</table>
<ul>
<li>Émettre sur la <b>fréquence en cours</b> d'abord ; sinon <b>121,500 MHz</b></li>
<li>Silence MAYDAY → silence radio total sur la fréquence</li>
</ul>`},
{t:'Panne radio', html:`
<table>
<tr><th>Situation</th><th>Action</th></tr>
<tr><td>Avant entrée classe D</td><td><b>Ne pas entrer</b></td></tr>
<tr><td>Déjà en classe D</td><td>Atterrir le + proche, guetter signaux visuels</td></tr>
<tr><td>Classe E</td><td>Poursuivre normalement</td></tr>
<tr><td>Au sol, contrôlé</td><td><b>Ne pas décoller</b></td></tr>
</table>
<ul>
<li>Transpondeur : <b>7600</b></li>
</ul>`},
{t:'Codes Q & énonciation', html:`
<table>
<tr><th>Code</th><th>Signification</th></tr>
<tr><td>QDM</td><td>Relèvement magnétique <b>vers</b> station</td></tr>
<tr><td>QDR</td><td>Relèvement magnétique <b>depuis</b> station</td></tr>
<tr><td>QTE</td><td>Relèvement vrai depuis station</td></tr>
</table>
<ul>
<li>Caps/relèvements : toujours <b>3 chiffres</b>, dits séparément</li>
<li>Fréquences : 3 premiers en nombre + « décimale » + suite</li>
<li>Heures en <b>UTC</b>, prononcées normalement si bonne lisibilité</li>
<li>Position trafic : cadran montre, nez = 12h, droite = 3h</li>
</ul>`},
{t:'Phraséologie détaillée & équipements', html:`
<table>
<tr><th>Situation</th><th>Annonce</th></tr>
<tr><td>Entrée fréquence</td><td>[Station] [indicatif complet] bonjour</td></tr>
<tr><td>Point d'attente</td><td>[indicatif] prêt au départ piste [QFU]</td></tr>
<tr><td>Après atterrissage</td><td>[indicatif] <b>piste dégagée</b></td></tr>
<tr><td>Traverser piste</td><td>Contrôleur : « <b>traversez</b> piste [QFU] »</td></tr>
<tr><td>Trafic non vu</td><td>Pilote : « <b>je surveille</b> »</td></tr>
<tr><td>Touch-and-go</td><td>Autorisé <b>option</b> = au choix remise de gaz / posé complet / touch-and-go</td></tr>
</table>
<ul>
<li><b>Squelch</b> : bouton radio qui supprime le bruit de fond (souffle)</li>

<tr><th>Vent</th><th>Décollage</th><th>Pente sol</th><th>Atterrissage</th></tr>
<tr><td>De face</td><td>↓ distance</td><td>↑ pente</td><td>↓ distance</td></tr>
<tr><td>Arrière</td><td>↑ distance</td><td>↓ pente</td><td>↑ distance</td></tr>

<ul>

<li><b>Centrage avant</b> : + stable, − maniable, conso ↑</li>
<li><b>Centrage arrière</b> : − stable, + maniable, conso ↓</li>

<tr><th>Masse</th><th>Définition</th></tr>
<tr><td><b>Masse à vide</b></td><td>Avion + huile + fluides non utilisables</td></tr>

/* ────────────────── 10. FICHES DE CALCUL ────────────────── */
{
  id:'calculs', icon:'🧮', title:'Fiches de calcul (exercices corrigés)',
  subs:[
{t:'Centrage (masse & balance)', html:`
<h3>Exercice : Centrage d'un Cessna 150</h3>
<table>
<tr><th>Poste</th><th>Masse (kg)</th><th>Bras (m)</th><th>Moment (m·kg)</th></tr>
<tr><td>Avion à vide</td><td>530</td><td>0,838</td><td>444,14</td></tr>
<tr><td>Carburant (50 L × 0,72)</td><td>36</td><td>1,07</td><td>38,52</td></tr>
<tr><td>Pilote + passager</td><td>150</td><td>0,99</td><td>148,50</td></tr>
<tr><td>Bagages zone 1</td><td>10</td><td>1,63</td><td>16,30</td></tr>
<tr><td class="ok"><b>TOTAL</b></td><td class="ok"><b>726</b></td><td></td><td class="ok"><b>647,46</b></td></tr>
</table>
<p><span class="formula">CG = Moment total / Masse totale = 647,46 / 726 = <b>0,892 m</b></span></p>
<ul>
<li>MTOW Cessna 150 = <b>726 kg</b> → ✅ Masse OK</li>
<li>Plage de centrage 150M : <b>0,800 – 0,956 m</b> → ✅ CG dans la plage</li>
<li class="warn">⚠️ Vérifier aussi le centrage à l'atterrissage (après consommation carburant) !</li>
<li class="formula">Carburant consommé : 25 L/h × 1,5 h = 37,5 L → 27 kg → nouveau moment = 647,46 − (27 × 1,07) = 618,57<br>Nouveau CG = 618,57 / 699 = <b>0,885 m</b> → ✅ OK</li>
</ul>`},
{t:'Correction altimétrique (altitude vraie)', html:`
<h3>Exercice : Altitude vraie</h3>
<ul>
<li><b>Données</b> : QNH = 1013 hPa, altitude indiquée = 5000 ft, température réelle = +5°C</li>
<li>Temp standard à 5000 ft = 15 − (2 × 5) = <b>+5°C</b> → pas d'écart → Alt vraie ≈ 5000 ft</li>
</ul>
<h3>Exercice 2 : Avec écart température</h3>
<ul>
<li><b>Données</b> : QNH = 1003 hPa, altitude indiquée = 3000 ft, température réelle = −5°C</li>
<li>Temp standard à 3000 ft = 15 − (2 × 3) = <b>+9°C</b></li>
<li>Écart = −5 − 9 = <b>−14°C</b> (atmosphère plus froide)</li>
<li class="formula">Correction = écart × (altitude / 1000) × 4 ft = −14 × 3 × 4 = <b>−168 ft</b></li>
<li>Correction pression : (1013 − 1003) × 28 = <b>−280 ft</b></li>
<li>Altitude vraie ≈ 3000 − 168 − 280 = <b>2552 ft</b></li>
<li class="warn">⚠️ Atmosphère plus froide → altitude vraie <b>plus basse</b> que l'altitude lue</li>
</ul>`},
{t:'Composante de vent traversier', html:`
<h3>Exercice : Vent traversier</h3>
<ul>
<li><b>Données</b> : Piste 24 (QFU 240°), vent 280°/20kt</li>
<li>Angle vent/piste = 280 − 240 = <b>40°</b></li>
<li class="formula">Composante traversière = Vvent × sin(angle) = 20 × sin(40°) = 20 × 0,64 = <b>13 kt</b></li>
<li class="formula">Composante face = Vvent × cos(angle) = 20 × cos(40°) = 20 × 0,77 = <b>15 kt face</b></li>
</ul>
<h3>Règles rapides (sans calculatrice)</h3>
<table>
<tr><th>Angle</th><th>sin ≈</th><th>cos ≈</th><th>Traversier</th><th>Face/arrière</th></tr>
<tr><td>30°</td><td>0,5</td><td>0,87</td><td>½ du vent</td><td>⅞ du vent</td></tr>
<tr><td>45°</td><td>0,71</td><td>0,71</td><td>¾ du vent</td><td>¾ du vent</td></tr>
<tr><td>60°</td><td>0,87</td><td>0,5</td><td>⅞ du vent</td><td>½ du vent</td></tr>
<tr><td>90°</td><td>1</td><td>0</td><td>100%</td><td>0</td></tr>
</table>
<ul>
<li class="warn">⚠️ Cessna 150 : composante traversière max démontrée = <b>12 kt</b></li>
</ul>`},
{t:'Autonomie & distance franchissable', html:`
<h3>Exercice : Autonomie carburant</h3>
<ul>
<li><b>Données</b> : Réservoir = 85 L utilisables, conso = 25 L/h, réserve jour = 30 min</li>
<li class="formula">Carburant utilisable pour navigation = 85 − (25 × 0,5) = 85 − 12,5 = <b>72,5 L</b></li>
<li class="formula">Autonomie = 72,5 / 25 = <b>2h54</b></li>
<li class="formula">Si TAS = 90 kt : Distance max = 90 × 2,9 = <b>261 NM</b></li>
</ul>
<h3>Exercice 2 : Avec vent</h3>
<ul>
<li><b>Données</b> : TAS 90 kt, vent face 15 kt, conso 25 L/h, carburant 60 L</li>
<li class="formula">GS = 90 − 15 = <b>75 kt</b></li>
<li class="formula">Autonomie = 60 / 25 = <b>2h24</b></li>
<li class="formula">Distance aller = 75 × 2,4 = <b>180 NM</b></li>
<li class="warn">⚠️ Retour : GS = 90 + 15 = 105 kt → autonomie inchangée mais distance de retour ≠ aller</li>
</ul>`},
{t:'Cap magnétique & dérive', html:`
<h3>Exercice : Calcul du cap</h3>
<ul>
<li><b>Données</b> : Route vraie = 135°, déclinaison = −2° (W), vent 180°/20kt, TAS 90kt</li>
<li>Route magn = Rv + déclin = 135 + 2 = <b>137°</b> (Ouest = ajouter)</li>
<li>Angle vent/route = 180 − 135 = <b>45°</b> → vent de droite = dérive gauche</li>
<li class="formula">Dérive ≈ (Vvent / TAS) × 60 × sin(angle) = (20/90) × 60 × 0,71 ≈ <b>9° gauche</b></li>
<li>Cap magn = 137 + 9 = <b>146°</b> (corriger vers le vent)</li>
<li>Dév compas = +1° → Cap compas = 146 − 1 = <b>145°</b></li>
</ul>
<p class="formula"><b>Mnémonique</b> : Rv + Dm = Rm + Xm = Cm ± Déviation = Cc</p>`},
{t:'Conversions courantes', html:`
<h3>Conversions à connaître</h3>
<table>
<tr><th>De</th><th>Vers</th><th>Facteur</th><th>Exemple</th></tr>
<tr><td>NM</td><td>km</td><td>× 1,852</td><td>10 NM = 18,52 km</td></tr>

]}
]; // end FICHES

/* ============================================================
   UI LOGIC
   ============================================================ */
let activeCat = null;
let activeSub = null;

const $grid = document.getElementById('fcatGrid');
const $subRow = document.getElementById('fsubRow');
const $content = document.getElementById('ficheContent');
const $search = document.getElementById('ficheSearchInput');

/* Build category grid */
function buildGrid() {
  $grid.innerHTML = '';
  let totalWords = 0;
  FICHES.forEach(cat => {
    // Calculate reading time for this category
    let catWords = 0;
    cat.subs.forEach(s => {
      const tmp = document.createElement('div'); tmp.innerHTML = s.html;
      catWords += (tmp.textContent || '').split(/\s+/).filter(Boolean).length;
    });
    totalWords += catWords;
    const catMin = Math.max(1, Math.round(catWords / 180));
    const btn = document.createElement('button');
    btn.className = 'fcat-btn' + (activeCat === cat.id ? ' active' : '');
    btn.innerHTML = cat.icon + ' ' + cat.title + '<span class="fcat-count">' + cat.subs.length + ' sous-thèmes</span><span class="fcat-time">⏱ ~' + catMin + ' min de lecture</span>';
    btn.onclick = () => { activeCat = (activeCat === cat.id) ? null : cat.id; activeSub = null; buildGrid(); buildSubs(); buildContent(); };
    $grid.appendChild(btn);
  });
  // Total reading time
  let $total = document.getElementById('fichesTotalTime');
  if (!$total) {
    $total = document.createElement('div');
    $total.id = 'fichesTotalTime';
    $total.className = 'fiches-total-time';
    $grid.parentNode.insertBefore($total, $grid.nextSibling);
  }
  const totalMin = Math.max(1, Math.round(totalWords / 180));
  $total.innerHTML = '📚 Temps de lecture total : <span>~' + totalMin + ' min</span> (' + FICHES.reduce((n,c)=>n+c.subs.length,0) + ' fiches)';
}

/* Build sub-category pills */
function buildSubs() {
  $subRow.innerHTML = '';
  if (!activeCat) return;
  const cat = FICHES.find(c => c.id === activeCat);
  if (!cat) return;
  // "Tout" pill
  const all = document.createElement('button');
  all.className = 'fsub-pill' + (activeSub === null ? ' active' : '');
  all.textContent = '📄 Tout afficher';
  all.onclick = () => { activeSub = null; buildSubs(); buildContent(); };
  $subRow.appendChild(all);
  cat.subs.forEach((s, i) => {
    const pill = document.createElement('button');
    pill.className = 'fsub-pill' + (activeSub === i ? ' active' : '');
    pill.textContent = s.t;
    pill.onclick = () => { activeSub = (activeSub === i) ? null : i; buildSubs(); buildContent(); };
    $subRow.appendChild(pill);
  });
}

/* Build content */
function buildContent() {
  $content.innerHTML = '';
  if (!activeCat) {
    // Show welcome
    $content.innerHTML = '<div class="fiche-card" style="text-align:center;padding:30px 20px"><h3 style="border:none;font-size:1.2em">S&#xe9;lectionnez une cat&#xe9;gorie ci-dessus</h3><p style="color:var(--text-secondary)">9 cat&#xe9;gories, ' + FICHES.reduce((n,c)=>n+c.subs.length,0) + ' fiches m&#xe9;mo couvrant ~80% des questions du quiz.<br>Chaque fiche est synth&#xe9;tique et organis&#xe9;e par th&#xe8;me.<br>Utilisez la recherche pour trouver un sujet pr&#xe9;cis.</p></div>';
    /* Hide TTS player when no category selected */
    var _pp=document.getElementById('tts-fiches');if(_pp)_pp.style.display='none';
    if(typeof _ttsStop==='function')_ttsStop('tts-fiches');
    return;
  }
  const cat = FICHES.find(c => c.id === activeCat);
  if (!cat) return;
  const subs = activeSub !== null ? [cat.subs[activeSub]] : cat.subs;
  subs.forEach(s => {
    const sec = document.createElement('div');
    sec.className = 'fiche-section';
    const hdr = document.createElement('div');
    hdr.className = 'fiche-section-hdr open';
    hdr.innerHTML = '<span class="chevron">&#x25B6;</span> ' + s.t;
    const body = document.createElement('div');
    body.className = 'fiche-section-body show';
    const card = document.createElement('div');
    card.className = 'fiche-card';
    card.innerHTML = s.html;
    body.appendChild(card);
    hdr.onclick = () => { hdr.classList.toggle('open'); body.classList.toggle('show'); };
    sec.appendChild(hdr);
    sec.appendChild(body);
    $content.appendChild(sec);
  });
  /* Update TTS player text for this category/sub */
  var _pp=document.getElementById('tts-fiches');if(_pp)_pp.style.display='';
  if(typeof _ttsHtmlToText==='function'&&typeof _ttsSetText==='function'){
    var _txt=subs.map(function(s){return s.t+'. '+_ttsHtmlToText(s.html);}).join('. ');
    _ttsSetText('tts-fiches',_txt);
  }
}

/* Search — multi-word, real-time, result count, clear */
const $info = document.getElementById('ficheSearchInfo');
const $clear = document.getElementById('ficheSearchClear');
let searchTimer = null;

function ficheSearch() {
  const raw = ($search.value || '').trim();
  $clear.style.display = raw ? 'inline' : 'none';
  if (!raw) { $info.style.display='none'; activeCat = null; activeSub = null; buildGrid(); buildSubs(); buildContent(); return; }
  const words = raw.toLowerCase().split(/\s+/).filter(Boolean);
  $subRow.innerHTML = '';
  activeCat = null; activeSub = null; buildGrid();
  $content.innerHTML = '';
  let found = 0;
  FICHES.forEach(cat => {
    cat.subs.forEach(s => {
      const tmp = document.createElement('div'); tmp.innerHTML = s.html;
      const text = (s.t + ' ' + tmp.textContent).toLowerCase();
      // All words must match
      if (!words.every(w => text.includes(w))) return;
      found++;
      const sec = document.createElement('div'); sec.className = 'fiche-section';
      const hdr = document.createElement('div'); hdr.className = 'fiche-section-hdr open';
      hdr.innerHTML = '<span class="chevron">▶</span> ' + cat.icon + ' ' + cat.title + ' › ' + s.t;
      const body = document.createElement('div'); body.className = 'fiche-section-body show';
      const card = document.createElement('div'); card.className = 'fiche-card';
      let h = s.html;
      // Highlight each word
      words.forEach(w => {
        const re = new RegExp('(' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        h = h.replace(re, '<mark style="background:#e65100;color:#fff;padding:0 2px;border-radius:2px">$1</mark>');
      });
      card.innerHTML = h;
      body.appendChild(card);
      hdr.onclick = () => { hdr.classList.toggle('open'); body.classList.toggle('show'); };
      sec.appendChild(hdr); sec.appendChild(body);
      $content.appendChild(sec);
    });
  });
  $info.style.display = 'block';
  $info.textContent = found ? found + ' fiche' + (found>1?'s':'') + ' trouvée' + (found>1?'s':'') + ' pour « ' + raw + ' »' : 'Aucun résultat pour « ' + raw + ' »';
  if (!found) $content.innerHTML = '<div class="fiche-card" style="text-align:center;padding:20px"><p>Aucun résultat pour « ' + raw + ' »</p></div>';
}

// Real-time search with debounce
$search.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const v = $search.value.trim();
  $clear.style.display = v ? 'inline' : 'none';
  if (!v) { $info.style.display='none'; activeCat=null; activeSub=null; buildGrid(); buildSubs(); buildContent(); return; }
  searchTimer = setTimeout(ficheSearch, 300);
});
$search.addEventListener('keydown', e => { if (e.key === 'Enter') { clearTimeout(searchTimer); ficheSearch(); } });
$clear.addEventListener('click', () => { $search.value=''; $clear.style.display='none'; $info.style.display='none'; activeCat=null; activeSub=null; buildGrid(); buildSubs(); buildContent(); $search.focus(); });

/* Theme toggle */
(function(){
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
})();

/* Init */
buildGrid();
buildSubs();
buildContent();

/* ===== TTS PLAYER ENGINE ===== */
(function(){
  var _S={text:'',charOffset:0,totalChars:0,playing:false,paused:false,rate:1.0,dur:0,activeId:null};
  var _CPS=14,_seeking=false;
  function _fmt(s){s=Math.max(0,Math.floor(s));return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);}
  function _dur(txt,r){return Math.max(1,txt.length/(_CPS*r));}
  function _setBtn(pid,state){
    var p=document.getElementById(pid);if(!p)return;
    var b=p.querySelector('.tts-playbtn');if(!b)return;
    if(state==='playing'){b.innerHTML='&#x23F8;';b.style.background='linear-gradient(135deg,#ffa726,#f57c00)';}
    else{b.innerHTML='&#x25B6;';b.style.background='linear-gradient(135deg,#667eea,#764ba2)';}
  }
  function _setProg(pid,pct,ela,tot){
    var p=document.getElementById(pid);if(!p)return;
    var fill=p.querySelector('.tts-fill');if(fill)fill.style.width=Math.min(100,pct)+'%';
    var seek=p.querySelector('.tts-seek');if(seek&&!_seeking)seek.value=Math.min(100,pct);
    var tim=p.querySelector('.tts-time');if(tim)tim.textContent=_fmt(ela)+' / '+_fmt(tot);
  }
  function _speak(pid){
    if(!_S.text)return;
    var snippet=_S.text.substring(_S.charOffset);
    if(!snippet.trim()){_S.charOffset=0;snippet=_S.text;}
    var utt=new SpeechSynthesisUtterance(snippet);
    utt.lang='fr-FR';utt.rate=_S.rate;
    _S.playing=true;_S.paused=false;
    _setBtn(pid,'playing');
    var t0=Date.now(),sc=_S.charOffset;
    utt.onboundary=function(e){
      if(_seeking)return;
      var abs=sc+(e.charIndex||0);_S.charOffset=abs;
      var pct=_S.totalChars>0?abs/_S.totalChars*100:0;
      var ela=sc/(_CPS*_S.rate)+(Date.now()-t0)/1000;
      _setProg(pid,pct,ela,_S.dur);
    };
    utt.onend=function(){_S.playing=false;_S.paused=false;_S.charOffset=0;_setBtn(pid,'stopped');_setProg(pid,0,0,_S.dur);};
    utt.onerror=function(){_S.playing=false;_setBtn(pid,'stopped');};
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utt);
  }
  window._ttsHtmlToText=function(html){
    var d=document.createElement('div');d.innerHTML=html;
    d.querySelectorAll('script,style').forEach(function(e){e.remove();});
    d.querySelectorAll('h1,h2,h3,h4,h5,li,td,th').forEach(function(e){e.insertAdjacentText('afterend','. ');});
    return (d.textContent||'').replace(/\.{2,}/g,'.').replace(/\s+/g,' ').trim();
  };
  window._ttsSetText=function(pid,txt){
    window.speechSynthesis.cancel();
    _S.text=(txt||'').trim();_S.totalChars=_S.text.length;
    _S.charOffset=0;_S.playing=false;_S.paused=false;_S.activeId=pid;
    _S.dur=_dur(_S.text,_S.rate);
    _setBtn(pid,'stopped');_setProg(pid,0,0,_S.dur);
    // Restore speed slider label
    var p=document.getElementById(pid);if(!p)return;
    var sl=p.querySelector('.tts-rate-slider');if(sl)sl.value=Math.round(_S.rate*10);
    var lb=p.querySelector('.tts-rate-lbl');if(lb)lb.textContent='\u00d7'+_S.rate.toFixed(1);
  };
  window._ttsToggle=function(pid){
    if(_S.activeId&&_S.activeId!==pid){_setBtn(_S.activeId,'stopped');window.speechSynthesis.cancel();_S.playing=false;_S.paused=false;}
    _S.activeId=pid;
    if(_S.playing){window.speechSynthesis.pause();_S.playing=false;_S.paused=true;_setBtn(pid,'stopped');return;}
    if(_S.paused&&window.speechSynthesis.paused){window.speechSynthesis.resume();_S.playing=true;_S.paused=false;_setBtn(pid,'playing');return;}
    _speak(pid);
  };
  window._ttsStop=function(pid){window.speechSynthesis.cancel();_S.playing=false;_S.paused=false;_S.charOffset=0;_setBtn(pid,'stopped');_setProg(pid,0,0,_S.dur);};
  window._ttsSeekStart=function(){_seeking=true;if(_S.playing)window.speechSynthesis.pause();};
  window._ttsSeekEnd=function(pid,val){
    _seeking=false;
    var was=_S.playing||(_S.paused&&window.speechSynthesis.paused);
    window.speechSynthesis.cancel();_S.playing=false;_S.paused=false;
    _S.charOffset=Math.round(val/100*_S.totalChars);
    _setProg(pid,val,val/100*_S.dur,_S.dur);
    if(was)_speak(pid);
  };
  window._ttsSetRate=function(pid,rate){
    var was=_S.playing||_S.paused;
    window.speechSynthesis.cancel();_S.playing=false;_S.paused=false;
    _S.rate=rate;_S.dur=_dur(_S.text,rate);
    _setProg(pid,_S.totalChars>0?_S.charOffset/_S.totalChars*100:0,0,_S.dur);
    if(was)_speak(pid);
  };
})();
})();
  </script>

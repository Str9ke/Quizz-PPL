  <style>
.urg-wrap{max-width:900px;margin:0 auto;padding:0 8px 60px}
.urg-hero{text-align:center;padding:1.5rem 1rem 1rem;background:linear-gradient(135deg,#3e1a1a 0%,#4e1b2d 50%,#3e1a1a 100%);position:relative;overflow:hidden;margin-bottom:16px}
.urg-hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 50%,rgba(234,102,102,.08) 0%,transparent 50%);pointer-events:none}
.urg-hero-icon{font-size:2.5rem}
.urg-hero-title{font-size:1.5rem;font-weight:800;margin:4px 0 0;background:linear-gradient(135deg,#ff6b6b,#ee5a24,#f9ca24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.urg-hero-sub{font-size:.75rem;color:rgba(160,160,184,.6);margin-top:2px}
body.light .urg-hero{background:linear-gradient(135deg,#fff0f0 0%,#ffe0e8 50%,#fff0f0 100%)}
body.light .urg-hero-title{background:linear-gradient(135deg,#c0392b,#e74c3c,#d35400);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Category nav */
.urg-cats{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px;justify-content:center}
.urg-cat-btn{padding:8px 14px;font-size:.8em;font-weight:700;border-radius:20px;cursor:pointer;border:1.5px solid var(--border-color);background:transparent;color:var(--text-secondary);transition:all .2s}
.urg-cat-btn:hover{border-color:#ff6b6b;color:#ff6b6b}
.urg-cat-btn.active{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;border-color:transparent}

/* Procedure cards */
.urg-card{background:var(--bg-container);border:1px solid var(--border-color);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.urg-card-hdr{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;font-weight:700;font-size:.95em;transition:all .2s;user-select:none}
.urg-card-hdr:hover{background:rgba(255,107,107,.06)}
.urg-card-hdr .chevron{transition:transform .25s;font-size:.7em;opacity:.6}
.urg-card-hdr.open .chevron{transform:rotate(90deg)}
.urg-card-body{display:none;padding:0 16px 16px}
.urg-card-body.show{display:block}

/* Step list */
.urg-steps{list-style:none;padding:0;margin:0;counter-reset:step}
.urg-steps li{position:relative;padding:8px 10px 8px 40px;border-radius:8px;margin-bottom:4px;font-size:.88em;line-height:1.5}
.urg-steps li::before{counter-increment:step;content:counter(step);position:absolute;left:8px;top:8px;width:22px;height:22px;border-radius:50%;font-size:.75em;font-weight:800;display:flex;align-items:center;justify-content:center}

/* Color coding by action type */
.urg-steps li.action-control{background:rgba(102,126,234,.08);border-left:3px solid #667eea}
.urg-steps li.action-control::before{background:#667eea;color:#fff}
.urg-steps li.action-fuel{background:rgba(255,152,0,.08);border-left:3px solid #ff9800}
.urg-steps li.action-fuel::before{background:#ff9800;color:#fff}
.urg-steps li.action-elec{background:rgba(156,39,176,.08);border-left:3px solid #9c27b0}
.urg-steps li.action-elec::before{background:#9c27b0;color:#fff}
.urg-steps li.action-fire{background:rgba(244,67,54,.08);border-left:3px solid #f44336}
.urg-steps li.action-fire::before{background:#f44336;color:#fff}
.urg-steps li.action-flight{background:rgba(76,175,80,.08);border-left:3px solid #4caf50}
.urg-steps li.action-flight::before{background:#4caf50;color:#fff}
.urg-steps li.action-warn{background:rgba(255,235,59,.08);border-left:3px solid #fdd835}
.urg-steps li.action-warn::before{background:#fdd835;color:#333}
.urg-steps li.action-comms{background:rgba(0,188,212,.08);border-left:3px solid #00bcd4}
.urg-steps li.action-comms::before{background:#00bcd4;color:#fff}

.urg-note{font-size:.82em;color:var(--text-secondary);background:rgba(255,107,107,.06);padding:8px 12px;border-radius:8px;margin-top:8px;border-left:3px solid #ff6b6b}
.urg-note b{color:#ff6b6b}
.urg-legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:8px 0 16px;font-size:.75em}
.urg-legend span{display:flex;align-items:center;gap:4px}
.urg-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block}

/* Speed badges */
.urg-speed{display:inline-block;padding:2px 8px;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:700;font-size:.85em;margin:0 2px}

/* Print */
@media print{
  .top-nav-bar,.urg-cats,.urg-hero,#themeToggleBtn{display:none!important}
  .urg-card-body{display:block!important}
  body{background:#fff;color:#000}
}

  // "All" button
  const allBtn = document.createElement('button');
  allBtn.className = 'urg-cat-btn' + (activeCat === null ? ' active' : '');
  allBtn.textContent = '📋 Toutes';
  allBtn.onclick = () => { activeCat = null; buildCats(); buildContent(); };
  $cats.appendChild(allBtn);
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'urg-cat-btn' + (activeCat === c.id ? ' active' : '');
    btn.textContent = c.icon + ' ' + c.label;
    btn.onclick = () => { activeCat = (activeCat === c.id) ? null : c.id; buildCats(); buildContent(); };
    $cats.appendChild(btn);
  });
}

function buildContent() {
  $content.innerHTML = '';
  const procs = activeCat ? PROCEDURES.filter(p => p.cat === activeCat) : PROCEDURES;
  procs.forEach(proc => {
    const card = document.createElement('div');
    card.className = 'urg-card';
    const hdr = document.createElement('div');
    hdr.className = 'urg-card-hdr open';
    hdr.innerHTML = '<span class="chevron">▶</span> ' + proc.icon + ' ' + proc.title;
    // Color the header based on category
    const catColors = {engine:'#667eea', fire:'#f44336', landing:'#4caf50', special:'#ff9800', elec:'#9c27b0', motor:'#00bcd4'};
    hdr.style.borderLeft = '4px solid ' + (catColors[proc.cat] || '#667eea');
    const body = document.createElement('div');
    body.className = 'urg-card-body show';
    let stepsHtml = '<ol class="urg-steps">';
    proc.steps.forEach(s => {
      stepsHtml += '<li class="' + s.cls + '">' + s.txt + '</li>';
    });
    stepsHtml += '</ol>';
    if (proc.note) {
      stepsHtml += '<div class="urg-note"><b>⚠️ Note :</b> ' + proc.note + '</div>';
    }
    body.innerHTML = stepsHtml;
    hdr.onclick = () => { hdr.classList.toggle('open'); body.classList.toggle('show'); };
    card.appendChild(hdr);
    card.appendChild(body);
    $content.appendChild(card);
  });
}

/* Theme */
(function(){
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
})();

buildCats();
buildContent();
})();
  </script>
</body>
</html>

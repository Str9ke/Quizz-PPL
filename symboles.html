  <style>
    .sym-config { max-width: 700px; margin: 0 auto; }

    .sym-cat-btn:hover { border-color: #667eea; color: #667eea; }

    .sym-mode-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 10px 0; }
    .sym-mode-btn { padding: 8px 20px; font-size: 0.88em; font-weight: 600; border-radius: 20px; cursor: pointer; border: 1px solid var(--border-color); background: transparent; color: var(--text-secondary); transition: all 0.2s; }

    .sym-quiz-area { max-width: 700px; margin: 0 auto; }
    .sym-progress { text-align: center; font-size: 0.85em; color: var(--text-secondary); margin-bottom: 8px; }
    .sym-progress-bar { height: 4px; background: var(--border-color); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
    .sym-progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 2px; transition: width 0.3s; }
    .sym-question-card { background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; margin-bottom: 14px; }
    .sym-q-label { font-size: 0.75em; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

    .sym-choice .sym-choice-svg { display: inline-block; vertical-align: middle; margin-right: 8px; }
    .sym-choice .sym-choice-svg svg { width: 44px; height: 30px; vertical-align: middle; }
    .sym-q-cat { font-size: 0.72em; color: var(--text-secondary); text-align: center; margin-bottom: 12px; }
    .sym-choices { display: flex; flex-direction: column; gap: 8px; }
    .sym-choice { padding: 12px 16px; font-size: 0.92em; border-radius: 10px; cursor: pointer; border: 1.5px solid var(--border-color); background: transparent; color: var(--text-primary); transition: all 0.2s; text-align: left; font-weight: 500; }
    .sym-choice:hover:not(.sym-locked) { border-color: #667eea; background: rgba(102,126,234,0.06); }

    .sym-result { text-align: center; padding: 30px 20px; }

</head>

      SYM_IMAGES['Train sorti + phares (intercepté)'] = S(100,60,'<g transform="translate(50,24)"><line x1="-28" y1="0" x2="28" y2="0" stroke="#2ecc71" stroke-width="2"/><line x1="0" y1="-6" x2="0" y2="12" stroke="#2ecc71" stroke-width="2.5"/><circle cx="-12" cy="16" r="3" fill="#333" stroke="#2ecc71" stroke-width="1"/><circle cx="12" cy="16" r="3" fill="#333" stroke="#2ecc71" stroke-width="1"/></g><circle cx="50" cy="14" r="4" fill="#f1c40f" opacity=".8"><animate attributeName="opacity" values=".4;1;.4" dur="0.6s" repeatCount="indefinite"/></circle><text x="50" y="54" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">train + phares</text>');
      // Gear up over runway
      SYM_IMAGES['Train rentré en survolant piste (intercepté)'] = S(100,60,'<rect x="15" y="44" width="70" height="4" rx="1" fill="#888" opacity=".4"/><g transform="translate(50,28)"><line x1="-24" y1="0" x2="24" y2="0" stroke="#e74c3c" stroke-width="2"/><line x1="0" y1="-6" x2="0" y2="8" stroke="#e74c3c" stroke-width="2.5"/></g><line x1="30" y1="24" x2="70" y2="24" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,2"/><text x="50" y="56" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">inadéquat</text>');
      // Irregular flashing
      SYM_IMAGES['Feux à éclats irréguliers (intercepté)'] = S(100,60,'<g transform="translate(50,28)"><line x1="-24" y1="0" x2="24" y2="0" stroke="#888" stroke-width="2"/><line x1="0" y1="-6" x2="0" y2="8" stroke="#888" stroke-width="2.5"/></g><circle cx="34" cy="22" r="4" fill="#f1c40f"><animate attributeName="opacity" values="1;0;1;0;0;1" dur="1s" repeatCount="indefinite"/></circle><circle cx="66" cy="22" r="4" fill="#f1c40f"><animate attributeName="opacity" values="0;1;0;1;1;0" dur="1s" repeatCount="indefinite"/></circle><text x="50" y="54" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">en détresse</text>');
      // Climb signal
      SYM_IMAGES["Cabrer et allumer/éteindre phares (intercepteur)"] = S(100,60,'<path d="M20,42 Q40,18 70,12" stroke="#444" stroke-width="2.5" fill="none"/><polygon points="65,7 75,12 67,17" fill="#444"/><circle cx="55" cy="18" r="4" fill="#f1c40f"><animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite"/></circle><text x="50" y="56" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">montez</text>');

      // === SIGNAUX DE MARSHALLING ===
      function marshFig(headX,headY,lArm,rArm,label,extras) {
        extras = extras || '';
        return S(90,80,'<circle cx="'+headX+'" cy="'+headY+'" r="6" fill="#333"/><line x1="'+headX+'" y1="'+(headY+6)+'" x2="'+headX+'" y2="'+(headY+28)+'" stroke="#333" stroke-width="2.5"/><line x1="'+headX+'" y1="'+(headY+28)+'" x2="'+(headX-8)+'" y2="'+(headY+42)+'" stroke="#333" stroke-width="2"/><line x1="'+headX+'" y1="'+(headY+28)+'" x2="'+(headX+8)+'" y2="'+(headY+42)+'" stroke="#333" stroke-width="2"/>'+lArm+rArm+extras+'<text x="45" y="76" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">'+label+'</text>');
      }
      // Come ahead
      SYM_IMAGES['Bras repliés, paumes vers soi'] = marshFig(45,8,'<line x1="45" y1="16" x2="30" y2="24" stroke="#333" stroke-width="2"/><line x1="30" y1="24" x2="34" y2="16" stroke="#333" stroke-width="2"/>','<line x1="45" y1="16" x2="60" y2="24" stroke="#333" stroke-width="2"/><line x1="60" y1="24" x2="56" y2="16" stroke="#333" stroke-width="2"/>','avancez');
      // Arms up = this bay
      SYM_IMAGES['Bras levés au-dessus de la tête'] = marshFig(45,12,'<line x1="45" y1="20" x2="32" y2="6" stroke="#333" stroke-width="2.5"/>','<line x1="45" y1="20" x2="58" y2="6" stroke="#333" stroke-width="2.5"/>','ce poste-ci','<circle cx="32" cy="4" r="3" fill="#f1c40f"/><circle cx="58" cy="4" r="3" fill="#f1c40f"/>');
      // Turn left
      SYM_IMAGES['Bras droit tendu, mouvement du gauche'] = marshFig(45,8,'<line x1="45" y1="16" x2="26" y2="20" stroke="#333" stroke-width="2.5"/>','<line x1="45" y1="16" x2="64" y2="16" stroke="#333" stroke-width="2.5"/><path d="M60,10 L64,16 L60,22" stroke="#f39c12" stroke-width="2" fill="none"/>','tournez G');
      // Turn right
      SYM_IMAGES['Bras gauche tendu, mouvement du droit'] = marshFig(45,8,'<line x1="45" y1="16" x2="26" y2="16" stroke="#333" stroke-width="2.5"/><path d="M30,10 L26,16 L30,22" stroke="#f39c12" stroke-width="2" fill="none"/>','<line x1="45" y1="16" x2="64" y2="20" stroke="#333" stroke-width="2.5"/>','tournez D');
      // Slow down
      SYM_IMAGES['Bras écartés puis ramenés lentement'] = marshFig(45,8,'<line x1="45" y1="16" x2="24" y2="22" stroke="#333" stroke-width="2.5"/>','<line x1="45" y1="16" x2="66" y2="22" stroke="#333" stroke-width="2.5"/>','ralentissez','<path d="M24,26 L34,22" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="2,2"/><path d="M66,26 L56,22" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="2,2"/>');
      // Stop
      SYM_IMAGES['Bras croisés au-dessus de la tête'] = marshFig(45,12,'<line x1="45" y1="20" x2="58" y2="4" stroke="#e74c3c" stroke-width="2.5"/>','<line x1="45" y1="20" x2="32" y2="4" stroke="#e74c3c" stroke-width="2.5"/>','STOP');
      // Cut engines
      SYM_IMAGES['Main au cou, tranchant (coupez)'] = marshFig(45,8,'<line x1="45" y1="16" x2="34" y2="12" stroke="#333" stroke-width="2.5"/>','<line x1="45" y1="16" x2="56" y2="20" stroke="#333" stroke-width="2"/>','coupez moteurs','<line x1="30" y1="10" x2="44" y2="10" stroke="#e74c3c" stroke-width="2"/>');
      // Start engines
      SYM_IMAGES['Main en rotation devant la tête'] = marshFig(45,8,'<line x1="45" y1="16" x2="56" y2="20" stroke="#333" stroke-width="2"/>','<line x1="45" y1="16" x2="34" y2="20" stroke="#333" stroke-width="2"/>','démarrez','<path d="M30,6 A10,10 0 1,1 30,5.9" fill="none" stroke="#2ecc71" stroke-width="1.5"/><polygon points="34,2 30,6 34,10" fill="#2ecc71"/>');
      // Chocks in
      SYM_IMAGES['Mains vers le bas, paumes en bas'] = marshFig(45,8,'<line x1="45" y1="16" x2="30" y2="28" stroke="#333" stroke-width="2.5"/>','<line x1="45" y1="16" x2="60" y2="28" stroke="#333" stroke-width="2.5"/>','cales','<line x1="26" y1="28" x2="34" y2="28" stroke="#f39c12" stroke-width="1.5"/><line x1="56" y1="28" x2="64" y2="28" stroke="#f39c12" stroke-width="1.5"/>');
      // Chocks away
      SYM_IMAGES["Mains vers l'extérieur, paumes en haut"] = marshFig(45,8,'<line x1="45" y1="16" x2="24" y2="14" stroke="#333" stroke-width="2.5"/>','<line x1="45" y1="16" x2="66" y2="14" stroke="#333" stroke-width="2.5"/>','dé-calez','<polygon points="20,12 24,8 24,16" fill="#2ecc71"/><polygon points="70,12 66,8 66,16" fill="#2ecc71"/>');
      // All clear
      SYM_IMAGES['Bras droit en angle, pouce levé'] = marshFig(45,8,'<line x1="45" y1="16" x2="60" y2="8" stroke="#333" stroke-width="2.5"/>','<line x1="45" y1="16" x2="32" y2="24" stroke="#333" stroke-width="2"/>','paré','<circle cx="62" cy="5" r="3" fill="#2ecc71"/>');
      // Guidance finished
      SYM_IMAGES['Deux bras levés à 45° vers le haut'] = marshFig(45,10,'<line x1="45" y1="18" x2="28" y2="4" stroke="#333" stroke-width="2.5"/>','<line x1="45" y1="18" x2="62" y2="4" stroke="#333" stroke-width="2.5"/>','guidage fini');

      // === MARQUAGES DE PISTE ===
      SYM_IMAGES['Chiffres peints (ex : 09/27)'] = S(80,50,'<rect x="2" y="2" width="76" height="46" rx="4" fill="#555"/><text x="40" y="36" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">09</text>');
      SYM_IMAGES['Ligne axiale pointillée'] = S(120,30,'<rect x="0" y="0" width="120" height="30" fill="#555"/><line x1="5" y1="15" x2="115" y2="15" stroke="#fff" stroke-width="2" stroke-dasharray="10,8"/>');
      SYM_IMAGES['Seuil (bandes transversales)'] = S(100,50,'<rect x="0" y="0" width="100" height="50" fill="#555"/><rect x="10" y="4" width="4" height="42" fill="#fff"/><rect x="20" y="4" width="4" height="42" fill="#fff"/><rect x="30" y="4" width="4" height="42" fill="#fff"/><rect x="40" y="4" width="4" height="42" fill="#fff"/><rect x="50" y="4" width="4" height="42" fill="#fff"/><rect x="60" y="4" width="4" height="42" fill="#fff"/><rect x="70" y="4" width="4" height="42" fill="#fff"/><rect x="80" y="4" width="4" height="42" fill="#fff"/>');
      SYM_IMAGES['Flèches ◄ avant seuil décalé'] = S(100,50,'<rect x="0" y="0" width="100" height="50" fill="#555"/><polygon points="22,25 38,18 38,32" fill="#fff"/><polygon points="52,25 68,18 68,32" fill="#fff"/>');
      SYM_IMAGES['Zone de toucher des roues (rectangles)'] = S(120,50,'<rect x="0" y="0" width="120" height="50" fill="#555"/><rect x="10" y="10" width="18" height="4" fill="#fff"/><rect x="10" y="36" width="18" height="4" fill="#fff"/><rect x="40" y="10" width="18" height="4" fill="#fff"/><rect x="40" y="36" width="18" height="4" fill="#fff"/><rect x="70" y="10" width="18" height="4" fill="#fff"/><rect x="70" y="36" width="18" height="4" fill="#fff"/>');
      SYM_IMAGES["Point d'attente piste (lignes continues + pointillées)"] = S(100,40,'<rect x="0" y="0" width="100" height="40" fill="#555"/><line x1="5" y1="14" x2="95" y2="14" stroke="#f1c40f" stroke-width="2.5"/><line x1="5" y1="20" x2="95" y2="20" stroke="#f1c40f" stroke-width="2.5"/><line x1="5" y1="26" x2="95" y2="26" stroke="#f1c40f" stroke-width="2" stroke-dasharray="5,4"/><line x1="5" y1="32" x2="95" y2="32" stroke="#f1c40f" stroke-width="2" stroke-dasharray="5,4"/>');
      SYM_IMAGES['Ligne axiale jaune (TWY)'] = S(120,30,'<rect x="0" y="0" width="120" height="30" fill="#555"/><line x1="5" y1="15" x2="115" y2="15" stroke="#f1c40f" stroke-width="3"/>');
      SYM_IMAGES['Panneau rouge + inscription blanche'] = S(80,40,'<rect x="4" y="4" width="72" height="32" rx="3" fill="#c0392b" stroke="#fff" stroke-width="1.5"/><text x="40" y="26" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">09-27</text>');
      SYM_IMAGES['Panneau jaune/noir (direction)'] = S(90,40,'<rect x="4" y="4" width="82" height="32" rx="3" fill="#f1c40f"/><text x="45" y="26" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#111" text-anchor="middle">← A3</text>');
      SYM_IMAGES['Chevrons blancs (zone fermée)'] = S(100,50,'<rect x="0" y="0" width="100" height="50" fill="#555"/><polyline points="10,40 25,10 40,40" fill="none" stroke="#fff" stroke-width="2.5"/><polyline points="35,40 50,10 65,40" fill="none" stroke="#fff" stroke-width="2.5"/><polyline points="60,40 75,10 90,40" fill="none" stroke="#fff" stroke-width="2.5"/>');
    })();

    // Quick lookup: get SVG for a symbol entry
    function getSymbolImage(item) {
      // Direct match
      if (SYM_IMAGES[item.sym]) return SYM_IMAGES[item.sym];
      // Prefixed match for signaux lumineux (sol:/vol:)
      if (item.cat === 'Signaux lumineux (au sol)') return SYM_IMAGES['sol:' + item.sym] || null;
      if (item.cat === 'Signaux lumineux (en vol)') return SYM_IMAGES['vol:' + item.sym] || null;
      return null;
    }

    // ================================================
    // STATE
    // ================================================
    var selectedCats = new Set();
    var quizMode = 'symbol'; // 'symbol' or 'meaning'
    var quizQuestions = [];
    var currentIdx = 0;
    var score = 0;
    var answers = []; // {item, userAnswer, correct}

    // ================================================
    // CATEGORIES
    // ================================================
    function getCategories() {
      var cats = [];
      var seen = {};
      SYMBOLS.forEach(function(s) {
        if (!seen[s.cat]) { seen[s.cat] = true; cats.push(s.cat); }
      });
      return cats;
    }

    function countCat(cat) {
      return SYMBOLS.filter(function(s) { return s.cat === cat; }).length;
    }

    function buildCatGrid() {
      var grid = document.getElementById('catGrid');
      var cats = getCategories();
      var html = '';
      cats.forEach(function(cat) {
        var isActive = selectedCats.has(cat);
        html += '<button class="sym-cat-btn' + (isActive ? ' active' : '') + '" data-cat="' + cat + '" onclick="toggleCat(this)">' + cat + ' <span style="opacity:0.5">(' + countCat(cat) + ')</span></button>';
      });
      grid.innerHTML = html;
      updateMaxLabel();
    }

    window.toggleCat = function(btn) {
      var cat = btn.getAttribute('data-cat');
      if (selectedCats.has(cat)) {
        selectedCats.delete(cat);
        btn.classList.remove('active');
      } else {
        selectedCats.add(cat);
        btn.classList.add('active');
      }
      updateMaxLabel();
    };

    window.selectAllCats = function() {
      getCategories().forEach(function(c) { selectedCats.add(c); });
      buildCatGrid();
    };

    window.deselectAllCats = function() {
      selectedCats.clear();
      buildCatGrid();
    };

    function updateMaxLabel() {
      var pool = getPool();
      document.getElementById('maxLabel').textContent = '/ ' + pool.length + ' disponibles';
      document.getElementById('btnStart').disabled = pool.length === 0;
    }

    function getPool() {
      if (selectedCats.size === 0) return [];
      return SYMBOLS.filter(function(s) { return selectedCats.has(s.cat); });
    }

    // ================================================
    // MODE
    // ================================================
    window.setMode = function(mode, btn) {
      quizMode = mode;
      document.querySelectorAll('.sym-mode-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    };

    // ================================================
    // QUIZ LOGIC
    // ================================================
    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    window.startQuiz = function() {
      var pool = getPool();
      if (pool.length === 0) return;
      var nb = parseInt(document.getElementById('nbQuestions').value) || 20;
      nb = Math.min(nb, pool.length);
      quizQuestions = shuffle(pool).slice(0, nb);
      currentIdx = 0;
      score = 0;
      answers = [];
      document.getElementById('configPanel').style.display = 'none';
      document.getElementById('resultPanel').style.display = 'none';
      document.getElementById('quizPanel').style.display = 'block';
      showQuestion();
    };

    function showQuestion() {
      var q = quizQuestions[currentIdx];
      var total = quizQuestions.length;
      document.getElementById('progressText').textContent = 'Question ' + (currentIdx + 1) + ' / ' + total + '  —  Score : ' + score;
      document.getElementById('progressFill').style.width = ((currentIdx / total) * 100) + '%';

      // Build 4 choices (1 correct + 3 distractors from same category preferably)
      var sameCat = SYMBOLS.filter(function(s) { return s.cat === q.cat && s !== q; });
      var otherPool = SYMBOLS.filter(function(s) { return s !== q; });
      // Prefer same-cat distractors, fill with others if not enough
      var distractors = shuffle(sameCat).slice(0, 3);
      if (distractors.length < 3) {
        var remaining = shuffle(otherPool.filter(function(s) { return distractors.indexOf(s) < 0; }));
        distractors = distractors.concat(remaining.slice(0, 3 - distractors.length));
      }

      var choices = shuffle([q].concat(distractors));

      var correctIdx = choices.indexOf(q);
      var promptHtml, choiceHtmls;

      if (quizMode === 'symbol') {
        // Show symbol (image if available) → guess meaning
        var img = getSymbolImage(q);
        if (img) {
          promptHtml = '<div class="sym-svg-wrap">' + img + '</div>';
        } else {
          promptHtml = escHtml(q.sym);
        }
        choiceHtmls = choices.map(function(c) { return escHtml(c.mean); });
      } else {
        // Show meaning → guess symbol (image if available)
        promptHtml = escHtml(q.mean);
        choiceHtmls = choices.map(function(c) {
          var cimg = getSymbolImage(c);
          if (cimg) {
            return '<span class="sym-choice-svg">' + cimg + '</span> ' + escHtml(c.sym);
          }
          return escHtml(c.sym);
        });
      }

      var html = '<div class="sym-q-label">' + (quizMode === 'symbol' ? 'Que signifie ce symbole ?' : 'Quel symbole correspond ?') + '</div>';
      html += '<div class="sym-q-prompt">' + promptHtml + '</div>';
      html += '<div class="sym-q-cat">' + escHtml(q.cat) + '</div>';
      html += '<div class="sym-choices">';
      for (var i = 0; i < choices.length; i++) {
        html += '<button class="sym-choice" data-idx="' + i + '" data-correct="' + correctIdx + '" onclick="pickAnswer(this)">' + choiceHtmls[i] + '</button>';
      }
      html += '</div>';
      html += '<div id="nextBtnWrap" style="display:none;"><button class="sym-next-btn" onclick="nextQuestion()">Suivant ▶</button></div>';

      document.getElementById('questionCard').innerHTML = html;
    }

    window.pickAnswer = function(btn) {
      var allBtns = btn.parentElement.querySelectorAll('.sym-choice');
      var alreadyLocked = btn.classList.contains('sym-locked');
      if (alreadyLocked) return;

      var idx = parseInt(btn.getAttribute('data-idx'));
      var correctIdx = parseInt(btn.getAttribute('data-correct'));
      var isCorrect = idx === correctIdx;

      // Lock all
      allBtns.forEach(function(b) { b.classList.add('sym-locked'); });

      // Highlight
      allBtns[correctIdx].classList.add('sym-correct');
      if (!isCorrect) {
        btn.classList.add('sym-wrong');
      } else {
        score++;
      }

      answers.push({
        item: quizQuestions[currentIdx],
        correct: isCorrect
      });

      // Update score in progress
      document.getElementById('progressText').textContent = 'Question ' + (currentIdx + 1) + ' / ' + quizQuestions.length + '  —  Score : ' + score;

      document.getElementById('nextBtnWrap').style.display = 'block';
    };

    window.nextQuestion = function() {
      currentIdx++;
      if (currentIdx >= quizQuestions.length) {
        showResults();
      } else {
        showQuestion();
      }
    };

    function showResults() {
      document.getElementById('quizPanel').style.display = 'none';
      document.getElementById('resultPanel').style.display = 'block';
      var total = quizQuestions.length;
      var pct = Math.round(100 * score / total);
      var emoji = pct >= 90 ? '🏆' : pct >= 70 ? '👏' : pct >= 50 ? '💪' : '📚';

      var html = '<div class="sym-result-score">' + pct + '%</div>';
      html += '<div class="sym-result-label">' + emoji + ' ' + score + ' / ' + total + ' correct' + (score > 1 ? 's' : '') + '</div>';
      html += '<div class="sym-result-details">' + getModeLabel() + '</div>';
      html += '<button class="sym-start-btn" onclick="resetQuiz()" style="margin-top:10px;">🔄 Recommencer</button>';
      html += '<button class="sym-next-btn" onclick="resetToConfig()" style="margin-top:8px;">⚙️ Reconfigurer</button>';
      document.getElementById('resultContent').innerHTML = html;

      // Review list
      var rhtml = '<div style="margin-top:16px; border-top: 1px solid var(--border-color); padding-top: 12px;">';
      rhtml += '<div style="text-align:center; font-weight:600; font-size:0.88em; color:var(--text-secondary); margin-bottom:10px;">Récapitulatif</div>';
      answers.forEach(function(a) {
        var icon = a.correct ? '✅' : '❌';
        var img = getSymbolImage(a.item);
        var symDisplay = img ? ('<span style="display:inline-block;vertical-align:middle;max-width:50px;">' + img + '</span> ') : '';
        rhtml += '<div class="sym-review-item">';
        rhtml += '<span class="sym-review-sym">' + symDisplay + escHtml(a.item.sym) + '</span>';
        rhtml += '<span class="sym-review-mean">' + escHtml(a.item.mean) + '</span>';
        rhtml += '<span class="sym-review-icon">' + icon + '</span>';
        rhtml += '</div>';
      });
      rhtml += '</div>';
      document.getElementById('reviewList').innerHTML = rhtml;
    }

    window.resetQuiz = function() {
      // Restart same config
      document.getElementById('resultPanel').style.display = 'none';
      startQuiz();
    };

    window.resetToConfig = function() {
      document.getElementById('resultPanel').style.display = 'none';
      document.getElementById('quizPanel').style.display = 'none';
      document.getElementById('configPanel').style.display = 'block';
    };

    function getModeLabel() {
      return quizMode === 'symbol' ? 'Symbole → Signification' : 'Signification → Symbole';
    }

    function escHtml(t) {
      return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ================================================
    // INIT
    // ================================================
    selectAllCats();
    buildCatGrid();

  })();
  </script>

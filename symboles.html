    .sym-config { max-width: 700px; margin: 0 auto; }
    .sym-cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px; margin: 10px 0 14px; }
    .sym-cat-btn { padding: 7px 10px; font-size: 0.82em; font-weight: 600; border-radius: 10px; cursor: pointer; border: 1px solid var(--border-color); background: transparent; color: var(--text-secondary); transition: all 0.2s; text-align: left; }
    .sym-cat-btn:hover { border-color: #667eea; color: #667eea; }
    .sym-cat-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-color: transparent; }
    /* Tabbed modes: Quiz / Consulter / Nuages interactif */
    .sym-tab-row { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border-color); }
    .sym-tab { flex: 1; padding: 10px 6px; font-size: 0.9em; font-weight: 700; cursor: pointer; background: transparent; border: none; color: var(--text-secondary); border-bottom: 3px solid transparent; transition: all 0.2s; text-align: center; }
    .sym-tab:hover { color: #667eea; }
    .sym-tab.active { color: #667eea; border-bottom-color: #667eea; }
    /* Consultation / browse mode */
    .sym-browse { max-width: 900px; margin: 0 auto; }
    .sym-browse-group { margin-bottom: 20px; }
    .sym-browse-group-title { font-size: 1em; font-weight: 700; color: var(--text-heading); margin: 12px 0 8px; padding: 6px 12px; background: linear-gradient(135deg, rgba(102,126,234,.1) 0%, rgba(118,75,162,.1) 100%); border-radius: 8px; }
    .sym-browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
    .sym-browse-card { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 10px; font-size: 0.82em; }
    .sym-browse-card .sym-browse-img { flex-shrink: 0; max-width: 70px; max-height: 55px; }
    .sym-browse-card .sym-browse-img svg, .sym-browse-card .sym-browse-img img { max-width: 70px; max-height: 55px; }
    .sym-browse-card .sym-browse-sym { font-weight: 700; color: var(--text-heading); min-width: 50px; }
    .sym-browse-card .sym-browse-mean { color: var(--text-secondary); flex: 1; }
    /* Cloud interactive diagram */
    .cloud-diagram-wrap { max-width: 850px; margin: 0 auto; padding: 20px; }
    .cloud-diagram-img { position: relative; display: inline-block; }
    .cloud-diagram-img img { width: 100%; max-width: 817px; border-radius: 10px; }
    .cloud-dropdown { position: absolute; font-size: 0.72em; padding: 2px 4px; border-radius: 4px; border: 1.5px solid #667eea; background: rgba(0,0,0,0.7); color: #fff; cursor: pointer; transform: translate(-50%, -50%); }
    .cloud-dropdown option { background: #222; }
    .cloud-dropdown.correct { border-color: #4caf50; background: rgba(76,175,80,0.2); }
    .cloud-dropdown.wrong { border-color: #f44336; background: rgba(244,67,54,0.2); }
    .cloud-check-btn { display: block; margin: 14px auto; padding: 10px 30px; font-size: 0.95em; font-weight: 700; border-radius: 20px; cursor: pointer; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .cloud-score { text-align: center; font-size: 1.1em; font-weight: 700; color: var(--text-heading); margin: 10px 0; }
    /* Animated light blink via CSS */
    @keyframes blink-on-off { 0%,20% { opacity: 1; } 50%,80% { opacity: 0.05; } 100% { opacity: 1; } }
    @keyframes flare-burst { 0% { r: 4; opacity: 1; } 30% { r: 18; opacity: 0.9; } 60% { r: 25; opacity: 0.4; } 100% { r: 30; opacity: 0; } }
    .light-blink { animation: blink-on-off 0.7s ease-in-out infinite; }
    .flare-glow { animation: flare-burst 1.2s ease-out infinite; }
    .sym-mode-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 10px 0; }
    .sym-mode-btn { padding: 8px 20px; font-size: 0.88em; font-weight: 600; border-radius: 20px; cursor: pointer; border: 1px solid var(--border-color); background: transparent; color: var(--text-secondary); transition: all 0.2s; }
    .sym-mode-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-color: transparent; }
    .sym-start-btn { display: block; margin: 16px auto; padding: 12px 40px; font-size: 1em; font-weight: 700; border-radius: 24px; cursor: pointer; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; box-shadow: 0 4px 15px rgba(102,126,234,0.3); transition: all 0.25s; }
    .sym-start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
    .sym-start-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .sym-quiz-area { max-width: 700px; margin: 0 auto; }
    .sym-progress { text-align: center; font-size: 0.85em; color: var(--text-secondary); margin-bottom: 8px; }
    .sym-progress-bar { height: 4px; background: var(--border-color); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
    .sym-progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 2px; transition: width 0.3s; }
    .sym-question-card { background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; margin-bottom: 14px; }
    .sym-q-label { font-size: 0.75em; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .sym-q-prompt { font-size: 1.3em; font-weight: 700; color: var(--text-heading); margin-bottom: 6px; text-align: center; padding: 10px 0; }
    .sym-q-prompt svg, .sym-q-prompt img { max-width: 160px; max-height: 140px; display: block; margin: 0 auto 4px; }
    .sym-q-prompt .sym-svg-wrap { display: flex; justify-content: center; padding: 6px 0; }
    .sym-choice .sym-choice-svg { display: inline-block; vertical-align: middle; margin-right: 8px; }
    .sym-choice .sym-choice-svg svg { width: 44px; height: 30px; vertical-align: middle; }
    .sym-choice .sym-choice-svg img { width: auto; height: 44px; vertical-align: middle; }
    .sym-q-cat { font-size: 0.72em; color: var(--text-secondary); text-align: center; margin-bottom: 12px; }
    .sym-choices { display: flex; flex-direction: column; gap: 8px; }
    .sym-choice { padding: 12px 16px; font-size: 0.92em; border-radius: 10px; cursor: pointer; border: 1.5px solid var(--border-color); background: transparent; color: var(--text-primary); transition: all 0.2s; text-align: left; font-weight: 500; }
    .sym-choice:hover:not(.sym-locked) { border-color: #667eea; background: rgba(102,126,234,0.06); }
    .sym-choice.sym-correct { border-color: #4caf50; background: rgba(76,175,80,0.12); color: #4caf50; font-weight: 700; }
    .sym-choice.sym-wrong { border-color: #f44336; background: rgba(244,67,54,0.1); color: #f44336; }
    .sym-choice.sym-locked { cursor: default; opacity: 0.7; }
    .sym-choice.sym-correct.sym-locked { opacity: 1; }
    .sym-next-btn { display: block; margin: 12px auto 0; padding: 10px 30px; font-size: 0.92em; font-weight: 700; border-radius: 20px; cursor: pointer; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; transition: all 0.2s; }
    .sym-result { text-align: center; padding: 30px 20px; }
    .sym-result-score { font-size: 2.5em; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sym-result-label { font-size: 1.1em; color: var(--text-secondary); margin: 8px 0 20px; }
    .sym-result-details { font-size: 0.9em; color: var(--text-secondary); margin-bottom: 20px; }
    .sym-nb-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; }
    .sym-nb-input { width: 70px; padding: 6px 10px; font-size: 0.95em; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-container); color: var(--text-primary); text-align: center; }
    .sym-select-btns { display: flex; gap: 6px; justify-content: center; margin-bottom: 8px; }
    .sym-select-btn { padding: 4px 12px; font-size: 0.75em; border-radius: 12px; cursor: pointer; border: 1px solid var(--border-color); background: transparent; color: var(--text-secondary); }
    .sym-select-btn:hover { border-color: #667eea; color: #667eea; }
    .sym-review-list { max-width: 700px; margin: 0 auto; }
    .sym-review-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border-color); font-size: 0.85em; }
    .sym-review-item:last-child { border-bottom: none; }
    .sym-review-sym { font-weight: 700; color: var(--text-heading); min-width: 80px; }
    .sym-review-mean { color: var(--text-secondary); flex: 1; text-align: right; }
    .sym-review-icon { margin-left: 8px; }
  </style>
</head>

  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'light') document.body.classList.add('light');
    })();
  </script>
  <button id="themeToggle" onclick="(function(){document.body.classList.toggle('light');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');document.getElementById('themeToggle').textContent=document.body.classList.contains('light')?'🌙':'☀️'})()">☀️</button>
  <script>
    if(document.body.classList.contains('light'))document.getElementById('themeToggle').textContent='🌙';

  <div id="configPanel" class="home-card sym-config">

      <span class="home-card-icon">⚙️</span>

    <!-- Tabs: Quiz / Consulter / Nuages -->
    <div class="sym-tab-row">
      <button class="sym-tab active" data-tab="quiz" onclick="switchTab('quiz',this)">🎯 Quiz</button>
      <button class="sym-tab" data-tab="browse" onclick="switchTab('browse',this)">📖 Consulter</button>
      <button class="sym-tab" data-tab="clouds" onclick="switchTab('clouds',this)">☁️ Nuages interactif</button>
    </div>

    <!-- ===== QUIZ TAB ===== -->
    <div id="tabQuiz">

    <!-- Mode -->
    <div style="margin-bottom: 6px; font-size: 0.85em; color: var(--text-secondary); font-weight: 600;">Mode :</div>
    <div class="sym-mode-row">
      <button class="sym-mode-btn active" data-mode="symbol" onclick="setMode('symbol', this)">🔣 Symbole → Signification</button>
      <button class="sym-mode-btn" data-mode="meaning" onclick="setMode('meaning', this)">📝 Signification → Symbole</button>
    </div>

    <!-- Categories -->

    </div>
    <div class="sym-cat-grid" id="catGrid"></div>

    <div class="sym-nb-row">
      <label style="font-size: 0.88em; color: var(--text-secondary);">Questions :</label>

      <span id="maxLabel" style="font-size: 0.78em; color: var(--text-secondary);"></span>
    </div>

    <button class="sym-start-btn" id="btnStart" onclick="startQuiz()">🚀 Commencer le test</button>

    <div id="tabBrowse" style="display:none;">

        <div class="cloud-score" id="cloudScore"></div>

      SYM_IMAGES['Chevrons blancs (zone fermée)'] = S(100,50,'<rect x="0" y="0" width="100" height="50" fill="#555"/><polyline points="10,40 25,10 40,40" fill="none" stroke="#fff" stroke-width="2.5"/><polyline points="35,40 50,10 65,40" fill="none" stroke="#fff" stroke-width="2.5"/><polyline points="60,40 75,10 90,40" fill="none" stroke="#fff" stroke-width="2.5"/>');

      // === TYPES DE NUAGES (images extraites) ===
      function cloudImg(file, alt) { return '<div style="display:inline-block;background:#f5f0e1;border-radius:10px;padding:4px 8px;"><img src="Symboles/Meteo/clouds/' + file + '" alt="' + alt + '" style="height:80px; width:auto; border-radius:6px;"></div>'; }
      SYM_IMAGES['Cirrus (Ci)'] = cloudImg('cirrus.png','Cirrus');
      SYM_IMAGES['Cirrocumulus (Cc)'] = cloudImg('cirrocumulus.png','Cirrocumulus');
      SYM_IMAGES['Cirrostratus (Cs)'] = cloudImg('cirrostratus.png','Cirrostratus');
      SYM_IMAGES['Altocumulus (Ac)'] = cloudImg('altocumulus.png','Altocumulus');
      SYM_IMAGES['Altostratus (As)'] = cloudImg('altostratus.png','Altostratus');
      SYM_IMAGES['Nimbostratus (Ns)'] = cloudImg('nimbostratus.png','Nimbostratus');
      SYM_IMAGES['Cumulonimbus (Cb)'] = cloudImg('cumulonimbus.png','Cumulonimbus');
      SYM_IMAGES['Cumulus congestus (TCU)'] = cloudImg('cumulus-congestus.png','Cumulus congestus');
      SYM_IMAGES['Cumulus humilis (Cu)'] = cloudImg('cumulus-humilis.png','Cumulus humilis');
      SYM_IMAGES['Stratocumulus (Sc)'] = cloudImg('stratocumulus.png','Stratocumulus');
      SYM_IMAGES['Stratus (St)'] = cloudImg('stratus.png','Stratus');

      // === CORRESPONDANCE PRESSION-ALTITUDE ===
      function pressCard(hpa, ft, m) {
        return S(120,50,'<rect x="2" y="2" width="116" height="46" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>'
          + '<text x="60" y="18" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#2c3e50" text-anchor="middle">' + hpa + ' hPa</text>'
          + '<text x="60" y="32" font-family="Arial,sans-serif" font-size="10" fill="#7f8c8d" text-anchor="middle">' + ft + ' ft ≈ ' + m + ' m</text>');
      }
      SYM_IMAGES['850 hPa ≈ 5000 ft'] = pressCard('850','5 000','1 500');
      SYM_IMAGES['700 hPa ≈ 10 000 ft'] = pressCard('700','10 000','3 000');
      SYM_IMAGES['500 hPa ≈ 18 000 ft'] = pressCard('500','18 000','5 500');
    })();

    // Quick lookup: get SVG for a symbol entry
    function getSymbolImage(item) {
      // Direct match
      if (SYM_IMAGES[item.sym]) return SYM_IMAGES[item.sym];
      // Prefixed match for signaux lumineux (sol:/vol:)
      if (item.cat === 'Signaux lumineux (au sol)') return SYM_IMAGES['sol:' + item.sym] || null;
      if (item.cat === 'Signaux lumineux (en vol)') return SYM_IMAGES['vol:' + item.sym] || null;
      return null;
    }

    // ================================================
    // STATE
    // ================================================
    var selectedCats = new Set();
    var quizMode = 'symbol'; // 'symbol' or 'meaning'
    var quizQuestions = [];
    var currentIdx = 0;
    var score = 0;
    var answers = []; // {item, userAnswer, correct}
    var activeTab = 'quiz';

    // ================================================
    // TABS
    // ================================================
    window.switchTab = function(tab, btn) {
      activeTab = tab;
      document.querySelectorAll('.sym-tab').forEach(function(t) { t.classList.remove('active'); });
      if (btn) btn.classList.add('active');
      document.getElementById('tabQuiz').style.display = tab === 'quiz' ? '' : 'none';
      document.getElementById('tabBrowse').style.display = tab === 'browse' ? '' : 'none';
      document.getElementById('tabClouds').style.display = tab === 'clouds' ? '' : 'none';
      document.getElementById('quizPanel').style.display = 'none';
      document.getElementById('resultPanel').style.display = 'none';
      document.getElementById('configPanel').style.display = 'block';
      if (tab === 'browse') buildBrowseContent();
      if (tab === 'clouds') setupCloudDiagram();
    };

    // ================================================
    // CATEGORIES — group-based selection
    // ================================================
    function getCategories() {
      var cats = [];
      var seen = {};
      SYMBOLS.forEach(function(s) {
        if (!seen[s.cat]) { seen[s.cat] = true; cats.push(s.cat); }
      });
      return cats;
    }

    function getGroups() {
      var groups = [];
      var seen = {};
      getCategories().forEach(function(cat) {
        var g = getGroup(cat);
        if (!seen[g]) { seen[g] = true; groups.push(g); }
      });
      return groups;
    }

    function getCatsForGroup(group) {
      return getCategories().filter(function(cat) { return getGroup(cat) === group; });
    }

    function countGroup(group) {
      var cats = getCatsForGroup(group);
      return SYMBOLS.filter(function(s) { return cats.indexOf(s.cat) >= 0; }).length;
    }

    function buildCatGrid() {
      var grid = document.getElementById('catGrid');
      var groups = getGroups();
      var html = '';
      groups.forEach(function(grp) {
        var cats = getCatsForGroup(grp);
        var allActive = cats.every(function(c) { return selectedCats.has(c); });
        html += '<button class="sym-cat-btn' + (allActive ? ' active' : '') + '" data-group="' + grp + '" onclick="toggleGroup(this)">' + grp + ' <span style="opacity:0.5">(' + countGroup(grp) + ')</span></button>';
      });
      grid.innerHTML = html;
      updateMaxLabel();
    }

    window.toggleGroup = function(btn) {
      var grp = btn.getAttribute('data-group');
      var cats = getCatsForGroup(grp);
      var allActive = cats.every(function(c) { return selectedCats.has(c); });
      if (allActive) {
        cats.forEach(function(c) { selectedCats.delete(c); });
        btn.classList.remove('active');
      } else {
        cats.forEach(function(c) { selectedCats.add(c); });
        btn.classList.add('active');
      }
      updateMaxLabel();
    };

    // Keep legacy toggleCat for any reference
    window.toggleCat = function(btn) {
      var cat = btn.getAttribute('data-cat');
      if (selectedCats.has(cat)) {
        selectedCats.delete(cat);
        btn.classList.remove('active');
      } else {
        selectedCats.add(cat);
        btn.classList.add('active');
      }
      updateMaxLabel();
    };

    window.selectAllCats = function() {
      getCategories().forEach(function(c) { selectedCats.add(c); });
      buildCatGrid();
    };

    window.deselectAllCats = function() {
      selectedCats.clear();
      buildCatGrid();
    };

    function updateMaxLabel() {
      var pool = getPool();
      document.getElementById('maxLabel').textContent = '/ ' + pool.length + ' disponibles';
      document.getElementById('btnStart').disabled = pool.length === 0;
    }

    function getPool() {
      if (selectedCats.size === 0) return [];
      return SYMBOLS.filter(function(s) { return selectedCats.has(s.cat); });
    }

    // ================================================
    // MODE
    // ================================================
    window.setMode = function(mode, btn) {
      quizMode = mode;
      document.querySelectorAll('.sym-mode-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    };

    // ================================================
    // QUIZ LOGIC
    // ================================================
    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    window.startQuiz = function() {
      var pool = getPool();
      if (pool.length === 0) return;
      var nb = parseInt(document.getElementById('nbQuestions').value) || 20;
      nb = Math.min(nb, pool.length);
      quizQuestions = shuffle(pool).slice(0, nb);
      currentIdx = 0;
      score = 0;
      answers = [];
      document.getElementById('configPanel').style.display = 'none';
      document.getElementById('resultPanel').style.display = 'none';
      document.getElementById('quizPanel').style.display = 'block';
      showQuestion();
    };

    function showQuestion() {
      var q = quizQuestions[currentIdx];
      var total = quizQuestions.length;
      document.getElementById('progressText').textContent = 'Question ' + (currentIdx + 1) + ' / ' + total + '  —  Score : ' + score;
      document.getElementById('progressFill').style.width = ((currentIdx / total) * 100) + '%';

      // Build 4 choices (1 correct + 3 distractors from same category preferably)
      var sameCat = SYMBOLS.filter(function(s) { return s.cat === q.cat && s !== q; });
      var otherPool = SYMBOLS.filter(function(s) { return s !== q; });
      // Prefer same-cat distractors, fill with others if not enough
      var distractors = shuffle(sameCat).slice(0, 3);
      if (distractors.length < 3) {
        var remaining = shuffle(otherPool.filter(function(s) { return distractors.indexOf(s) < 0; }));
        distractors = distractors.concat(remaining.slice(0, 3 - distractors.length));
      }

      var choices = shuffle([q].concat(distractors));

      var correctIdx = choices.indexOf(q);
      var promptHtml, choiceHtmls;

      if (quizMode === 'symbol') {
        // Show symbol (image if available) → guess meaning
        var img = getSymbolImage(q);
        if (img) {
          promptHtml = '<div class="sym-svg-wrap">' + img + '</div>';
        } else {
          promptHtml = escHtml(q.sym);
        }
        // Pour les barbules de vent, afficher les vitesses comme choix au lieu des descriptions
        if (q.cat === 'Barbules de vent') {
          choiceHtmls = choices.map(function(c) { return escHtml(c.sym); });
        } else {
          choiceHtmls = choices.map(function(c) { return escHtml(c.mean); });
        }
      } else {
        // Show meaning → guess symbol (image if available)
        // Pour les barbules de vent, afficher la vitesse comme prompt
        if (q.cat === 'Barbules de vent') {
          promptHtml = escHtml(q.sym);
        } else {
          promptHtml = escHtml(q.mean);
        }
        choiceHtmls = choices.map(function(c) {
          var cimg = getSymbolImage(c);
          if (cimg) {
            return '<span class="sym-choice-svg">' + cimg + '</span> ' + escHtml(c.sym);
          }
          return escHtml(c.sym);
        });
      }

      var html = '<div class="sym-q-label">' + (quizMode === 'symbol' ? 'Que signifie ce symbole ?' : 'Quel symbole correspond ?') + '</div>';
      // Pour les barbules de vent en mode symbol, adapter la question
      if (q.cat === 'Barbules de vent' && quizMode === 'symbol') {
        html = '<div class="sym-q-label">Quelle est la vitesse du vent représentée ?</div>';
      }
      html += '<div class="sym-q-prompt">' + promptHtml + '</div>';
      html += '<div class="sym-q-cat">' + escHtml(q.cat) + '</div>';
      html += '<div class="sym-choices">';
      for (var i = 0; i < choices.length; i++) {
        html += '<button class="sym-choice" data-idx="' + i + '" data-correct="' + correctIdx + '" onclick="pickAnswer(this)">' + choiceHtmls[i] + '</button>';
      }
      html += '</div>';
      html += '<div id="nextBtnWrap" style="display:none;"><button class="sym-next-btn" onclick="nextQuestion()">Suivant ▶</button></div>';

      document.getElementById('questionCard').innerHTML = html;
    }

    window.pickAnswer = function(btn) {
      var allBtns = btn.parentElement.querySelectorAll('.sym-choice');
      var alreadyLocked = btn.classList.contains('sym-locked');
      if (alreadyLocked) return;

      var idx = parseInt(btn.getAttribute('data-idx'));
      var correctIdx = parseInt(btn.getAttribute('data-correct'));
      var isCorrect = idx === correctIdx;

      // Lock all
      allBtns.forEach(function(b) { b.classList.add('sym-locked'); });

      // Highlight
      allBtns[correctIdx].classList.add('sym-correct');
      if (!isCorrect) {
        btn.classList.add('sym-wrong');
      } else {
        score++;
      }

      answers.push({
        item: quizQuestions[currentIdx],
        correct: isCorrect
      });

      // Update score in progress
      document.getElementById('progressText').textContent = 'Question ' + (currentIdx + 1) + ' / ' + quizQuestions.length + '  —  Score : ' + score;

      document.getElementById('nextBtnWrap').style.display = 'block';
    };

    window.nextQuestion = function() {
      currentIdx++;
      if (currentIdx >= quizQuestions.length) {
        showResults();
      } else {
        showQuestion();
      }
    };

    function showResults() {
      document.getElementById('quizPanel').style.display = 'none';
      document.getElementById('resultPanel').style.display = 'block';
      var total = quizQuestions.length;
      var pct = Math.round(100 * score / total);
      var emoji = pct >= 90 ? '🏆' : pct >= 70 ? '👏' : pct >= 50 ? '💪' : '📚';

      var html = '<div class="sym-result-score">' + pct + '%</div>';
      html += '<div class="sym-result-label">' + emoji + ' ' + score + ' / ' + total + ' correct' + (score > 1 ? 's' : '') + '</div>';
      html += '<div class="sym-result-details">' + getModeLabel() + '</div>';
      html += '<button class="sym-start-btn" onclick="resetQuiz()" style="margin-top:10px;">🔄 Recommencer</button>';
      html += '<button class="sym-next-btn" onclick="resetToConfig()" style="margin-top:8px;">⚙️ Reconfigurer</button>';
      document.getElementById('resultContent').innerHTML = html;

      // Review list
      var rhtml = '<div style="margin-top:16px; border-top: 1px solid var(--border-color); padding-top: 12px;">';
      rhtml += '<div style="text-align:center; font-weight:600; font-size:0.88em; color:var(--text-secondary); margin-bottom:10px;">Récapitulatif</div>';
      answers.forEach(function(a) {
        var icon = a.correct ? '✅' : '❌';
        var img = getSymbolImage(a.item);
        var symDisplay = img ? ('<span style="display:inline-block;vertical-align:middle;max-width:50px;">' + img + '</span> ') : '';
        rhtml += '<div class="sym-review-item">';
        rhtml += '<span class="sym-review-sym">' + symDisplay + escHtml(a.item.sym) + '</span>';
        rhtml += '<span class="sym-review-mean">' + escHtml(a.item.mean) + '</span>';
        rhtml += '<span class="sym-review-icon">' + icon + '</span>';
        rhtml += '</div>';
      });
      rhtml += '</div>';
      document.getElementById('reviewList').innerHTML = rhtml;

      // === Sauvegarder la session dans localStorage pour la page Stats ===
      _saveSymbolesSession(score, total, answers);
    }

    /**
     * Sauvegarde une session symboles dans localStorage.
     * Format identique aux sessions du quiz classique pour compatibilité avec stats.js.
     * On sauvegarde aussi les réponses par catégorie pour les barres de progression.
     */
    function _saveSymbolesSession(correct, total, answersArr) {
      try {
        var now = new Date().toISOString();
        // Déterminer les groupes sélectionnés pour cette session
        var catsUsed = {};
        answersArr.forEach(function(a) {
          var grp = getGroup(a.item.cat);
          if (!catsUsed[grp]) catsUsed[grp] = { correct: 0, total: 0 };
          catsUsed[grp].total++;
          if (a.correct) catsUsed[grp].correct++;
        });
        var catNames = Object.keys(catsUsed).sort();
        var categoryLabel = catNames.length === 1 ? catNames[0] : 'Multi (' + catNames.length + ' groupes)';

        // 1) Session globale symboles
        var sessions = [];
        try { sessions = JSON.parse(localStorage.getItem('symbolesSessionHistory') || '[]'); } catch(e) {}
        sessions.push({
          date: now,
          correct: correct,
          total: total,
          category: categoryLabel,
          percent: total > 0 ? Math.round(100 * correct / total) : 0,
          groups: catNames
        });
        if (sessions.length > 200) sessions = sessions.slice(-200);
        localStorage.setItem('symbolesSessionHistory', JSON.stringify(sessions));

        // 2) Sessions par groupe de catégorie (pour les barres de progression par groupe)
        catNames.forEach(function(grp) {
          var key = 'symbolesSessions_' + grp;
          var grpSessions = [];
          try { grpSessions = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) {}
          grpSessions.push({
            date: now,
            correct: catsUsed[grp].correct,
            total: catsUsed[grp].total,
            category: grp,
            percent: catsUsed[grp].total > 0 ? Math.round(100 * catsUsed[grp].correct / catsUsed[grp].total) : 0
          });
          if (grpSessions.length > 200) grpSessions = grpSessions.slice(-200);
          localStorage.setItem(key, JSON.stringify(grpSessions));
        });

        // 3) Réponses individuelles par symbole (pour calculer réussi/raté/non-vu)
        var responses = {};
        try { responses = JSON.parse(localStorage.getItem('symbolesResponses') || '{}'); } catch(e) {}
        answersArr.forEach(function(a) {
          var symKey = 'sym_' + a.item.cat + '_' + a.item.sym;
          if (!responses[symKey]) {
            responses[symKey] = { cat: a.item.cat, group: getGroup(a.item.cat), sym: a.item.sym, correct: 0, wrong: 0, lastDate: null };
          }
          if (a.correct) {
            responses[symKey].correct++;
          } else {
            responses[symKey].wrong++;
          }
          responses[symKey].lastDate = now;
        });
        localStorage.setItem('symbolesResponses', JSON.stringify(responses));

      } catch(e) {
        console.warn('[_saveSymbolesSession] erreur:', e.message);
      }
    }

    window.resetQuiz = function() {
      // Restart same config
      document.getElementById('resultPanel').style.display = 'none';
      startQuiz();
    };

    window.resetToConfig = function() {
      document.getElementById('resultPanel').style.display = 'none';
      document.getElementById('quizPanel').style.display = 'none';
      document.getElementById('configPanel').style.display = 'block';
    };

    function getModeLabel() {
      return quizMode === 'symbol' ? 'Symbole → Signification' : 'Signification → Symbole';
    }

    function escHtml(t) {
      return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ================================================
    // BROWSE / CONSULTATION MODE
    // ================================================
    var browseActiveGroups = new Set();

    function buildBrowseFilters() {
      var btns = document.getElementById('browseFilterBtns');
      var groups = getGroups();
      var html = '<button class="sym-select-btn" onclick="browseSelectAll()">Tous</button>';
      groups.forEach(function(g) {
        var active = browseActiveGroups.has(g);
        html += '<button class="sym-select-btn' + (active ? ' active" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-color:transparent;"' : '"') + ' data-bgroup="' + g + '" onclick="toggleBrowseGroup(this)">' + g + '</button>';
      });
      btns.innerHTML = html;
    }

    window.toggleBrowseGroup = function(btn) {
      var g = btn.getAttribute('data-bgroup');
      if (browseActiveGroups.has(g)) browseActiveGroups.delete(g);
      else browseActiveGroups.add(g);
      buildBrowseContent();
    };

    window.browseSelectAll = function() {
      browseActiveGroups.clear();
      getGroups().forEach(function(g) { browseActiveGroups.add(g); });
      buildBrowseContent();
    };

    function buildBrowseContent() {
      // Default: show all groups
      if (browseActiveGroups.size === 0) {
        getGroups().forEach(function(g) { browseActiveGroups.add(g); });
      }
      buildBrowseFilters();
      var container = document.getElementById('browseContent');
      var groups = getGroups().filter(function(g) { return browseActiveGroups.has(g); });
      var html = '';
      groups.forEach(function(grp) {
        html += '<div class="sym-browse-group">';
        html += '<div class="sym-browse-group-title">' + escHtml(grp) + '</div>';
        html += '<div class="sym-browse-grid">';
        var cats = getCatsForGroup(grp);
        SYMBOLS.forEach(function(s) {
          if (cats.indexOf(s.cat) < 0) return;
          var img = getSymbolImage(s);
          var imgHtml = img ? '<div class="sym-browse-img">' + img + '</div>' : '';
          html += '<div class="sym-browse-card">' + imgHtml + '<div class="sym-browse-sym">' + escHtml(s.sym) + '</div><div class="sym-browse-mean">' + escHtml(s.mean) + '</div></div>';
        });
        html += '</div></div>';
      });
      container.innerHTML = html;
    }

    // ================================================
    // CLOUD INTERACTIVE DIAGRAM
    // ================================================
    var CLOUD_POSITIONS = [
      // Exact % positions matching erased text labels on the 817x382 diagram
      {name:'Cirrus',         x:72.2, y:22.4},
      {name:'Cirrocumulus',   x:35.9, y:33.1},
      {name:'Cirrostratus',   x:80.0, y:36.3},
      {name:'Altocumulus',    x:41.4, y:48.8},
      {name:'Altostratus',    x:64.6, y:55.0},
      {name:'Nimbostratus',   x:88.2, y:61.6},
      {name:'Cumulonimbus',   x:21.8, y:82.1},
      {name:'Cumulus',        x:45.3, y:76.4},
      {name:'Stratocumulus',  x:70.3, y:72.1},
      {name:'Stratus',        x:91.7, y:85.7}
    ];
    var CLOUD_NAMES = ['—','Cirrus','Cirrocumulus','Cirrostratus','Altocumulus','Altostratus','Nimbostratus','Cumulonimbus','Cumulus congestus (TCU)','Cumulus','Stratocumulus','Stratus'];
    var cloudDiagramReady = false;

    function setupCloudDiagram() {
      if (cloudDiagramReady) return;
      cloudDiagramReady = true;
      var container = document.getElementById('cloudDiagramContainer');
      // Wait for image to load to get real dimensions
      var img = document.getElementById('cloudDiagramImg');
      function placeDropdowns() {
        // Remove old dropdowns
        container.querySelectorAll('select').forEach(function(s) { s.remove(); });
        CLOUD_POSITIONS.forEach(function(pos, i) {
          var sel = document.createElement('select');
          sel.className = 'cloud-dropdown';
          sel.setAttribute('data-answer', pos.name);
          sel.style.left = pos.x + '%';
          sel.style.top = pos.y + '%';
          var options = '<option value="">?</option>';
          CLOUD_NAMES.forEach(function(n) {
            if (n === '—') return;
            options += '<option value="' + n + '">' + n + '</option>';
          });
          sel.innerHTML = options;
          container.appendChild(sel);
        });
      }
      if (img.complete) placeDropdowns();
      else img.addEventListener('load', placeDropdowns);
    }

    window.checkCloudAnswers = function() {
      var selects = document.querySelectorAll('#cloudDiagramContainer select');
      var correct = 0;
      var total = selects.length;
      selects.forEach(function(sel) {
        var answer = sel.getAttribute('data-answer');
        sel.classList.remove('correct','wrong');
        if (sel.value === answer) {
          sel.classList.add('correct');
          correct++;
        } else {
          sel.classList.add('wrong');
        }
      });
      document.getElementById('cloudScore').textContent = correct + ' / ' + total + ' correct' + (correct > 1 ? 's' : '');
    };

    window.resetCloudDiagram = function() {
      var selects = document.querySelectorAll('#cloudDiagramContainer select');
      selects.forEach(function(sel) {
        sel.value = '';
        sel.classList.remove('correct','wrong');
      });
      document.getElementById('cloudScore').textContent = '';
    };

    // ================================================
    // INIT
    // ================================================
    deselectAllCats();
    buildCatGrid();

  })();
  </script>
</body>

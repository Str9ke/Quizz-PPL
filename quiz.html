<body>
  <!-- Theme toggle -->
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') document.body.classList.add('light');
    })();
  </script>
  <button id="themeToggle" onclick="(function(){document.body.classList.toggle('light');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');document.getElementById('themeToggle').textContent=document.body.classList.contains('light')?'🌙':'☀️'})()">☀️</button>
  <div class="tts-container" id="ttsContainer" onclick="(function(e){if(e.target.id==='ttsVolume')return;document.getElementById('ttsContainer').classList.toggle('open')})(event)"><div class="tts-volume-track"><input type="range" id="ttsVolume" min="0" max="100" value="80" orient="vertical" oninput="(function(v){localStorage.setItem('ttsVolume',v);document.getElementById('ttsPct').textContent=v+'%'})(this.value)"><div class="tts-volume-pct" id="ttsPct">80%</div></div><button id="ttsToggle" onclick="(function(e){e.stopPropagation();var on=localStorage.getItem('ttsEnabled')==='1';localStorage.setItem('ttsEnabled',on?'0':'1');document.getElementById('ttsToggle').textContent=on?'🔇':'🔊';document.getElementById('ttsToggle').title=on?'TTS désactivé':'TTS activé'})(event)" title="TTS désactivé">🔇</button></div>
  <script>
    if(document.body.classList.contains('light'))document.getElementById('themeToggle').textContent='🌙';
    if(localStorage.getItem('ttsEnabled')==='1'){document.getElementById('ttsToggle').textContent='🔊';document.getElementById('ttsToggle').title='TTS activé';}(function(){var v=localStorage.getItem('ttsVolume');if(v!==null){document.getElementById('ttsVolume').value=v;document.getElementById('ttsPct').textContent=v+'%';}})();
  </script>

  <!-- Bandeau catégorie + restant (ratées + non vues) / total -->

    <div id="categoryName" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 2px;"></div>
    <div id="categoryProgress" style="font-size: 0.85rem; opacity: 0.9;"></div>
  </div>

  <!-- Compteur de questions répondues aujourd'hui (recréé par ensureDailyStatsBarVisible) -->
  <div id="dailyStatsBar" style="display:none;"></div>

  <script>
    // Affichage instantané depuis localStorage — même source que updateDailyStatsBar()
    (function() {
      try {
        const now = new Date();
        const todayKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        const utcKey = now.toISOString().slice(0, 10);
        // Même logique que _getDailyHistoryMerged pour aujourd'hui
        let count = 0;
        try {
          const backup = JSON.parse(localStorage.getItem('dailyHistoryBackup') || '{}');
          count = Math.max(count, backup[todayKey] || 0);
        } catch (_) {}
        count = Math.max(count,
          parseInt(localStorage.getItem('dailyAnswered_' + utcKey)) || 0,
          parseInt(localStorage.getItem('dailyCountRatchet_' + utcKey)) || 0
        );
        const el = document.getElementById('answeredTodayCount');
        if (el) el.textContent = count || '…';
      } catch (_) {}
    })();
  </script>

  <div class="container" id="quizContainer">
    <!-- Les questions seront affichées ici -->
  </div>

  <!-- Cache-bust to forcer le chargement de la dernière version du script -->
  <script src="js/globals.js?v=20260224d"></script>

  <script src="js/categories.js?v=20260224d"></script>

  <script src="js/offline.js?v=20260224d"></script>
  <script>
    // Affichage instantané du compteur depuis localStorage (updateDailyStatsBar)
    // initQuiz() se chargera de l'appel Firestore via displayDailyStats()
    // PAS de setTimeout(displayDailyStats) ici — initQuiz le fait déjà.
    // Chaque appel redondant cause un flash (valeur Firestore → reset localStorage → Firestore).
    document.addEventListener('DOMContentLoaded', () => {
      try {
        if (typeof showBuildTag === 'function') showBuildTag();
        if (typeof updateDailyStatsBar === 'function') updateDailyStatsBar();
      } catch (e) {
        console.error('[inline] daily stats bootstrap error', e);
      }
    });
  </script>
  <script>
    // Ajout du gestionnaire pour le bouton Reset
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('resetQuizBtn');
      if (btn) {
        btn.addEventListener('click', function() {
          window.scrollTo(0, 0);
          if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
          if (typeof resetQuiz === 'function') {
            resetQuiz();
          } else {
            // fallback: reload page
            window.location.reload();
          }
        });
      }
    });
  </script>

  <script>
  // ============================================================
  // Historique page logic
  // ============================================================
  (function() {
    let allQuestionsLoaded = [];
    let currentResponses = {};
    let _notesCache = {};
    let uid = null;
    let _selectedDate = null; // Date object for selected calendar day
    let _calendarMonth = null; // Date object for displayed month
    let _activityDates = new Set(); // Set of 'YYYY-MM-DD' strings with activity
    let activeFilters = new Set();
    let _lastDayQuestions = []; // cache for re-filtering

    // === TTS ===
    function speakText(text) {
      if (!('speechSynthesis' in window) || localStorage.getItem('ttsEnabled') !== '1') return;
      // Toggle: if currently speaking, stop
      if (speechSynthesis.speaking) {
        speechSynthesis.cancel();
        return;
      }
      speechSynthesis.cancel();
      setTimeout(function() {
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fr-FR';
        utterance.rate = 0.95;
        var voices = speechSynthesis.getVoices();
        var preferredName = localStorage.getItem('ttsPreferredVoiceName') || '';
        var voice = null;
        if (preferredName) voice = voices.find(function(v) { return v.name === preferredName; });
        if (!voice) voice = voices.find(function(v) { return v.lang && v.lang.match(/^fr/i); });
        if (voice) utterance.voice = voice;
        speechSynthesis.speak(utterance);
      }, 100);
    }
    if ('speechSynthesis' in window) {
      speechSynthesis.getVoices();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };
      }
    }

    function resolveTtsText(q) {
      var correctChoice = (q.choix[q.bonne_reponse] || '').trim();
      if (!correctChoice) return correctChoice;
      var cleaned = correctChoice.replace(/\.?\s*$/, '');
      if (!/^\d+(\s*,\s*\d+)*(\s+et\s+\d+)?$/.test(cleaned)) return correctChoice;
      var numbers = cleaned.match(/\d+/g);
      if (!numbers) return correctChoice;
      var propositions = {};
      var lines = q.question.split('\n');
      lines.forEach(function(line) {
        var m = line.trim().match(/^(\d+)\s*[-\u2013\u2014]\s*(.+)/);
        if (m) propositions[m[1]] = m[2].trim().replace(/\.?\s*$/, '');
      });
      if (Object.keys(propositions).length === 0) return correctChoice;
      var resolved = numbers.map(function(n) { return propositions[n] || n; });
      if (resolved.every(function(r, i) { return r === numbers[i]; })) return correctChoice;
      if (resolved.length === 1) return resolved[0];
      if (resolved.length === 2) return resolved[0] + ' et ' + resolved[1];
      return resolved.slice(0, -1).join(', ') + ' et ' + resolved[resolved.length - 1];
    }

    // === Init ===
    async function initHistorique() {
      uid = (auth.currentUser && auth.currentUser.uid) || localStorage.getItem('cachedUid');
      if (!uid) { window.location = 'index.html'; return; }

      // Load all questions
      await prefetchAllJsonFiles();
      await loadAllQuestions();
      allQuestionsLoaded = [...questions];

      // Load responses + notes from Firestore
      try {
        let doc;
        if (navigator.onLine) {
          try {
            doc = await Promise.race([
              db.collection('quizProgress').doc(uid).get({ source: 'server' }),
              new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 6000))
            ]);
          } catch (e) {
            doc = await db.collection('quizProgress').doc(uid).get();
          }
        } else {
          doc = await db.collection('quizProgress').doc(uid).get();
        }
        const data = doc.exists ? doc.data() : {};
        currentResponses = normalizeResponses(data.responses || {});
        _notesCache = data.notes || {};
        try {
          const lsNotes = JSON.parse(localStorage.getItem('personalNotes_' + uid) || '{}');
          Object.keys(lsNotes).forEach(k => { if (!_notesCache[k]) _notesCache[k] = lsNotes[k]; });
        } catch (e) {}
      } catch (e) {
        console.warn('[historique] Firestore load failed:', e);
      }

      document.getElementById('revisionLoading').style.display = 'none';
      buildRevisionNav();
      // Auto-select today
      selectRevisionDay(0);
    }

    // === Render questions ===
    function renderQuestions(questionsList, container) {
      if (!questionsList.length) { container.innerHTML = ''; return; }
      let html = '';
      questionsList.forEach(function(q) {
        var key = getKeyFor(q);
        var resp = currentResponses[key] || {};
        var isMarked = resp.marked === true;
        var isImportant = resp.important === true;
        var status = resp.status || null;

        var statusBadge = '';
        if (status === 'réussie') statusBadge = '<span class="search-badge search-badge-ok">✅ Réussie</span>';
        else if (status === 'ratée') statusBadge = '<span class="search-badge search-badge-fail">❌ Ratée</span>';
        else statusBadge = '<span class="search-badge search-badge-unseen">👀 Non vue</span>';
        if (isMarked) statusBadge += ' <span class="search-badge search-badge-marked">📌 Marquée</span>';
        if (isImportant) statusBadge += ' <span class="search-badge search-badge-important">⭐ Importante</span>';

        html += '<div class="container question-block search-result-block" data-key="' + key + '" data-qid="' + q.id + '">';
        html += '<div class="search-result-meta">';
        html += '<span class="search-result-cat">' + escapeHtml(q.categorie || '') + '</span>';
        html += '<span class="search-result-badges">' + statusBadge + '</span>';
        html += '</div>';
        html += '<div class="question-title">' + escapeHtml(q.question) + '</div>';

        if (q.image) {
          html += '<div class="question-image"><img src="' + q.image + '" alt="illustration" onerror="this.style.display=\'none\';" loading="lazy" /></div>';
        }

        var ttsText = resolveTtsText(q);
        html += '<div class="answer-list" data-question="' + encodeURIComponent(q.question) + '" data-correct="' + encodeURIComponent(ttsText) + '">';
        (q.choix || []).forEach(function(choixText, i) {
          var cls = '';
          if (i === q.bonne_reponse) cls = 'correct';
          html += '<div style="margin-bottom:4px;padding:4px 6px;border-radius:4px;' +
            (i === q.bonne_reponse ? 'background:rgba(76,175,80,0.12);' : '') +
            '"><span class="' + cls + '">' + escapeHtml(choixText) + '</span></div>';
        });
        html += '</div>';

        if (q.explication || (q.explication_images && q.explication_images.length)) {
          html += '<div class="explication-block">';
          html += '<strong>💡 Explication :</strong><br>';
          if (q.explication) html += escapeHtml(q.explication).replace(/\n/g, '<br>');
          if (q.explication_images && q.explication_images.length) {
            q.explication_images.forEach(function(img) {
              html += '<br><img src="' + img + '" alt="Explication" loading="lazy" onerror="this.style.display=\'none\';">';
            });
          }
          html += '</div>';
        }

        // Note display
        html += '<div class="personal-note-display" id="noteDisplay_' + key + '"></div>';

        // Action buttons
        html += '<div class="question-actions-row">';
        html += '<button class="' + (isMarked ? 'delete-button' : 'mark-button') + '" onclick="histToggleMarquer(\'' + key + '\', this)">' + (isMarked ? 'Supprimer' : 'Marquer') + '</button>';
        html += '<button class="' + (isImportant ? 'delete-button' : 'mark-button') + '" onclick="histToggleImportant(\'' + key + '\', this)">' + (isImportant ? 'Retirer Important' : 'Important') + '</button>';
        html += '<button class="note-toggle-btn" onclick="histToggleNote(\'' + key + '\', this)">📝 Ma note</button>';
        html += '</div>';

        html += '</div>';
      });

      container.innerHTML = html;

      // TTS click
      container.querySelectorAll('.answer-list').forEach(function(el) {
        el.style.cursor = 'pointer';
        el.addEventListener('click', function() {
          speakText(decodeURIComponent(el.getAttribute('data-question')) + '… ' + decodeURIComponent(el.getAttribute('data-correct')));
        });
      });

      // Render existing notes
      questionsList.forEach(function(q) {
        var key = getKeyFor(q);
        var note = _notesCache[key];
        if (note && (note.text || note.image)) histRenderNote(key, note);
      });
    }

    // === Toggle Marquer ===
    window.histToggleMarquer = function(key, btn) {
      if (!uid) return;
      var prev = currentResponses[key] || {};
      var newMarked = !prev.marked;
      var payload = { responses: {} };
      payload.responses[key] = { status: prev.status || 'ratée', marked: newMarked, important: prev.important === true };
      currentResponses[key] = Object.assign({}, prev, { marked: newMarked });
      btn.textContent = newMarked ? 'Supprimer' : 'Marquer';
      btn.className = newMarked ? 'delete-button' : 'mark-button';
      var block = btn.closest('.search-result-block');
      if (block) updateBadges(block, key);
      db.collection('quizProgress').doc(uid).set(payload, { merge: true }).catch(function(e) {
        try { saveToggleWithOfflineFallback(uid, key, payload); } catch (e2) {}
      });
    };

    // === Toggle Important ===
    window.histToggleImportant = function(key, btn) {
      if (!uid) return;
      var prev = currentResponses[key] || {};
      var newImportant = !prev.important;
      var payload = { responses: {} };
      payload.responses[key] = { status: prev.status || 'ratée', marked: prev.marked === true, important: newImportant };
      currentResponses[key] = Object.assign({}, prev, { important: newImportant });
      btn.textContent = newImportant ? 'Retirer Important' : 'Important';
      btn.className = newImportant ? 'delete-button' : 'mark-button';
      var block = btn.closest('.search-result-block');
      if (block) updateBadges(block, key);
      db.collection('quizProgress').doc(uid).set(payload, { merge: true }).catch(function(e) {
        try { saveToggleWithOfflineFallback(uid, key, payload); } catch (e2) {}
      });
    };

    function updateBadges(block, key) {
      var resp = currentResponses[key] || {};
      var badges = block.querySelector('.search-result-badges');
      if (!badges) return;
      var html = '';
      if (resp.status === 'réussie') html += '<span class="search-badge search-badge-ok">✅ Réussie</span>';
      else if (resp.status === 'ratée') html += '<span class="search-badge search-badge-fail">❌ Ratée</span>';
      else html += '<span class="search-badge search-badge-unseen">👀 Non vue</span>';
      if (resp.marked) html += ' <span class="search-badge search-badge-marked">📌 Marquée</span>';
      if (resp.important) html += ' <span class="search-badge search-badge-important">⭐ Importante</span>';
      badges.innerHTML = html;
    }

    // === Notes ===
    window.histToggleNote = function(key, btn) {
      var existingEditor = document.getElementById('noteEditor_' + key);
      if (existingEditor) {
        existingEditor.style.display = existingEditor.style.display === 'none' ? 'block' : 'none';
        return;
      }
      var editor = document.createElement('div');
      editor.id = 'noteEditor_' + key;
      editor.className = 'note-editor';
      var existingNote = _notesCache[key];
      var existingText = existingNote ? (existingNote.text || '') : '';
      editor.innerHTML =
        '<div class="note-textarea" contenteditable="true" id="noteText_' + key + '" data-placeholder="\u00c9crire une note personnelle\u2026">' + existingText + '</div>' +
        '<div class="note-actions">' +
          '<label class="note-image-label">🖼️ Image<input type="file" accept="image/*" id="noteImage_' + key + '" style="display:none" /></label>' +
          '<span class="note-image-name" id="noteImageName_' + key + '"></span>' +
          '<button class="note-publish-btn" onclick="histPublishNote(\'' + key + '\')">Publier</button>' +
        '</div>' +
        '<div id="noteImagePreview_' + key + '" class="note-image-preview"></div>';
      var block = btn.closest('.question-block');
      if (block) block.appendChild(editor); else btn.parentElement.appendChild(editor);

      var textarea = document.getElementById('noteText_' + key);
      // contenteditable div grows naturally, no auto-resize needed
      if (existingText && textarea) textarea.focus();

      document.getElementById('noteImage_' + key).addEventListener('change', function() {
        var file = this.files[0];
        var nameSpan = document.getElementById('noteImageName_' + key);
        var previewDiv = document.getElementById('noteImagePreview_' + key);
        if (file) {
          nameSpan.textContent = file.name;
          var reader = new FileReader();
          reader.onload = function(e) { previewDiv.innerHTML = '<img src="' + e.target.result + '" alt="Aperçu" />'; };
          reader.readAsDataURL(file);
        } else { nameSpan.textContent = ''; previewDiv.innerHTML = ''; }
      });
    };

    window.histPublishNote = async function(key) {
      if (!uid) { alert('Vous devez être connecté.'); return; }
      var textarea = document.getElementById('noteText_' + key);
      var fileInput = document.getElementById('noteImage_' + key);
      var text = textarea ? sanitizeNoteHtml(textarea.innerHTML).trim() : '';
      var file = fileInput && fileInput.files[0];
      if (!text && !file) return;

      var imageData = null;
      if (file) {
        imageData = await new Promise(function(resolve) {
          var reader = new FileReader();
          reader.onload = function(e) { resolve(e.target.result); };
          reader.readAsDataURL(file);
        });
      }
      var existing = _notesCache[key];
      if (!imageData && existing && existing.image) imageData = existing.image;

      var notePayload = { text: text, image: imageData, updatedAt: firebase.firestore.Timestamp.now() };
      try {
        var data = { notes: {} }; data.notes[key] = notePayload;
        await db.collection('quizProgress').doc(uid).set(data, { merge: true });
      } catch (e) {
        try {
          var stored = JSON.parse(localStorage.getItem('personalNotes_' + uid) || '{}');
          stored[key] = notePayload;
          localStorage.setItem('personalNotes_' + uid, JSON.stringify(stored));
        } catch (e2) {}
      }
      _notesCache[key] = notePayload;
      histRenderNote(key, notePayload);
      var editor = document.getElementById('noteEditor_' + key);
      if (editor) editor.style.display = 'none';
    };

    window.histEditNote = function(key) {
      var block = document.getElementById('noteDisplay_' + key);
      if (!block) return;
      var qBlock = block.closest('.question-block');
      if (!qBlock) return;
      var noteBtn = qBlock.querySelector('.note-toggle-btn');
      if (noteBtn) {
        histToggleNote(key, noteBtn);
        var editor = document.getElementById('noteEditor_' + key);
        if (editor) editor.style.display = 'block';
      }
    };

    window.histDeleteNote = async function(key) {
      if (!confirm('Supprimer cette note personnelle ?')) return;
      if (!uid) return;
      try {
        var data = { notes: {} }; data.notes[key] = firebase.firestore.FieldValue.delete();
        await db.collection('quizProgress').doc(uid).set(data, { merge: true });
      } catch (e) {}
      try {
        var stored = JSON.parse(localStorage.getItem('personalNotes_' + uid) || '{}');
        delete stored[key];
        localStorage.setItem('personalNotes_' + uid, JSON.stringify(stored));
      } catch (e) {}
      delete _notesCache[key];
      var div = document.getElementById('noteDisplay_' + key);
      if (div) div.innerHTML = '';
    };

    function histRenderNote(key, note) {
      var div = document.getElementById('noteDisplay_' + key);
      if (!div) return;
      if (!note || (!note.text && !note.image)) { div.innerHTML = ''; return; }
      var html = '<div class="personal-note-block">';
      html += '<div class="personal-note-header">';
      html += '<strong>📌 Ma note personnelle :</strong>';
      html += '<span class="personal-note-actions">';
      html += '<button class="note-edit-btn" onclick="histEditNote(\'' + key + '\')" title="Modifier">✏️</button>';
      html += '<button class="note-delete-btn" onclick="histDeleteNote(\'' + key + '\')" title="Supprimer">❌</button>';
      html += '</span></div>';
      if (note.text) html += renderNoteText(note.text);
      if (note.image) html += '<br><img src="' + note.image + '" alt="Note illustration" loading="lazy" />';
      html += '</div>';
      div.innerHTML = html;
    }

    // === Revision Helpers ===
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function sanitizeNoteHtml(html) {
      if (!html) return '';
      var parser = new DOMParser();
      var doc = parser.parseFromString(html, 'text/html');
      var allowedTags = ['b','strong','i','em','u','br','p','div','ul','ol','li','span','a','h1','h2','h3','h4','h5','h6','sub','sup','blockquote','pre','code','hr'];
      var allowedAttrs = ['href','target','style'];
      function clean(node) {
        var children = Array.from(node.childNodes);
        children.forEach(function(child) {
          if (child.nodeType === 3) return;
          if (child.nodeType === 1) {
            var tag = child.tagName.toLowerCase();
            if (allowedTags.indexOf(tag) === -1) {
              while (child.firstChild) node.insertBefore(child.firstChild, child);
              node.removeChild(child);
            } else {
              Array.from(child.attributes).forEach(function(attr) {
                if (attr.name.indexOf('on') === 0 || allowedAttrs.indexOf(attr.name) === -1) child.removeAttribute(attr.name);
              });
              if (tag === 'a') child.setAttribute('target', '_blank');
              clean(child);
            }
          } else { node.removeChild(child); }
        });
      }
      clean(doc.body);
      return doc.body.innerHTML;
    }

    function renderNoteText(text) {
      if (!text) return '';
      if (/<[a-z][\s\S]*>/i.test(text)) return sanitizeNoteHtml(text);
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    }

    function formatShortDate(d) {
      var days = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
      return days[d.getDay()] + ' ' + d.getDate() + '/' + String(d.getMonth() + 1).padStart(2, '0');
    }

    // === Calendar Navigation ===
    function _buildActivityDates() {
      _activityDates.clear();
      // Scan all responses for dates with statusLog or timestamp
      Object.keys(currentResponses).forEach(function(key) {
        var resp = currentResponses[key];
        if (!resp) return;
        // Use statusLog entries
        if (resp.statusLog && resp.statusLog.length) {
          resp.statusLog.forEach(function(e) {
            var d = new Date(e.ts);
            var k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            _activityDates.add(k);
          });
        }
        // Also use timestamp (fallback for old data)
        var ts = null;
        if (resp.timestamp) {
          if (resp.timestamp.seconds !== undefined) ts = resp.timestamp.seconds * 1000;
          else if (typeof resp.timestamp === 'number') ts = resp.timestamp;
        } else if (resp.lastUpdated) {
          if (resp.lastUpdated.seconds !== undefined) ts = resp.lastUpdated.seconds * 1000;
          else if (typeof resp.lastUpdated === 'number') ts = resp.lastUpdated;
        }
        if (ts) {
          var d = new Date(ts);
          var k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          _activityDates.add(k);
        }
      });
    }

    function buildRevisionNav() {
      _buildActivityDates();
      var nav = document.getElementById('revisionDaysNav');
      if (!_calendarMonth) _calendarMonth = new Date();
      var cm = _calendarMonth;
      var year = cm.getFullYear();
      var month = cm.getMonth();
      var today = new Date();
      var todayKey = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
      var selectedKey = _selectedDate ? (_selectedDate.getFullYear() + '-' + String(_selectedDate.getMonth() + 1).padStart(2, '0') + '-' + String(_selectedDate.getDate()).padStart(2, '0')) : null;

      var monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
      var dayHeaders = ['L','M','M','J','V','S','D'];

      // First day of month and last day
      var firstDay = new Date(year, month, 1);
      var lastDay = new Date(year, month + 1, 0);
      var startDow = (firstDay.getDay() + 6) % 7; // Monday = 0

      var html = '<div class="cal-header">';
      html += '<button class="cal-nav-btn" onclick="calPrevMonth()">◀</button>';
      html += '<span class="cal-month-label">' + monthNames[month] + ' ' + year + '</span>';
      // Only show next if not in the future
      var nextMonth = new Date(year, month + 1, 1);
      if (nextMonth <= new Date(today.getFullYear(), today.getMonth() + 1, 1)) {
        html += '<button class="cal-nav-btn" onclick="calNextMonth()">▶</button>';
      } else {
        html += '<span style="width:32px"></span>';
      }
      html += '</div>';

      html += '<div class="cal-grid">';
      dayHeaders.forEach(function(d) { html += '<div class="cal-day-header">' + d + '</div>'; });

      // Empty cells before first day
      for (var i = 0; i < startDow; i++) {
        html += '<div class="cal-day cal-day-empty"></div>';
      }

      // Day cells
      for (var day = 1; day <= lastDay.getDate(); day++) {
        var dateObj = new Date(year, month, day);
        var dateKey = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        var isFuture = dateObj > today;
        var isToday = dateKey === todayKey;
        var isSelected = dateKey === selectedKey;
        var hasActivity = _activityDates.has(dateKey);
        var classes = 'cal-day';
        if (isFuture) classes += ' cal-day-future';
        if (isToday) classes += ' cal-day-today';
        if (isSelected) classes += ' cal-day-selected';
        if (hasActivity && !isFuture) classes += ' cal-day-active';

        if (isFuture) {
          html += '<div class="' + classes + '">' + day + '</div>';
        } else {
          html += '<div class="' + classes + '" onclick="selectCalendarDay(' + year + ',' + month + ',' + day + ')">' + day;
          if (hasActivity) html += '<span class="cal-dot"></span>';
          html += '</div>';
        }
      }
      html += '</div>';

      // Quick day shortcuts
      html += '<div class="cal-shortcuts">';
      var shortcuts = [
        { label: "Aujourd'hui", offset: 0 },
        { label: 'Hier', offset: 1 },
        { label: 'Avant-hier', offset: 2 }
      ];
      shortcuts.forEach(function(s) {
        var sd = new Date(today);
        sd.setDate(sd.getDate() - s.offset);
        var sk = sd.getFullYear() + '-' + String(sd.getMonth() + 1).padStart(2, '0') + '-' + String(sd.getDate()).padStart(2, '0');
        var isAct = sk === selectedKey;
        html += '<button class="cal-shortcut-btn' + (isAct ? ' cal-shortcut-active' : '') + '" onclick="selectCalendarDay(' + sd.getFullYear() + ',' + sd.getMonth() + ',' + sd.getDate() + ')">' + s.label + '</button>';
      });
      html += '</div>';

      nav.innerHTML = html;
    }

    window.calPrevMonth = function() {
      _calendarMonth = new Date(_calendarMonth.getFullYear(), _calendarMonth.getMonth() - 1, 1);
      buildRevisionNav();
    };
    window.calNextMonth = function() {
      _calendarMonth = new Date(_calendarMonth.getFullYear(), _calendarMonth.getMonth() + 1, 1);
      buildRevisionNav();
    };

    window.selectCalendarDay = function(year, month, day) {
      var newDate = new Date(year, month, day);
      // Toggle: if same date, deselect
      if (_selectedDate && _selectedDate.getTime() === newDate.getTime()) {
        _selectedDate = null;
        buildRevisionNav();
        document.getElementById('revisionResults').innerHTML = '';
        document.getElementById('revisionSummary').innerHTML = '';
        _updateQuizLaunchBtn(0);
        return;
      }
      _selectedDate = newDate;
      // Navigate calendar to selected month if needed
      _calendarMonth = new Date(year, month, 1);
      buildRevisionNav();
      loadRevisionDay(_selectedDate);
    };

    // Legacy support
    window.selectRevisionDay = function(offset) {
      var d = new Date();
      d.setDate(d.getDate() - offset);
      selectCalendarDay(d.getFullYear(), d.getMonth(), d.getDate());
    };

    function loadRevisionDay(targetDate) {
      var d;
      if (targetDate instanceof Date) {
        d = targetDate;
      } else {
        // Legacy: offset from today
        d = new Date();
        d.setDate(d.getDate() - targetDate);
      }
      var startMs = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
      var endMs = startMs + 86400000;

      var dayQuestions = [];
      allQuestionsLoaded.forEach(function(q) {
        var key = getKeyFor(q);
        var resp = currentResponses[key];
        if (!resp) return;

        // Utiliser statusLog si disponible pour reconstituer l'historique du jour
        if (resp.statusLog && resp.statusLog.length) {
          var dayEntries = resp.statusLog.filter(function(e) {
            return e.ts >= startMs && e.ts < endMs;
          });
          if (dayEntries.length > 0) {
            // Prendre la PREMIÈRE réponse du jour (statut original)
            var firstEntry = dayEntries[0];
            var fakeResp = Object.assign({}, resp, { status: firstEntry.status });
            dayQuestions.push({ q: q, ts: firstEntry.ts, resp: fakeResp });
            return;
          }
        }

        // Fallback : ancien comportement (pas de statusLog)
        var ts = null;
        if (resp.timestamp) {
          if (resp.timestamp.seconds !== undefined) ts = resp.timestamp.seconds * 1000;
          else if (typeof resp.timestamp === 'number') ts = resp.timestamp;
        } else if (resp.lastUpdated) {
          if (resp.lastUpdated.seconds !== undefined) ts = resp.lastUpdated.seconds * 1000;
          else if (typeof resp.lastUpdated === 'number') ts = resp.lastUpdated;
        }
        if (ts && ts >= startMs && ts < endMs) {
          dayQuestions.push({ q: q, ts: ts, resp: resp });
        }
      });

      dayQuestions.sort(function(a, b) { return a.ts - b.ts; });
      _lastDayQuestions = dayQuestions;

      var container = document.getElementById('revisionResults');
      var summaryDiv = document.getElementById('revisionSummary');

      if (dayQuestions.length === 0) {
        summaryDiv.innerHTML = '';
        var dateLabel = _formatDateLabel(d);
        container.innerHTML = '<div class="revision-empty"><p style="text-align:center;color:var(--text-secondary);padding:1rem;">Aucune question répondue ' + dateLabel + '</p></div>';
        return;
      }

      // Apply active filters if any
      applyFiltersAndRender();
    }

    function _formatDateLabel(d) {
      var today = new Date();
      var diffDays = Math.round((new Date(today.getFullYear(), today.getMonth(), today.getDate()) - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 86400000);
      if (diffDays === 0) return "aujourd'hui";
      if (diffDays === 1) return 'hier';
      if (diffDays === 2) return 'avant-hier';
      return 'le ' + formatShortDate(d);
    }

    // === Auth ===
    // === Filter logic ===
    window.toggleHistFilter = function(filterName, btn) {
      if (filterName === 'toutes') {
        // "Toutes" clears all other filters and shows everything
        activeFilters.clear();
        document.querySelectorAll('.hist-filter-btn').forEach(function(b) { b.classList.remove('hist-filter-active'); });
        btn.classList.add('hist-filter-active');
      } else {
        // Remove "toutes" if active
        var allBtn = document.querySelector('.hist-filter-all');
        if (allBtn) allBtn.classList.remove('hist-filter-active');

        if (activeFilters.has(filterName)) {
          activeFilters.delete(filterName);
          btn.classList.remove('hist-filter-active');
        } else {
          activeFilters.add(filterName);
          btn.classList.add('hist-filter-active');
        }
      }
      applyFiltersAndRender();
    };

    // === Quiz launch from filters ===
    window.launchHistQuiz = function() {
      var filtered = _getFilteredQuestions();
      if (!filtered.length) { alert('Aucune question à lancer.'); return; }
      // Mélanger les choix proprement pour chaque question
      var questionsForQuiz = filtered.map(function(item) {
        var q = JSON.parse(JSON.stringify(item.q));
        return q;
      });
      localStorage.setItem('currentQuestions', JSON.stringify(questionsForQuiz));
      localStorage.setItem('quizCategory', 'HISTORIQUE');
      localStorage.setItem('quizMode', 'toutes');
      localStorage.setItem('quizNbQuestions', questionsForQuiz.length.toString());
      localStorage.setItem('correctionImmediate', '1');
      localStorage.removeItem('recentlyAnsweredKeys');
      window.location = 'quiz.html';
    };

    function _getFilteredQuestions() {
      if (_lastDayQuestions.length === 0) return [];
      if (activeFilters.size === 0) return _lastDayQuestions;
      return _lastDayQuestions.filter(function(item) {
        var resp = item.resp || {};
        for (var f of activeFilters) {
          if (f === 'réussie' && resp.status === 'réussie') return true;
          if (f === 'ratée' && resp.status === 'ratée') return true;
          if (f === 'marqués' && resp.marked === true) return true;
          if (f === 'importants' && resp.important === true) return true;
        }
        return false;
      });
    }

    function _updateQuizLaunchBtn(filteredCount) {
      var btn = document.getElementById('histQuizLaunchBtn');
      if (!btn) return;
      if (filteredCount > 0 && _lastDayQuestions.length > 0) {
        btn.style.display = 'inline-block';
        btn.textContent = '▶️ Quiz (' + filteredCount + ')';
      } else {
        btn.style.display = 'none';
      }
    }

    function applyFiltersAndRender() {
      if (_lastDayQuestions.length === 0 && activeFilters.size > 0) return;
      var container = document.getElementById('revisionResults');
      var summaryDiv = document.getElementById('revisionSummary');

      var filtered = _getFilteredQuestions();
      // If no active filters, show all
      if (activeFilters.size === 0) filtered = _lastDayQuestions;

      _updateQuizLaunchBtn(filtered.length);

      if (filtered.length === 0 && _lastDayQuestions.length > 0) {
        container.innerHTML = '<div class="revision-empty"><p style="text-align:center;color:var(--text-secondary);padding:1rem;">Aucune question ne correspond aux filtres sélectionnés</p></div>';
        return;
      }
      if (filtered.length === 0) return;

      var correct = filtered.filter(function(x) { return x.resp.status === 'réussie'; }).length;
      var wrong = filtered.filter(function(x) { return x.resp.status === 'ratée'; }).length;
      var pct = filtered.length > 0 ? Math.round(100 * correct / filtered.length) : 0;
      var dayLabel = _selectedDate ? _formatDateLabel(_selectedDate) : "aujourd'hui";
      var filterSuffix = activeFilters.size > 0 ? ' (filtré : ' + filtered.length + '/' + _lastDayQuestions.length + ')' : '';

      summaryDiv.innerHTML = '<div class="revision-summary"><strong>' + dayLabel + '</strong> — ' +
        filtered.length + ' question' + (filtered.length > 1 ? 's' : '') +
        ' · ✅ ' + correct + ' · ❌ ' + wrong + ' · ' + pct + '%' + filterSuffix + '</div>';

      renderQuestions(filtered.map(function(x) { return x.q; }), container);
    }

    // === Auth ===
    var initDone = false;
    function doInit() {
      if (initDone) return;
      initDone = true;
      initHistorique();
    }
    auth.onAuthStateChanged(function(user) {
      if (user) { localStorage.setItem('cachedUid', user.uid); doInit(); }
      else if (localStorage.getItem('cachedUid')) { doInit(); }
      else { window.location = 'index.html'; }
    });
    setTimeout(function() {
      if (!initDone && localStorage.getItem('cachedUid')) doInit();
    }, 2500);
  })();
  </script>
</body>
</html>

<head>

  <script>
    const firebaseConfig = {
      apiKey: (window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.apiKey) || 'AIzaSyD8hy_cTHQZybJ5RFAzgh7DLIh15Jhwkyw',
      authDomain: "quizaviation-b79ff.firebaseapp.com",
      projectId: "quizaviation-b79ff",
      storageBucket: "quizaviation-b79ff.firebasestorage.app",
      messagingSenderId: "200438765697",
      appId: "1:200438765697:web:3467cf30e905ed586e5580",
      measurementId: "G-N3G7EVGZ84"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    window.auth = firebase.auth();

    window._persistenceReady = db.enablePersistence({ synchronizeTabs: true }).catch(err => {

<body>
  <!-- Theme toggle -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'light') document.body.classList.add('light');
    })();
  </script>
  <button id="themeToggle" onclick="(function(){document.body.classList.toggle('light');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');document.getElementById('themeToggle').textContent=document.body.classList.contains('light')?'🌙':'☀️'})()">☀️</button>
  <button id="ttsToggle" onclick="(function(){var on=localStorage.getItem('ttsEnabled')==='1';localStorage.setItem('ttsEnabled',on?'0':'1');document.getElementById('ttsToggle').textContent=on?'🔇':'🔊';document.getElementById('ttsToggle').title=on?'TTS désactivé':'TTS activé'})()" title="TTS désactivé">🔇</button>
  <script>
    if(document.body.classList.contains('light'))document.getElementById('themeToggle').textContent='🌙';
    if(localStorage.getItem('ttsEnabled')==='1'){document.getElementById('ttsToggle').textContent='🔊';document.getElementById('ttsToggle').title='TTS activé';}
  </script>

  <h1>📅 Historique des révisions</h1>

  <!-- Revision history -->
  <div class="container" id="revisionHistoryContainer">
    <div class="revision-days-nav" id="revisionDaysNav"></div>
    <div id="revisionSummary"></div>
    <div id="revisionResults"></div>
    <div id="revisionLoading" class="revision-empty">
      <p style="color:var(--text-secondary)">Chargement…</p>
    </div>
  </div>

  <!-- Navigation -->
  <div class="container" style="text-align: center; margin-top: 1rem;">
    <button onclick="window.location='index.html'">Retour Accueil</button>
    <button class="btn-search" onclick="window.location='search.html'">🔍 Recherche</button>
    <button onclick="window.location='stats.html'">Statistiques</button>
  </div>

  <script>
  // ============================================================
  // Historique page logic
  // ============================================================
  (function() {
    let allQuestionsLoaded = [];
    let currentResponses = {};
    let _notesCache = {};
    let uid = null;
    let revisionDayOffset = null;

    // === TTS ===
    function speakText(text) {
      if (!('speechSynthesis' in window) || localStorage.getItem('ttsEnabled') !== '1') return;
      speechSynthesis.cancel();
      var utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'fr-FR';
      utterance.rate = 0.95;
      var voices = speechSynthesis.getVoices();
      var preferredName = localStorage.getItem('ttsPreferredVoiceName') || '';
      var voice = null;
      if (preferredName) voice = voices.find(function(v) { return v.name === preferredName; });
      if (!voice) voice = voices.find(function(v) { return v.lang && v.lang.match(/^fr/i); });
      if (voice) utterance.voice = voice;
      speechSynthesis.speak(utterance);
    }
    if ('speechSynthesis' in window) {
      speechSynthesis.getVoices();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };
      }
    }

    function resolveTtsText(q) {
      var correctChoice = (q.choix[q.bonne_reponse] || '').trim();
      if (!correctChoice) return correctChoice;
      var cleaned = correctChoice.replace(/\.?\s*$/, '');
      if (!/^\d+(\s*,\s*\d+)*(\s+et\s+\d+)?$/.test(cleaned)) return correctChoice;
      var numbers = cleaned.match(/\d+/g);
      if (!numbers) return correctChoice;
      var propositions = {};
      var lines = q.question.split('\n');
      lines.forEach(function(line) {
        var m = line.trim().match(/^(\d+)\s*[-\u2013\u2014]\s*(.+)/);
        if (m) propositions[m[1]] = m[2].trim().replace(/\.?\s*$/, '');
      });
      if (Object.keys(propositions).length === 0) return correctChoice;
      var resolved = numbers.map(function(n) { return propositions[n] || n; });
      if (resolved.every(function(r, i) { return r === numbers[i]; })) return correctChoice;
      if (resolved.length === 1) return resolved[0];
      if (resolved.length === 2) return resolved[0] + ' et ' + resolved[1];
      return resolved.slice(0, -1).join(', ') + ' et ' + resolved[resolved.length - 1];
    }

    // === Init ===
    async function initHistorique() {
      uid = (auth.currentUser && auth.currentUser.uid) || localStorage.getItem('cachedUid');
      if (!uid) { window.location = 'index.html'; return; }

      // Load all questions
      await prefetchAllJsonFiles();
      await loadAllQuestions();
      allQuestionsLoaded = [...questions];

      // Load responses + notes from Firestore
      try {
        let doc;
        if (navigator.onLine) {
          try {
            doc = await Promise.race([
              db.collection('quizProgress').doc(uid).get({ source: 'server' }),
              new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 6000))
            ]);
          } catch (e) {
            doc = await db.collection('quizProgress').doc(uid).get();
          }
        } else {
          doc = await db.collection('quizProgress').doc(uid).get();
        }
        const data = doc.exists ? doc.data() : {};
        currentResponses = normalizeResponses(data.responses || {});
        _notesCache = data.notes || {};
        try {
          const lsNotes = JSON.parse(localStorage.getItem('personalNotes_' + uid) || '{}');
          Object.keys(lsNotes).forEach(k => { if (!_notesCache[k]) _notesCache[k] = lsNotes[k]; });
        } catch (e) {}
      } catch (e) {
        console.warn('[historique] Firestore load failed:', e);
      }

      document.getElementById('revisionLoading').style.display = 'none';
      buildRevisionNav();
      // Auto-select today
      selectRevisionDay(0);
    }

    // === Render questions ===
    function renderQuestions(questionsList, container) {
      if (!questionsList.length) { container.innerHTML = ''; return; }
      let html = '';
      questionsList.forEach(function(q) {
        var key = getKeyFor(q);
        var resp = currentResponses[key] || {};
        var isMarked = resp.marked === true;
        var isImportant = resp.important === true;
        var status = resp.status || null;

        var statusBadge = '';
        if (status === 'réussie') statusBadge = '<span class="search-badge search-badge-ok">✅ Réussie</span>';
        else if (status === 'ratée') statusBadge = '<span class="search-badge search-badge-fail">❌ Ratée</span>';
        else statusBadge = '<span class="search-badge search-badge-unseen">👀 Non vue</span>';
        if (isMarked) statusBadge += ' <span class="search-badge search-badge-marked">📌 Marquée</span>';
        if (isImportant) statusBadge += ' <span class="search-badge search-badge-important">⭐ Importante</span>';

        html += '<div class="container question-block search-result-block" data-key="' + key + '" data-qid="' + q.id + '">';
        html += '<div class="search-result-meta">';
        html += '<span class="search-result-cat">' + escapeHtml(q.categorie || '') + '</span>';
        html += '<span class="search-result-badges">' + statusBadge + '</span>';
        html += '</div>';
        html += '<div class="question-title">' + escapeHtml(q.question) + '</div>';

        if (q.image) {
          html += '<div class="question-image"><img src="' + q.image + '" alt="illustration" onerror="this.style.display=\'none\';" loading="lazy" /></div>';
        }

        var ttsText = resolveTtsText(q);
        html += '<div class="answer-list" data-question="' + encodeURIComponent(q.question) + '" data-correct="' + encodeURIComponent(ttsText) + '">';
        (q.choix || []).forEach(function(choixText, i) {
          var cls = '';
          if (i === q.bonne_reponse) cls = 'correct';
          html += '<div style="margin-bottom:4px;padding:4px 6px;border-radius:4px;' +
            (i === q.bonne_reponse ? 'background:rgba(76,175,80,0.12);' : '') +
            '"><span class="' + cls + '">' + escapeHtml(choixText) + '</span></div>';
        });
        html += '</div>';

        if (q.explication || (q.explication_images && q.explication_images.length)) {
          html += '<div class="explication-block">';
          html += '<strong>💡 Explication :</strong><br>';
          if (q.explication) html += escapeHtml(q.explication).replace(/\n/g, '<br>');
          if (q.explication_images && q.explication_images.length) {
            q.explication_images.forEach(function(img) {
              html += '<br><img src="' + img + '" alt="Explication" loading="lazy" onerror="this.style.display=\'none\';">';
            });
          }
          html += '</div>';
        }

        // Note display
        html += '<div class="personal-note-display" id="noteDisplay_' + key + '"></div>';

        // Action buttons
        html += '<div class="question-actions-row">';
        html += '<button class="' + (isMarked ? 'delete-button' : 'mark-button') + '" onclick="histToggleMarquer(\'' + key + '\', this)">' + (isMarked ? 'Supprimer' : 'Marquer') + '</button>';
        html += '<button class="' + (isImportant ? 'delete-button' : 'mark-button') + '" onclick="histToggleImportant(\'' + key + '\', this)">' + (isImportant ? 'Retirer Important' : 'Important') + '</button>';
        html += '<button class="note-toggle-btn" onclick="histToggleNote(\'' + key + '\', this)">📝 Ma note</button>';
        html += '</div>';

        html += '</div>';
      });

      container.innerHTML = html;

      // TTS click
      container.querySelectorAll('.answer-list').forEach(function(el) {
        el.style.cursor = 'pointer';
        el.addEventListener('click', function() {
          speakText(decodeURIComponent(el.getAttribute('data-question')) + '… ' + decodeURIComponent(el.getAttribute('data-correct')));
        });
      });

      // Render existing notes
      questionsList.forEach(function(q) {
        var key = getKeyFor(q);
        var note = _notesCache[key];
        if (note && (note.text || note.image)) histRenderNote(key, note);
      });
    }

    // === Toggle Marquer ===
    window.histToggleMarquer = function(key, btn) {
      if (!uid) return;
      var prev = currentResponses[key] || {};
      var newMarked = !prev.marked;
      var payload = { responses: {} };
      payload.responses[key] = { status: prev.status || 'ratée', marked: newMarked, important: prev.important === true };
      currentResponses[key] = Object.assign({}, prev, { marked: newMarked });
      btn.textContent = newMarked ? 'Supprimer' : 'Marquer';
      btn.className = newMarked ? 'delete-button' : 'mark-button';
      var block = btn.closest('.search-result-block');
      if (block) updateBadges(block, key);
      db.collection('quizProgress').doc(uid).set(payload, { merge: true }).catch(function(e) {
        try { saveToggleWithOfflineFallback(uid, key, payload); } catch (e2) {}
      });
    };

    // === Toggle Important ===
    window.histToggleImportant = function(key, btn) {
      if (!uid) return;
      var prev = currentResponses[key] || {};
      var newImportant = !prev.important;
      var payload = { responses: {} };
      payload.responses[key] = { status: prev.status || 'ratée', marked: prev.marked === true, important: newImportant };
      currentResponses[key] = Object.assign({}, prev, { important: newImportant });
      btn.textContent = newImportant ? 'Retirer Important' : 'Important';
      btn.className = newImportant ? 'delete-button' : 'mark-button';
      var block = btn.closest('.search-result-block');
      if (block) updateBadges(block, key);
      db.collection('quizProgress').doc(uid).set(payload, { merge: true }).catch(function(e) {
        try { saveToggleWithOfflineFallback(uid, key, payload); } catch (e2) {}
      });
    };

    function updateBadges(block, key) {
      var resp = currentResponses[key] || {};
      var badges = block.querySelector('.search-result-badges');
      if (!badges) return;
      var html = '';
      if (resp.status === 'réussie') html += '<span class="search-badge search-badge-ok">✅ Réussie</span>';
      else if (resp.status === 'ratée') html += '<span class="search-badge search-badge-fail">❌ Ratée</span>';
      else html += '<span class="search-badge search-badge-unseen">👀 Non vue</span>';
      if (resp.marked) html += ' <span class="search-badge search-badge-marked">📌 Marquée</span>';
      if (resp.important) html += ' <span class="search-badge search-badge-important">⭐ Importante</span>';
      badges.innerHTML = html;
    }

    // === Notes ===
    window.histToggleNote = function(key, btn) {
      var existingEditor = document.getElementById('noteEditor_' + key);
      if (existingEditor) {
        existingEditor.style.display = existingEditor.style.display === 'none' ? 'block' : 'none';
        return;
      }
      var editor = document.createElement('div');
      editor.id = 'noteEditor_' + key;
      editor.className = 'note-editor';
      var existingNote = _notesCache[key];
      var existingText = existingNote ? (existingNote.text || '') : '';
      editor.innerHTML =
        '<textarea class="note-textarea" id="noteText_' + key + '" placeholder="Écrire une note personnelle…" rows="1">' + escapeHtml(existingText) + '</textarea>' +
        '<div class="note-actions">' +
          '<label class="note-image-label">🖼️ Image<input type="file" accept="image/*" id="noteImage_' + key + '" style="display:none" /></label>' +
          '<span class="note-image-name" id="noteImageName_' + key + '"></span>' +
          '<button class="note-publish-btn" onclick="histPublishNote(\'' + key + '\')">Publier</button>' +
        '</div>' +
        '<div id="noteImagePreview_' + key + '" class="note-image-preview"></div>';
      var block = btn.closest('.question-block');
      if (block) block.appendChild(editor); else btn.parentElement.appendChild(editor);

      var textarea = document.getElementById('noteText_' + key);
      textarea.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
      if (existingText) { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; }

      document.getElementById('noteImage_' + key).addEventListener('change', function() {
        var file = this.files[0];
        var nameSpan = document.getElementById('noteImageName_' + key);
        var previewDiv = document.getElementById('noteImagePreview_' + key);
        if (file) {
          nameSpan.textContent = file.name;
          var reader = new FileReader();
          reader.onload = function(e) { previewDiv.innerHTML = '<img src="' + e.target.result + '" alt="Aperçu" />'; };
          reader.readAsDataURL(file);
        } else { nameSpan.textContent = ''; previewDiv.innerHTML = ''; }
      });
    };

    window.histPublishNote = async function(key) {
      if (!uid) { alert('Vous devez être connecté.'); return; }
      var textarea = document.getElementById('noteText_' + key);
      var fileInput = document.getElementById('noteImage_' + key);
      var text = textarea ? textarea.value.trim() : '';
      var file = fileInput && fileInput.files[0];
      if (!text && !file) return;

      var imageData = null;
      if (file) {
        imageData = await new Promise(function(resolve) {
          var reader = new FileReader();
          reader.onload = function(e) { resolve(e.target.result); };
          reader.readAsDataURL(file);
        });
      }
      var existing = _notesCache[key];
      if (!imageData && existing && existing.image) imageData = existing.image;

      var notePayload = { text: text, image: imageData, updatedAt: firebase.firestore.Timestamp.now() };
      try {
        var data = { notes: {} }; data.notes[key] = notePayload;
        await db.collection('quizProgress').doc(uid).set(data, { merge: true });
      } catch (e) {
        try {
          var stored = JSON.parse(localStorage.getItem('personalNotes_' + uid) || '{}');
          stored[key] = notePayload;
          localStorage.setItem('personalNotes_' + uid, JSON.stringify(stored));
        } catch (e2) {}
      }
      _notesCache[key] = notePayload;
      histRenderNote(key, notePayload);
      var editor = document.getElementById('noteEditor_' + key);
      if (editor) editor.style.display = 'none';
    };

    window.histEditNote = function(key) {
      var block = document.getElementById('noteDisplay_' + key);
      if (!block) return;
      var qBlock = block.closest('.question-block');
      if (!qBlock) return;
      var noteBtn = qBlock.querySelector('.note-toggle-btn');
      if (noteBtn) {
        histToggleNote(key, noteBtn);
        var editor = document.getElementById('noteEditor_' + key);
        if (editor) editor.style.display = 'block';
      }
    };

    window.histDeleteNote = async function(key) {
      if (!confirm('Supprimer cette note personnelle ?')) return;
      if (!uid) return;
      try {
        var data = { notes: {} }; data.notes[key] = firebase.firestore.FieldValue.delete();
        await db.collection('quizProgress').doc(uid).set(data, { merge: true });
      } catch (e) {}
      try {
        var stored = JSON.parse(localStorage.getItem('personalNotes_' + uid) || '{}');
        delete stored[key];
        localStorage.setItem('personalNotes_' + uid, JSON.stringify(stored));
      } catch (e) {}
      delete _notesCache[key];
      var div = document.getElementById('noteDisplay_' + key);
      if (div) div.innerHTML = '';
    };

    function histRenderNote(key, note) {
      var div = document.getElementById('noteDisplay_' + key);
      if (!div) return;
      if (!note || (!note.text && !note.image)) { div.innerHTML = ''; return; }
      var html = '<div class="personal-note-block">';
      html += '<div class="personal-note-header">';
      html += '<strong>📌 Ma note personnelle :</strong>';
      html += '<span class="personal-note-actions">';
      html += '<button class="note-edit-btn" onclick="histEditNote(\'' + key + '\')" title="Modifier">✏️</button>';
      html += '<button class="note-delete-btn" onclick="histDeleteNote(\'' + key + '\')" title="Supprimer">❌</button>';
      html += '</span></div>';
      if (note.text) html += escapeHtml(note.text).replace(/\n/g, '<br>');
      if (note.image) html += '<br><img src="' + note.image + '" alt="Note illustration" loading="lazy" />';
      html += '</div>';
      div.innerHTML = html;
    }

    // === Revision Helpers ===
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatShortDate(d) {
      var days = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
      return days[d.getDay()] + ' ' + d.getDate() + '/' + String(d.getMonth() + 1).padStart(2, '0');
    }

    // === Revision History ===
    function buildRevisionNav() {
      var nav = document.getElementById('revisionDaysNav');
      var dayLabels = ['Aujourd\'hui', 'Hier', 'Avant-hier'];
      var html = '';
      for (var i = 0; i < 7; i++) {
        var d = new Date();
        d.setDate(d.getDate() - i);
        var label = i < 3 ? dayLabels[i] : formatShortDate(d);
        var isActive = revisionDayOffset === i;
        html += '<button class="revision-day-btn' + (isActive ? ' revision-day-active' : '') + '" onclick="selectRevisionDay(' + i + ')">' + label + '</button>';
      }
      nav.innerHTML = html;
    }

    window.selectRevisionDay = function(offset) {
      if (revisionDayOffset === offset) {
        revisionDayOffset = null;
        buildRevisionNav();
        document.getElementById('revisionResults').innerHTML = '';
        document.getElementById('revisionSummary').innerHTML = '';
        return;
      }
      revisionDayOffset = offset;
      buildRevisionNav();
      loadRevisionDay(offset);
    };

    function loadRevisionDay(offset) {
      var d = new Date();
      d.setDate(d.getDate() - offset);
      var startMs = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
      var endMs = startMs + 86400000;

      var dayQuestions = [];
      allQuestionsLoaded.forEach(function(q) {
        var key = getKeyFor(q);
        var resp = currentResponses[key];
        if (!resp) return;
        var ts = null;
        if (resp.timestamp) {
          if (resp.timestamp.seconds !== undefined) ts = resp.timestamp.seconds * 1000;
          else if (typeof resp.timestamp === 'number') ts = resp.timestamp;
        } else if (resp.lastUpdated) {
          if (resp.lastUpdated.seconds !== undefined) ts = resp.lastUpdated.seconds * 1000;
          else if (typeof resp.lastUpdated === 'number') ts = resp.lastUpdated;
        }
        if (ts && ts >= startMs && ts < endMs) {
          dayQuestions.push({ q: q, ts: ts, resp: resp });
        }
      });

      dayQuestions.sort(function(a, b) { return a.ts - b.ts; });

      var container = document.getElementById('revisionResults');
      var summaryDiv = document.getElementById('revisionSummary');
      var dayLabels = ['Aujourd\'hui', 'Hier', 'Avant-hier'];
      var dayLabel = offset < 3 ? dayLabels[offset] : formatShortDate(d);

      if (dayQuestions.length === 0) {
        summaryDiv.innerHTML = '';
        container.innerHTML = '<div class="revision-empty"><p style="text-align:center;color:var(--text-secondary);padding:1rem;">Aucune question répondue ' + (offset === 0 ? 'aujourd\'hui' : dayLabel.toLowerCase()) + '</p></div>';
        return;
      }

      var correct = dayQuestions.filter(function(x) { return x.resp.status === 'réussie'; }).length;
      var wrong = dayQuestions.filter(function(x) { return x.resp.status === 'ratée'; }).length;
      var pct = dayQuestions.length > 0 ? Math.round(100 * correct / dayQuestions.length) : 0;

      summaryDiv.innerHTML = '<div class="revision-summary"><strong>' + dayLabel + '</strong> — ' +
        dayQuestions.length + ' question' + (dayQuestions.length > 1 ? 's' : '') +
        ' · ✅ ' + correct + ' · ❌ ' + wrong + ' · ' + pct + '%</div>';

      renderQuestions(dayQuestions.map(function(x) { return x.q; }), container);
    }

    // === Auth ===
    var initDone = false;
    function doInit() {
      if (initDone) return;
      initDone = true;
      initHistorique();
    }
    auth.onAuthStateChanged(function(user) {
      if (user) { localStorage.setItem('cachedUid', user.uid); doInit(); }
      else if (localStorage.getItem('cachedUid')) { doInit(); }
      else { window.location = 'index.html'; }
    });
    setTimeout(function() {
      if (!initDone && localStorage.getItem('cachedUid')) doInit();
    }, 2500);
  })();
  </script>
</body>

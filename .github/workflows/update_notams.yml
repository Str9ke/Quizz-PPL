name: Update NOTAMs

on:
  schedule:
    - cron: '0 * * * *' # Toutes les heures
  workflow_dispatch: # Lancement manuel

jobs:
  update-notams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          SKEYES_USER: ${{ secrets.SKEYES_USER }}
          SKEYES_PASS: ${{ secrets.SKEYES_PASS }}
        run: |
          python fetch_notams.py
          python fetch_meteo.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add notams_belgique.html daily_warnings.pdf daily_warnings.html daily_warnings_page_*.png temsi_france.pdf temsi_france.html temsi_france_page_*.png temsi_euroc.pdf temsi_euroc.html temsi_euroc_page_*.png wintem_euroc.pdf wintem_euroc.html wintem_euroc_page_*.png
          git commit -m "Auto-update NOTAMs & Daily Warnings & Meteo Maps" || echo "No changes to commit"
          git push

name: Update NOTAMs

on:
  schedule:
    - cron: '0 5-19 * * 0,3,5,6' # Toutes les heures de 5h à 19h (UTC), uniquement Mer, Ven, Sam, Dim
  workflow_dispatch: # Lancement manuel

concurrency:
  group: update-notams
  cancel-in-progress: true

jobs:
  update-notams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          SKEYES_USER: ${{ secrets.SKEYES_USER }}
          SKEYES_PASS: ${{ secrets.SKEYES_PASS }}
        run: |
          python fetch_notams.py
          python fetch_meteo.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add notams_belgique.html daily_warnings.pdf daily_warnings.html daily_warnings_page_*.png temsi_france.pdf temsi_france.html temsi_france_page_*.png temsi_euroc.pdf temsi_euroc.html temsi_euroc_page_*.png wintem_france.pdf wintem_france.html wintem_france_page_*.png wintem_euroc.pdf wintem_euroc.html wintem_euroc_page_*.png || true
          git add opmet.html || true
          git add opmet_debug.json || true
          git add opmet.pdf || true
          git add opmet_page_*.png || true
          git commit -m "Auto-update NOTAMs & Daily Warnings & Meteo Maps & OPMET" || echo "No changes to commit"
          git pull --rebase || true
          git push

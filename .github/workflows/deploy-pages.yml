name: Deploy Pages (inject FIREBASE_API_KEY)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site with secret config
        run: |
          set -e
          mkdir -p site
          # copy files but exclude .git, .github and local-only config.js
          rsync -av --exclude='.git' --exclude='.github' --exclude='config.js' --exclude='node_modules' ./ site/

          # create config.js from repository secret
          cat > site/config.js <<'EOF'
          window.FIREBASE_CONFIG = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}"
          };
          EOF

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


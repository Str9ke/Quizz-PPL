  <script>
    // Configuration Firebase obtenue depuis la console Firebase
    // NOTE: apiKey is read from window.FIREBASE_CONFIG if provided (see config.example.js)
    const firebaseConfig = {
      apiKey: (window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.apiKey) || 'AIzaSyD8hy_cTHQZybJ5RFAzgh7DLIh15Jhwkyw',
      authDomain: "quizaviation-b79ff.firebaseapp.com",
      projectId: "quizaviation-b79ff",
      storageBucket: "quizaviation-b79ff.firebasestorage.app",
      messagingSenderId: "200438765697",
      appId: "1:200438765697:web:3467cf30e905ed586e5580",
      measurementId: "G-N3G7EVGZ84"
    };

    // Initialiser Firebase
    firebase.initializeApp(firebaseConfig);
    // Attacher Auth et Firestore à window pour les rendre globalement accessibles
    window.auth = firebase.auth();
    window.db = firebase.firestore();
    // Activer la persistance hors-ligne Firestore (stocker la promesse pour l'attendre)
    window._persistenceReady = db.enablePersistence({ synchronizeTabs: true }).catch(err => {
      if (err.code === 'failed-precondition') {
        console.warn('[Firestore] Persistance impossible : plusieurs onglets ouverts');
      } else if (err.code === 'unimplemented') {
        console.warn('[Firestore] Persistance non supportée par ce navigateur');
      }
    });

    // Surveille l'état de connexion de l'utilisateur
    let indexInitTriggered = false;
    auth.onAuthStateChanged(user => {
      if (user) {
        // Sauvegarder le UID dans localStorage pour le mode offline
        localStorage.setItem('cachedUid', user.uid);
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("quizContainer").style.display = "block";
        if (!indexInitTriggered && typeof initIndex === 'function') {
          indexInitTriggered = true;
          initIndex();
        }
      } else if (localStorage.getItem('cachedUid')) {
        // Auth null mais UID en cache → démarrer en mode offline (navigator.onLine peut mentir)
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("quizContainer").style.display = "block";
        if (!indexInitTriggered && typeof initIndex === 'function') {
          indexInitTriggered = true;
          initIndex();
        }
      } else {
        document.getElementById("loginContainer").style.display = "block";
        document.getElementById("quizContainer").style.display = "none";
      }
    });
    // Sécurité : si auth ne fire pas dans les 2s et qu'on a un cachedUid, démarrer quand même
    setTimeout(() => {
      if (!indexInitTriggered && localStorage.getItem('cachedUid')) {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("quizContainer").style.display = "block";
        indexInitTriggered = true;
        if (typeof initIndex === 'function') initIndex();
      }
    }, 2000);
  </script>

  <!-- Sélecteur de voix TTS : population & test -->
  <script>
  (function() {
    var select = document.getElementById('voiceSelect');
    var infoDiv = document.getElementById('voiceInfo');
    if (!select) return;

    var femaleNames = ['denise','amelie','amélie','aurelie','aurélie','caroline','virginie','marie',
      'hortense','eloise','éloïse','sylvie','céline','celine','lea','léa','nathalie','julie',
      'sophie','isabelle','alice','lucienne','brigitte','aria','jenny','clara','coralie',
      'josephine','joséphine','vivienne','yvette','charline','renée','renee','salli','kendra',
      'joanna','ivy','kimberly','ruth','emma','olivia','anna'];
    var maleNames = ['paul','thomas','henri','nicolas','pierre','mathieu','guillaume','patrick',
      'raphael','raphaël','alain','jean','luc','jacques','françois','francois','claude',
      'vivien','fabrice','yves','joey','matthew','justin','kevin','stephen','brian','gregory'];

    function genderIcon(name) {
      var n = name.toLowerCase();
      for (var i = 0; i < femaleNames.length; i++) { if (n.indexOf(femaleNames[i]) >= 0) return ' ♀'; }
      for (var i = 0; i < maleNames.length; i++) { if (n.indexOf(maleNames[i]) >= 0) return ' ♂'; }
      return '';
    }

    function qualityBadge(name) {
      var n = name.toLowerCase();
      if (n.indexOf('natural') >= 0 || n.indexOf('neural') >= 0) return ' ✨HD';
      if (n.indexOf('online') >= 0) return ' ☁️';
      return '';
    }

    function populateVoices() {
      if (!('speechSynthesis' in window)) {
        select.innerHTML = '<option>TTS non supporté</option>';
        return;
      }
      var voices = speechSynthesis.getVoices();
      var frVoices = voices.filter(function(v) { return v.lang && v.lang.match(/^fr/i); });
      if (frVoices.length === 0 && voices.length === 0) return;
      if (frVoices.length === 0) frVoices = voices;

      var saved = localStorage.getItem('ttsPreferredVoiceName') || '';
      select.innerHTML = '';

      var defOpt = document.createElement('option');
      defOpt.value = '';
      defOpt.textContent = '🔄 Voix par défaut du système';
      select.appendChild(defOpt);

      frVoices.forEach(function(v) {
        var opt = document.createElement('option');
        opt.value = v.name;
        var label = v.name + genderIcon(v.name) + qualityBadge(v.name);
        if (v.localService) label += ' 📱';
        opt.textContent = label;
        if (v.name === saved) opt.selected = true;
        select.appendChild(opt);
      });

      updateVoiceInfo();
    }

    function updateVoiceInfo() {
      if (!('speechSynthesis' in window)) return;
      var voices = speechSynthesis.getVoices();
      var selectedName = select.value;
      if (!selectedName) {
        infoDiv.textContent = 'La première voix française disponible sera utilisée.';
        return;
      }
      var voice = voices.find(function(v) { return v.name === selectedName; });
      if (voice) {
        var info = voice.lang;
        if (voice.localService) info += ' · Locale (hors-ligne)';
        else info += ' · En ligne';
        if (voice.default) info += ' · Par défaut';
        infoDiv.textContent = info;
      }
    }

    select.addEventListener('change', function() {
      localStorage.setItem('ttsPreferredVoiceName', select.value);
      updateVoiceInfo();
    });

    populateVoices();
    if ('speechSynthesis' in window && speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = function() { populateVoices(); };
    }

    var sampleAnswers = [
      "L'angle d'incidence est l'angle entre la corde de l'aile et le vent relatif.",
      "La portance est proportionnelle au carré de la vitesse.",
      "En cas de panne moteur, la priorité est de maintenir la vitesse de finesse max.",
      "Le transpondeur doit être réglé sur 7700 en cas de détresse.",
      "La pression atmosphérique standard au niveau de la mer est 1013 virgule 25 hectopascals.",
      "L'effet de sol augmente la portance et diminue la traînée induite.",
      "La VNE est la vitesse à ne jamais dépasser.",
      "Le QNH est le calage altimétrique qui permet de lire l'altitude.",
      "Le facteur de charge en virage à 60 degrés d'inclinaison est de 2G.",
      "Un NOTAM est un avis aux navigateurs aériens diffusé par les services de l'information aéronautique."
    ];

    window.testSelectedVoice = function() {
      if (!('speechSynthesis' in window)) { alert('TTS non supporté sur cet appareil'); return; }
      speechSynthesis.cancel();
      var text = sampleAnswers[Math.floor(Math.random() * sampleAnswers.length)];
      var utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'fr-FR';
      utterance.rate = 0.95;
      utterance.volume = (parseInt(localStorage.getItem('ttsVolume'))||80)/100;
      utterance.pitch = 1.0;
      var voices = speechSynthesis.getVoices();
      var selectedName = select.value;
      if (selectedName) {
        var voice = voices.find(function(v) { return v.name === selectedName; });
        if (voice) utterance.voice = voice;
      } else {
        var frVoice = voices.find(function(v) { return v.lang && v.lang.match(/^fr/i); });
        if (frVoice) utterance.voice = frVoice;
      }
      var btn = document.getElementById('btnTestVoice');
      btn.textContent = '🔊 Lecture...';
      btn.disabled = true;
      utterance.onend = function() { btn.textContent = '▶ Tester'; btn.disabled = false; };
      utterance.onerror = function() { btn.textContent = '▶ Tester'; btn.disabled = false; };
      speechSynthesis.speak(utterance);
    };
  })();
  </script>

  <script>
  // Mise à jour du badge "Ratés du jour" (localStorage rapide + Firestore cross-device)
  (function() {
    var now = new Date();
    var todayKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');

    function updateBadge(unseen) {
      var badge = document.getElementById('ratesBadge');
      if (badge && unseen > 0) { badge.textContent = unseen; badge.style.display = 'inline-block'; }
      else if (badge) { badge.style.display = 'none'; }
    }

    // 1) Instant : localStorage
    try {
      var data = JSON.parse(localStorage.getItem('wrongToday') || '{}');
      var localItems = (data.date === todayKey) ? (data.items || []) : [];
      var viewed = JSON.parse(localStorage.getItem('ratesLastViewed') || '{}');
      var lastTs = (viewed.date === todayKey) ? (viewed.ts || 0) : 0;
      var unseen = localItems.filter(function(item) { return item.ts > lastTs; }).length;
      updateBadge(unseen);
    } catch (e) {}

    // 2) Async : Firestore (pour cross-device, ex: PC voit les ratés du téléphone)
    function checkFirestoreBadge() {
      var uid = (window.auth && auth.currentUser && auth.currentUser.uid) || localStorage.getItem('cachedUid');
      if (!uid || !window.db) return;
      var docRef = db.collection('quizProgress').doc(uid).collection('wrongToday').doc(todayKey);
      var metaRef = db.collection('quizProgress').doc(uid).collection('wrongToday').doc('_meta');
      Promise.all([docRef.get(), metaRef.get()]).then(function(results) {
        var fsDoc = results[0]; var metaDoc = results[1];
        var fsItems = (fsDoc && fsDoc.exists) ? (fsDoc.data().items || []) : [];
        var fsLastViewed = 0;
        if (metaDoc && metaDoc.exists && metaDoc.data().lastViewed && metaDoc.data().lastViewed.date === todayKey) {
          fsLastViewed = metaDoc.data().lastViewed.ts || 0;
        }
        // Merge local + firestore
        var map = {};
        function add(it) { map[it.key + '_' + it.ts] = it; }
        try { var ld = JSON.parse(localStorage.getItem('wrongToday') || '{}'); if (ld.date === todayKey) (ld.items || []).forEach(add); } catch(e){}
        fsItems.forEach(add);
        var allItems = []; for (var k in map) allItems.push(map[k]);
        var vw = 0;
        try { var v = JSON.parse(localStorage.getItem('ratesLastViewed') || '{}'); if (v.date === todayKey) vw = v.ts || 0; } catch(e){}
        var effectiveLV = Math.max(vw, fsLastViewed);
        var count = allItems.filter(function(it) { return it.ts > effectiveLV; }).length;
        updateBadge(count);
      }).catch(function(){});
    }
    // Délai pour laisser Firebase s'initialiser
    setTimeout(checkFirestoreBadge, 2500);
  })();
  </script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (password.length < 6) {
        alert("Le mot de passe doit contenir au moins 6 caractères.");
        return;
      }

      try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
      } catch (error) {
        console.error("Erreur lors de la connexion :", error);
        if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-login-credentials') {
          try {
            const newUser = await auth.createUserWithEmailAndPassword(email, password);
          } catch (creationError) {
            console.error("Erreur lors de la création du compte :", creationError);
            alert("Erreur lors de la création du compte : " + creationError.message);
          }
        } else {
          alert("Erreur de connexion : " + error.message);
        }
      }
    });

    document.getElementById('btnLogout').addEventListener('click', async () => {
      try {
        localStorage.removeItem('cachedUid');
        await auth.signOut();
        window.location.reload();
      } catch (error) {
        console.error("Erreur lors de la déconnexion :", error);
      }
    });

    /* Show connected email */
    auth.onAuthStateChanged(function(user){
      var el = document.getElementById('connectedEmailDisplay');
      if(el) el.textContent = user ? ('\uD83D\uDC64 ' + (user.email || user.uid.slice(0,8))) : '';
    });

    /* Force full sync from Firestore server */
    window.forceSyncFromServer = async function(){
      var uid = (auth && auth.currentUser && auth.currentUser.uid) || localStorage.getItem('cachedUid');
      if(!uid){ alert('Non connect\u00e9 \u2014 veuillez vous connecter d\'abord.'); return; }
      var btn = document.getElementById('syncBtn');
      if(btn){ btn.textContent='\u23F3 Synchro\u2026'; btn.disabled=true; }
      console.log('[sync] uid:', uid);
      try{
        /* 1. PUSH local → Firestore (bidirectionnel) */
        /* 1a. dailyCount (compteur journalier réponses) — manquait avant ! */
        if (typeof saveDailyCount === 'function') {
          try { await saveDailyCount(uid); console.log('[sync] dailyCount poussé'); }
          catch(e){ console.warn('[sync] saveDailyCount upload:', e); }
        }
        /* 1b. dailyMastered (questions maîtrisées) */
        if (typeof saveDailyMastered === 'function') {
          try { await saveDailyMastered(uid); } catch(e){ console.warn('[sync] saveDailyMastered upload:', e); }
        }
        /* 1c. Réponses locales → Firestore merge */
        if (typeof saveResponsesWithOfflineFallback === 'function' && Object.keys(currentResponses||{}).length > 0) {
          try { await saveResponsesWithOfflineFallback(uid, currentResponses); } catch(e){ console.warn('[sync] responses upload:', e); }
        }

        /* 2. PULL Firestore → local */
        /* source:'server' peut échouer avec enableMultiTabIndexedDbPersistence → fallback sans option */
        var docSnap;
        try { docSnap = await db.collection('quizProgress').doc(uid).get({ source: 'server' }); }
        catch(srcErr) { docSnap = await db.collection('quizProgress').doc(uid).get(); }
        var data = docSnap.exists ? docSnap.data() : {};
        currentResponses = normalizeResponses(data.responses || {});
        /* dailyHistory : merge max(local, server) pour chaque jour */
        var dh = data.dailyHistory || {};
        console.log('[sync] dailyHistory serveur:', JSON.stringify(dh).slice(0,200));
        var dhB = JSON.parse(localStorage.getItem('dailyHistoryBackup') || '{}');
        for(var k in dh){ if(dh[k] > (dhB[k]||0)) dhB[k]=dh[k]; }
        localStorage.setItem('dailyHistoryBackup', JSON.stringify(dhB));
        /* dailyMastered */
        var dm = data.dailyMastered || {};
        var dmB = JSON.parse(localStorage.getItem('dailyMasteredBackup') || '{}');
        for(var k in dm){ if(dm[k] > (dmB[k]||0)) dmB[k]=dm[k]; }
        localStorage.setItem('dailyMasteredBackup', JSON.stringify(dmB));
        /* ratchet aujourd'hui : prendre le max(local, serveur) */
        var now = new Date();
        var todayKey = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
        var todayUtcKey = now.toISOString().slice(0,10);
        var serverToday = dh[todayKey]||0;
        var localRatchet = parseInt(localStorage.getItem('dailyCountRatchet_'+todayUtcKey))||0;
        var bestToday = Math.max(serverToday, localRatchet);
        console.log('[sync] aujourd\'hui \u2014 serveur:', serverToday, 'local:', localRatchet, '\u2192 affiché:', bestToday);
        if(bestToday > localRatchet){
          localStorage.setItem('dailyCountRatchet_'+todayUtcKey, bestToday);
          localStorage.setItem('dailyAnswered_'+todayUtcKey, bestToday);
          /* aussi mettre à jour le backup local pour consistance */
          var dhB2 = JSON.parse(localStorage.getItem('dailyHistoryBackup'))||{};
          dhB2[todayKey] = Math.max(dhB2[todayKey]||0, bestToday);
          localStorage.setItem('dailyHistoryBackup', JSON.stringify(dhB2));
        }
        displayHomeProgressBar(currentResponses, dh);
        updateDailyStatsBar();
        if(typeof updateModeCounts === 'function') updateModeCounts();
        var msg = bestToday > 0 ? ('\u2705 Sync\u00e9 (' + bestToday + ' auj.)') : '\u2705 Synchronis\u00e9 !';
        if(btn){ btn.textContent=msg; btn.style.background='linear-gradient(135deg,#22c55e,#16a34a)'; btn.style.color='#fff'; btn.style.borderColor='transparent'; }
        setTimeout(function(){ if(btn){ btn.textContent='\uD83D\uDD04 Synchroniser'; btn.style.background=''; btn.style.color=''; btn.style.borderColor=''; btn.disabled=false; }}, 3500);
      }catch(e){
        console.error('[forceSyncFromServer] error', e);
        var errMsg = e && e.message ? e.message.slice(0,40) : 'inconnue';
        if(btn){ btn.textContent='\u274C ' + errMsg; btn.disabled=false; setTimeout(function(){ btn.textContent='\uD83D\uDD04 Synchroniser'; btn.style.cssText=''; btn.disabled=false; },4000); }
      }
    };
  </script>
</body>
</html>
